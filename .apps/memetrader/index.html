<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memetrader</title>
  <link id="memetrader-theme-stylesheet" rel="stylesheet" href="themes/psionic.css?v=memetrader20260220b">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Memetrader</h1>
      <p>Local-first meme trading and curation. Hash identity, MSIG tagging, cluster draws, and trade journals.</p>
      <div id="status" class="status">Initializing…</div>
    </header>

    <section class="panel grid-two">
      <div>
        <h2>Ingest</h2>
        <label>File path</label>
        <input id="ingest-path" type="text" placeholder="/absolute/path/to/meme.png" spellcheck="false">
        <label>MSIG tags (comma separated)</label>
        <input id="ingest-msig" type="text" placeholder="reaction,drift,vaporwave" spellcheck="false">
        <label>Families (comma separated)</label>
        <input id="ingest-families" type="text" placeholder="family:surreal,family:cats" spellcheck="false">
        <button id="ingest-btn" type="button">Ingest Meme</button>
      </div>
      <div>
        <h2>Actions</h2>
        <div class="row">
          <button id="refresh-btn" type="button">Refresh Gallery</button>
          <button id="draw-btn" type="button">Uniform Cluster Draw</button>
          <button id="draw-tilt-btn" type="button">Temperature Tilt Draw</button>
        </div>
        <label>Selected SHA256 Canon</label>
        <input id="selected-sha" type="text" placeholder="select from gallery below" spellcheck="false">
        <div class="row">
          <button id="vote-up-btn" type="button">Daily Upvote</button>
          <button id="vote-meh-btn" type="button">Meh</button>
        </div>
      </div>
    </section>

    <section class="panel grid-two">
      <div>
        <h2>Tagging</h2>
        <label>MSIG update</label>
        <input id="tag-msig" type="text" placeholder="remix,contrast" spellcheck="false">
        <label>Families update</label>
        <input id="tag-families" type="text" placeholder="family:reaction" spellcheck="false">
        <button id="tag-btn" type="button">Apply Tags</button>
      </div>
      <div>
        <h2>Relations</h2>
        <label>Relation type</label>
        <select id="rel-type">
          <option value="related">related</option>
          <option value="contrast">contrast</option>
          <option value="often-combined">often-combined</option>
          <option value="visually-similar">visually-similar</option>
        </select>
        <label>Target SHA</label>
        <input id="rel-target" type="text" placeholder="sha of related meme" spellcheck="false">
        <button id="rel-btn" type="button">Add Relation</button>
        <label>Lineage precursor SHA</label>
        <input id="lineage-target" type="text" placeholder="precursor sha" spellcheck="false">
        <button id="lineage-btn" type="button">Set Lineage Edge</button>
      </div>
    </section>

    <section class="panel">
      <h2>Gallery</h2>
      <table>
        <thead>
          <tr>
            <th>SHA</th>
            <th>Name</th>
            <th>Kind</th>
            <th>Cluster</th>
            <th>Temperature</th>
            <th>MSIG</th>
            <th>Families</th>
          </tr>
        </thead>
        <tbody id="gallery"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Log</h2>
      <pre id="log"></pre>
    </section>
  </main>
  <div class="theme-dock">
    <div class="menu-anchor">
      <button id="theme-picker-btn" type="button" class="theme-picker-btn" aria-haspopup="menu" aria-expanded="false">Psionic</button>
      <div id="theme-picker-menu" class="floating-menu hidden" role="menu" aria-label="Theme selector">
        <div id="theme-picker-list" class="menu-list"></div>
      </div>
    </div>
  </div>

  <script>
    (function loadBridge() {
      var candidates = [
        './.host/shared/wizardry-bridge.js',
        '../.host/shared/wizardry-bridge.js',
        '../../.host/shared/wizardry-bridge.js'
      ];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var THEME_KEY = 'wizardry.memetrader.theme';
    var THEME_ASSET_VERSION = 'memetrader20260220b';

    var state = {
      backendScriptPath: '',
      themes: [
        'adept', 'alchemist', 'archmage', 'chronomancer', 'conjurer', 'druid',
        'empath', 'enchanter', 'geomancer', 'hermeticist', 'hierophant', 'illusionist',
        'lich', 'necromancer', 'psionic', 'pyromancer', 'seer', 'shaman', 'sorcerer', 'sorceress',
        'technomancer', 'thaumaturge', 'thelemite', 'theurgist', 'wadjet', 'warlock', 'wizard'
      ],
      activeTheme: 'psionic'
    };

    function el(id) {
      return document.getElementById(id);
    }

    function loadStorage(key) {
      try {
        return window.localStorage.getItem(key) || '';
      } catch (_) {
        return '';
      }
    }

    function saveStorage(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (_) {
        // Ignore storage failures.
      }
    }

    function themeLabel(theme) {
      var value = String(theme || '').trim();
      if (!value) {
        return 'Psionic';
      }
      return value.split('-').map(function (part) {
        return part ? part.charAt(0).toUpperCase() + part.slice(1) : '';
      }).join(' ');
    }

    function renderThemeMenu() {
      var list = el('theme-picker-list');
      var button = el('theme-picker-btn');
      if (!list || !button) {
        return;
      }
      list.textContent = '';
      state.themes.forEach(function (theme) {
        var item = document.createElement('button');
        item.type = 'button';
        item.setAttribute('data-theme', theme);
        item.className = state.activeTheme === theme ? 'active' : '';
        item.textContent = themeLabel(theme);
        list.appendChild(item);
      });
      button.textContent = themeLabel(state.activeTheme);
    }

    function applyTheme(theme) {
      var normalized = state.themes.indexOf(theme) >= 0 ? theme : 'psionic';
      state.activeTheme = normalized;
      saveStorage(THEME_KEY, normalized);
      var sheet = el('memetrader-theme-stylesheet');
      if (sheet) {
        sheet.href = 'themes/' + normalized + '.css?v=' + THEME_ASSET_VERSION;
      }
      renderThemeMenu();
    }

    function hideThemeMenu() {
      var menu = el('theme-picker-menu');
      var button = el('theme-picker-btn');
      if (!menu || !button) {
        return;
      }
      menu.classList.add('hidden');
      button.setAttribute('aria-expanded', 'false');
    }

    function toggleThemeMenu() {
      var menu = el('theme-picker-menu');
      var button = el('theme-picker-btn');
      if (!menu || !button) {
        return;
      }
      var hidden = menu.classList.toggle('hidden');
      button.setAttribute('aria-expanded', hidden ? 'false' : 'true');
    }

    function logLine(text) {
      var out = el('log');
      out.textContent = '[' + new Date().toLocaleTimeString() + '] ' + text + '\n' + out.textContent;
    }

    function setStatus(text, isErr) {
      var s = el('status');
      s.textContent = text;
      s.className = isErr ? 'status error' : 'status';
    }

    function hasBridge() {
      return !!(window.wizardry && typeof window.wizardry.rpc === 'function');
    }

    async function waitForBridge(timeoutMs) {
      var started = Date.now();
      while (!hasBridge()) {
        if (Date.now() - started > timeoutMs) {
          throw new Error('wizardry bridge unavailable');
        }
        await new Promise(function (resolve) { setTimeout(resolve, 60); });
      }
    }

    async function bridgeExec(argv) {
      await waitForBridge(4000);
      var res = await window.wizardry.rpc('bridge.exec', { argv: argv });
      var code = Number(res && res.exit_code);
      if (!Number.isFinite(code) || code === 0) {
        return res || {};
      }
      var stderr = String((res && res.stderr) || '').trim();
      var stdout = String((res && res.stdout) || '').trim();
      throw new Error(stderr || stdout || ('exit ' + code));
    }

    async function runBackend(args) {
      var argv;
      if (!state.backendScriptPath) {
        try {
          var pagePath = decodeURIComponent(String(window.location && window.location.pathname ? window.location.pathname : ''));
          var marker = '/.apps/memetrader/';
          var idx = pagePath.lastIndexOf(marker);
          if (idx > 0) {
            state.backendScriptPath = pagePath.slice(0, idx) + '/.apps/memetrader/scripts/memetrader-backend.sh';
          }
        } catch (_) {
          state.backendScriptPath = '';
        }
      }

      if (state.backendScriptPath) {
        argv = ['sh', state.backendScriptPath].concat(args);
      } else {
        argv = [
          'sh',
          '-c',
          'root="${WIZARDRY_APPS_ROOT:-$HOME/git/wizardry-apps}"; exec sh "$root/.apps/memetrader/scripts/memetrader-backend.sh" "$@"',
          'memetrader-backend'
        ].concat(args);
      }
      var res = await bridgeExec(argv);
      var out = String((res && res.stdout) || '').trim();
      if (!out) {
        return { ok: true };
      }
      var parsed = JSON.parse(out.split('\n').filter(Boolean).slice(-1)[0]);
      if (!parsed.ok) {
        throw new Error(parsed.error || 'backend error');
      }
      return parsed;
    }

    function selectedSha() {
      return String(el('selected-sha').value || '').trim();
    }

    function renderGallery(items) {
      var tbody = el('gallery');
      tbody.textContent = '';
      (items || []).forEach(function (item) {
        var tr = document.createElement('tr');
        tr.innerHTML = [
          '<td><code>' + item.sha + '</code></td>',
          '<td>' + (item.name || '') + '</td>',
          '<td>' + (item.kind || '') + '</td>',
          '<td><span class="cluster">' + (item.cluster || '') + '</span></td>',
          '<td><span class="temp temp-' + (item.temperature || 'cold') + '">' + (item.temperature || 'cold') + '</span></td>',
          '<td>' + (item.msig || '') + '</td>',
          '<td>' + (item.families || '') + '</td>'
        ].join('');
        tr.addEventListener('click', function () {
          el('selected-sha').value = item.sha || '';
        });
        tbody.appendChild(tr);
      });
    }

    async function refresh() {
      setStatus('Refreshing…', false);
      var st = await runBackend(['status']);
      var list = await runBackend(['list', '', '120']);
      renderGallery(list.items || []);
      setStatus('Ready - ' + st.total + ' memes (' + st.hot + ' hot, ' + st.warm + ' warm, ' + st.cold + ' cold)', false);
    }

    async function ingest() {
      var path = String(el('ingest-path').value || '').trim();
      if (!path) {
        throw new Error('file path is required');
      }
      var msig = String(el('ingest-msig').value || '').trim();
      var families = String(el('ingest-families').value || '').trim();
      var res = await runBackend(['ingest', '', path, msig, families, 'flat', '1']);
      el('selected-sha').value = res.sha256_canon || '';
      logLine('Ingested ' + (res.sha256_canon || 'unknown'));
      await refresh();
    }

    async function vote(v) {
      var sha = selectedSha();
      if (!sha) {
        throw new Error('select a meme first');
      }
      var res = await runBackend(['vote', '', sha, v]);
      logLine('Vote ' + v + ' on ' + sha + ' => ' + res.temperature + ' (' + res.temp_score + ')');
      await refresh();
    }

    async function draw(tilt) {
      var res = await runBackend(['draw', '', tilt ? '1' : '0']);
      el('selected-sha').value = res.sha || '';
      logLine('Draw selected ' + res.sha + ' from cluster ' + res.cluster + ' (' + res.temperature + ')');
    }

    async function applyTags() {
      var sha = selectedSha();
      if (!sha) {
        throw new Error('select a meme first');
      }
      var msig = String(el('tag-msig').value || '').trim();
      var families = String(el('tag-families').value || '').trim();
      await runBackend(['tag', '', sha, msig, families]);
      logLine('Updated tags for ' + sha);
      await refresh();
    }

    async function applyRelation() {
      var sha = selectedSha();
      if (!sha) {
        throw new Error('select a meme first');
      }
      var rel = String(el('rel-type').value || 'related');
      var target = String(el('rel-target').value || '').trim();
      if (!target) {
        throw new Error('target sha is required');
      }
      await runBackend(['relate', '', sha, rel, target]);
      logLine('Relation ' + rel + ' from ' + sha + ' -> ' + target);
    }

    async function applyLineage() {
      var sha = selectedSha();
      if (!sha) {
        throw new Error('select a meme first');
      }
      var precursor = String(el('lineage-target').value || '').trim();
      if (!precursor) {
        throw new Error('precursor sha is required');
      }
      await runBackend(['lineage', '', sha, precursor]);
      logLine('Lineage set: ' + precursor + ' -> ' + sha);
    }

    async function runAction(fn) {
      try {
        setStatus('Working…', false);
        await fn();
        setStatus('Ready', false);
      } catch (err) {
        setStatus(String(err && err.message ? err.message : err), true);
        logLine('Error: ' + String(err && err.message ? err.message : err));
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      applyTheme(loadStorage(THEME_KEY) || 'psionic');
      el('ingest-btn').addEventListener('click', function () { runAction(ingest); });
      el('refresh-btn').addEventListener('click', function () { runAction(refresh); });
      el('draw-btn').addEventListener('click', function () { runAction(function () { return draw(false); }); });
      el('draw-tilt-btn').addEventListener('click', function () { runAction(function () { return draw(true); }); });
      el('vote-up-btn').addEventListener('click', function () { runAction(function () { return vote('up'); }); });
      el('vote-meh-btn').addEventListener('click', function () { runAction(function () { return vote('meh'); }); });
      el('tag-btn').addEventListener('click', function () { runAction(applyTags); });
      el('rel-btn').addEventListener('click', function () { runAction(applyRelation); });
      el('lineage-btn').addEventListener('click', function () { runAction(applyLineage); });
      el('theme-picker-btn').addEventListener('click', function (event) {
        event.stopPropagation();
        toggleThemeMenu();
      });
      el('theme-picker-list').addEventListener('click', function (event) {
        var target = event.target.closest('button[data-theme]');
        if (!target) {
          return;
        }
        applyTheme(target.getAttribute('data-theme') || 'psionic');
        hideThemeMenu();
      });
      document.addEventListener('click', function (event) {
        if (event.target.closest('#theme-picker-btn') || event.target.closest('#theme-picker-menu')) {
          return;
        }
        hideThemeMenu();
      });
      runAction(refresh);
    });
  </script>
</body>
</html>
