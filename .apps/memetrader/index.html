<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memetrader</title>
  <style>
    :root {
      --memetrader-drag-band-h: 14px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #9ea5ae;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #drag-band {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--memetrader-drag-band-h);
      background: color-mix(in srgb, #9ea5ae 86%, #8f969f 14%);
      -webkit-app-region: drag;
      z-index: 2;
    }

    #app {
      position: fixed;
      top: var(--memetrader-drag-band-h);
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: calc(100% - var(--memetrader-drag-band-h));
      border: 0;
      background: #9ea5ae;
      -webkit-app-region: no-drag;
    }

    #status {
      position: fixed;
      top: var(--memetrader-drag-band-h);
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, #9ea5ae 82%, #8f969f 18%);
      color: #2d3138;
      font-size: 0.92rem;
      z-index: 10;
      transition: opacity 180ms ease;
      -webkit-app-region: no-drag;
    }

    #status.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #status .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0.45rem 0.92rem;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, #6f7680 55%, transparent);
      background: color-mix(in srgb, #d8dde3 52%, transparent);
      color: #2f353d;
      font-weight: 600;
      letter-spacing: 0.01em;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      box-shadow: 0 6px 16px rgba(45, 49, 56, 0.18);
    }

    #status.error {
      color: #7a1f1f;
      white-space: pre-wrap;
      text-align: center;
      padding: 1rem;
    }

    #status.error .status-pill {
      border-color: color-mix(in srgb, #b45151 50%, transparent);
      background: color-mix(in srgb, #f0c7c7 58%, transparent);
      color: #651b1b;
      border-radius: 12px;
      white-space: pre-wrap;
      text-align: center;
      max-width: min(86vw, 700px);
    }
  </style>
</head>
<body>
  <div id="drag-band" aria-hidden="true"></div>
  <div id="status"><span class="status-pill">Loading...</span></div>
  <iframe id="app" src="about:blank" title="Memetrader"></iframe>

  <script>
    (function loadBridge() {
      var candidates = [
        './.host/shared/wizardry-bridge.js',
        '../.host/shared/wizardry-bridge.js',
        '../../.host/shared/wizardry-bridge.js'
      ];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var siteName = 'memetrader';
    var entryPath = '/pages/index.html';

    var commands = {
      ensureSite: [
        'sh',
        '-c',
        'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/' + siteName + '/site.conf"; if [ ! -f "$cfg" ]; then create-from-template ' + siteName + ' ' + siteName + '; fi; web-wizardry build ' + siteName
      ],
      startDetached: ['sh', '-c', 'web-wizardry serve ' + siteName + ' >/dev/null 2>&1 &'],
      ensureUsablePort: [
        'sh',
        '-c',
        'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/' + siteName + '/site.conf"; pidf="$root/' + siteName + '/nginx/nginx.pid"; port=$(sed -n "s/^port=//p" "$cfg" 2>/dev/null | head -n 1); [ -n "$port" ] || port=8080; if [ -f "$pidf" ] && pid=$(cat "$pidf" 2>/dev/null) && [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then printf "$port"; exit 0; fi; if command -v lsof >/dev/null 2>&1; then if ! lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then printf "$port"; exit 0; fi; p=8081; while [ "$p" -le 8120 ]; do if ! lsof -nP -iTCP:"$p" -sTCP:LISTEN >/dev/null 2>&1; then change-site-port ' + siteName + ' "$p" >/dev/null 2>&1 && printf "$p" && exit 0; fi; p=$((p+1)); done; exit 1; fi; printf "$port"; exit 0'
      ],
      isRunning: ['sh', '-c', 'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; pidf="$root/' + siteName + '/nginx/nginx.pid"; if [ -f "$pidf" ] && pid=$(cat "$pidf" 2>/dev/null) && [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then printf "yes"; else printf "no"; fi'],
      getPort: ['sh', '-c', 'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/' + siteName + '/site.conf"; if [ -f "$cfg" ]; then sed -n "s/^port=//p" "$cfg" | head -n 1; fi']
    };

    var holdUntil = 0;
    var appFrameLoaded = false;
    var appInnerReady = false;
    var hideFallbackTimer = null;

    function statusEl() {
      return document.getElementById('status');
    }

    function setStatus(text, isError) {
      var el = statusEl();
      var pill = el.querySelector('.status-pill');
      if (!pill) {
        pill = document.createElement('span');
        pill.className = 'status-pill';
        el.textContent = '';
        el.appendChild(pill);
      }
      pill.textContent = text;
      el.className = isError ? 'error' : '';
    }

    function hideStatus() {
      statusEl().classList.add('hidden');
    }

    function requestHideStatus() {
      var delay = Math.max(0, holdUntil - Date.now());
      setTimeout(hideStatus, delay);
    }

    function maybeHideStatus() {
      if (!appFrameLoaded || !appInnerReady) {
        return;
      }
      requestHideStatus();
    }

    function hasBridge() {
      return !!(window.wizardry && typeof window.wizardry.rpc === 'function');
    }

    async function waitForBridge(timeoutMs) {
      var start = Date.now();
      while (!hasBridge()) {
        if (Date.now() - start > (timeoutMs || 4000)) {
          throw new Error('wizardry bridge unavailable; run this app in native host');
        }
        await new Promise(function (resolve) { setTimeout(resolve, 50); });
      }
    }

    async function bridgeExec(argv) {
      await waitForBridge(4000);
      var res = await window.wizardry.rpc('bridge.exec', { argv: argv });
      var code = Number(res && res.exit_code);
      if (!Number.isFinite(code) || code === 0) {
        return res || {};
      }
      var stderr = String((res && res.stderr) || '').trim();
      var stdout = String((res && res.stdout) || '').trim();
      var detail = stderr || stdout || ('exit ' + code);
      throw new Error(detail);
    }

    async function resolvePort() {
      var res = await bridgeExec(commands.getPort);
      var raw = String((res && res.stdout) || '').trim();
      if (!/^[0-9]+$/.test(raw)) {
        throw new Error('unable to resolve Memetrader port from site.conf');
      }
      return raw;
    }

    async function isRunning() {
      var res = await bridgeExec(commands.isRunning);
      return String((res && res.stdout) || '').trim() === 'yes';
    }

    async function waitUntilRunning(timeoutMs) {
      var start = Date.now();
      while (Date.now() - start < timeoutMs) {
        try {
          if (await isRunning()) {
            return true;
          }
        } catch (_) {
          // Keep polling.
        }
        await new Promise(function (resolve) { setTimeout(resolve, 125); });
      }
      return false;
    }

    async function ensureSiteIfNeeded() {
      await bridgeExec(commands.ensureSite);
    }

    async function startWithFallbackPort() {
      await bridgeExec(commands.startDetached);
      if (await waitUntilRunning(7000)) {
        return;
      }

      await bridgeExec(commands.ensureUsablePort);
      await bridgeExec(commands.startDetached);
      if (await waitUntilRunning(5000)) {
        return;
      }

      throw new Error('daemon start timed out');
    }

    async function boot() {
      var iframe = document.getElementById('app');
      try {
        await waitForBridge(4000);
        appFrameLoaded = false;
        appInnerReady = false;
        if (hideFallbackTimer) {
          clearTimeout(hideFallbackTimer);
          hideFallbackTimer = null;
        }

        setStatus('Loading...', false);
        await ensureSiteIfNeeded();

        if (await isRunning()) {
          var hotPort = await resolvePort();
          iframe.onload = function () {
            appFrameLoaded = true;
            maybeHideStatus();
            if (!hideFallbackTimer) {
              hideFallbackTimer = setTimeout(function () {
                appInnerReady = true;
                maybeHideStatus();
              }, 9000);
            }
          };
          iframe.src = 'http://localhost:' + hotPort + entryPath + '?v=' + Date.now();
          return;
        }

        setStatus('Loading...', false);
        try {
          await bridgeExec(commands.ensureUsablePort);
        } catch (_) {
          // Non-fatal.
        }
        await startWithFallbackPort();

        var port = await resolvePort();
        iframe.onload = function () {
          appFrameLoaded = true;
          maybeHideStatus();
          if (!hideFallbackTimer) {
            hideFallbackTimer = setTimeout(function () {
              appInnerReady = true;
              maybeHideStatus();
            }, 9000);
          }
        };
        iframe.src = 'http://localhost:' + port + entryPath + '?v=' + Date.now();
      } catch (error) {
        iframe.src = 'about:blank';
        setStatus('Error: ' + String(error && error.message ? error.message : error), true);
      }
    }

    window.addEventListener('message', function (event) {
      var data = event && event.data;
      if (!data || data.type !== 'memetrader-ready') {
        return;
      }
      appInnerReady = true;
      if (hideFallbackTimer) {
        clearTimeout(hideFallbackTimer);
        hideFallbackTimer = null;
      }
      maybeHideStatus();
    });

    window.addEventListener('DOMContentLoaded', function () {
      holdUntil = Date.now() + 550;
      setStatus('Loading...', false);
      setTimeout(boot, 20);
    });
  </script>
</body>
</html>
