<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artificer Desktop</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0e151b; color: #e6eef7; }
    header { padding: 0.9rem 1rem; border-bottom: 1px solid #263340; display: flex; gap: 0.6rem; align-items: center; }
    button { background: #1d2a36; color: #e6eef7; border: 1px solid #2f4356; border-radius: 6px; padding: 0.45rem 0.7rem; cursor: pointer; }
    pre { margin: 0; padding: 0.8rem 1rem; border-bottom: 1px solid #263340; min-height: 5rem; white-space: pre-wrap; }
    iframe { width: 100%; height: calc(100vh - 160px); border: none; }
  </style>
</head>
<body>
  <header>
    <strong>Artificer</strong>
    <button onclick="run('build')">Build</button>
    <button onclick="run('start')">Start</button>
    <button onclick="run('stop')">Stop</button>
    <button onclick="refreshFrame()">Refresh</button>
  </header>
  <pre id="log">ready</pre>
  <iframe id="app" src="about:blank" title="Artificer"></iframe>

  <script>
    (function loadBridge() {
      var candidates = ['./.host/shared/wizardry-bridge.js', '../.host/shared/wizardry-bridge.js'];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onload = function () {};
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>
  <script>
    const siteName = 'artificer';
    const entryPath = '/pages/index.html';

    const commands = {
      build: ['web-wizardry', 'build', 'artificer'],
      start: ['web-wizardry', 'serve', 'artificer'],
      stop: ['web-wizardry', 'stop', 'artificer'],
      getPort: ['sh', '-c', 'cfg="$HOME/sites/artificer/site.conf"; if [ -f "$cfg" ]; then sed -n "s/^port=//p" "$cfg" | head -n 1; fi']
    };

    function getLog() {
      return document.getElementById('log');
    }

    async function bridgeExec(argv) {
      return window.wizardry.rpc('bridge.exec', { argv: argv });
    }

    async function resolveAppUrl() {
      const res = await bridgeExec(commands.getPort);
      const raw = (res.stdout || '').trim();
      const port = /^[0-9]+$/.test(raw) ? raw : '';
      if (!port) {
        throw new Error(`unable to resolve port for '${siteName}' from $HOME/sites/${siteName}/site.conf`);
      }
      return `http://localhost:${port}${entryPath}`;
    }

    async function loadFrame() {
      const iframe = document.getElementById('app');
      const log = getLog();
      try {
        const url = await resolveAppUrl();
        iframe.src = url;
        log.textContent = `loaded ${url}`;
      } catch (err) {
        iframe.src = 'about:blank';
        log.textContent = `error: ${err.message}`;
      }
    }

    async function run(action) {
      const log = getLog();
      try {
        const res = await bridgeExec(commands[action]);
        log.textContent = [
          `exit=${res.exit_code}`,
          res.stdout || '',
          res.stderr || ''
        ].filter(Boolean).join('\n');
        if (action === 'start' || action === 'build') {
          await loadFrame();
        }
        if (action === 'stop') {
          document.getElementById('app').src = 'about:blank';
        }
      } catch (err) {
        log.textContent = `error: ${err.message}`;
      }
    }

    function refreshFrame() {
      loadFrame();
    }

    window.addEventListener('DOMContentLoaded', function () {
      loadFrame();
    });
  </script>
</body>
</html>
