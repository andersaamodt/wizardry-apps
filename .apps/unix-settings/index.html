<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIX Settings</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b121a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b121a;
    }

    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #0b121a;
      color: #9bb0c8;
      font-size: 0.95rem;
      z-index: 10;
      transition: opacity 120ms ease;
    }

    #status.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #status.error {
      color: #ffb4b4;
      white-space: pre-wrap;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div id="status">Starting UNIX Settings…</div>
  <iframe id="app" src="about:blank" title="UNIX Settings"></iframe>

  <script>
    (function loadBridge() {
      var candidates = [
        './.host/shared/wizardry-bridge.js',
        '../.host/shared/wizardry-bridge.js',
        '../../.host/shared/wizardry-bridge.js'
      ];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var siteName = 'unix-settings';
    var entryPath = '/pages/index.html';
    var launchedServer = false;
    var wasRunningAtBoot = false;

    var commands = {
      ensureSite: [
        'sh',
        '-c',
        'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; site="$root/' + siteName + '"; cfg="$site/site.conf"; built="$site/build/pages/index.html"; if [ ! -f "$cfg" ]; then create-from-template ' + siteName + ' unix-settings; web-wizardry build ' + siteName + '; elif [ ! -f "$built" ]; then web-wizardry build ' + siteName + '; fi'
      ],
      start: ['web-wizardry', 'serve', siteName],
      stop: ['web-wizardry', 'stop', siteName],
      setPort: ['change-site-port', siteName],
      getPort: ['sh', '-c', 'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/' + siteName + '/site.conf"; if [ -f "$cfg" ]; then sed -n "s/^port=//p" "$cfg" | head -n 1; fi'],
      isRunning: ['sh', '-c', 'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; pidf="$root/' + siteName + '/nginx/nginx.pid"; if [ -f "$pidf" ] && pid=$(cat "$pidf" 2>/dev/null) && [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then printf "yes"; else printf "no"; fi']
    };

    function statusEl() {
      return document.getElementById('status');
    }

    function setStatus(text, isError) {
      var el = statusEl();
      el.textContent = text;
      el.className = isError ? 'error' : '';
    }

    function hideStatus() {
      statusEl().classList.add('hidden');
    }

    function hasBridge() {
      return !!(window.wizardry && typeof window.wizardry.rpc === 'function');
    }

    async function waitForBridge(timeoutMs) {
      var start = Date.now();
      while (!hasBridge()) {
        if (Date.now() - start > (timeoutMs || 4000)) {
          throw new Error('wizardry bridge unavailable; run this app in the native host');
        }
        await new Promise(function (resolve) { setTimeout(resolve, 50); });
      }
    }

    async function bridgeExec(argv) {
      await waitForBridge(4000);
      var res = await window.wizardry.rpc('bridge.exec', { argv: argv });
      var code = Number(res && res.exit_code);
      if (!Number.isFinite(code) || code === 0) {
        return res || {};
      }
      var stderr = String((res && res.stderr) || '').trim();
      var stdout = String((res && res.stdout) || '').trim();
      var detail = stderr || stdout || ('exit ' + code);
      throw new Error(detail);
    }

    async function resolvePort() {
      var result = await bridgeExec(commands.getPort);
      var raw = String((result && result.stdout) || '').trim();
      if (!/^[0-9]+$/.test(raw)) {
        throw new Error('unable to resolve UNIX Settings port from site.conf');
      }
      return raw;
    }

    async function isRunning() {
      var result = await bridgeExec(commands.isRunning);
      return String((result && result.stdout) || '').trim() === 'yes';
    }

    async function stopIfOwned() {
      if (!launchedServer || wasRunningAtBoot) {
        return;
      }
      try {
        await bridgeExec(commands.stop);
      } catch (_) {
        // Best-effort shutdown when window closes.
      }
    }

    async function startWithFallbackPort() {
      try {
        await bridgeExec(commands.start);
        return;
      } catch (error) {
        var message = String(error && error.message ? error.message : error);
        if (message.indexOf('Address already in use') === -1) {
          throw error;
        }
      }

      for (var port = 8081; port <= 8120; port += 1) {
        try {
          await bridgeExec(commands.setPort.concat(String(port)));
          await bridgeExec(commands.start);
          return;
        } catch (_) {
          // Try next port.
        }
      }

      throw new Error('daemon start failed: no free port found near 8080');
    }

    async function boot() {
      var frame = document.getElementById('app');
      try {
        await waitForBridge(4000);

        wasRunningAtBoot = await isRunning();
        if (!wasRunningAtBoot) {
          setStatus('Preparing UNIX Settings…', false);
          await bridgeExec(commands.ensureSite);
          setStatus('Starting UNIX Settings…', false);
          await startWithFallbackPort();
          launchedServer = true;
        }

        var port = await resolvePort();
        var url = 'http://localhost:' + port + entryPath;
        frame.onload = hideStatus;
        frame.src = url;
      } catch (error) {
        frame.src = 'about:blank';
        setStatus('Error: ' + String(error && error.message ? error.message : error), true);
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      setTimeout(boot, 20);
    });
    window.addEventListener('pagehide', stopIfOwned);
    window.addEventListener('beforeunload', stopIfOwned);
  </script>
</body>
</html>
