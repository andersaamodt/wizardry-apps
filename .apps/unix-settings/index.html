<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIX Settings</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b121a;
      color: #d8e2ee;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .status {
      margin: 0;
      padding: 0.64rem 0.9rem;
      border-bottom: 1px solid #263547;
      background: #101823;
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 0.82rem;
      color: #9bb0c8;
      white-space: pre-wrap;
      min-height: 1.35rem;
    }

    iframe {
      border: 0;
      width: 100%;
      height: 100%;
      background: #07101a;
    }
  </style>
</head>
<body>
  <div id="status" class="status">Starting UNIX Settings…</div>
  <iframe id="settings-frame" src="about:blank" title="UNIX Settings"></iframe>

  <script>
    (function loadBridge() {
      var candidates = ['./.host/shared/wizardry-bridge.js', '../.host/shared/wizardry-bridge.js'];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var siteName = 'unix-settings';
    var entryPath = '/pages/index.html';
    var commands = {
      start: ['web-wizardry', 'serve', siteName],
      getPort: ['sh', '-c', 'cfg="$HOME/sites/' + siteName + '/site.conf"; if [ -f "$cfg" ]; then sed -n "s/^port=//p" "$cfg" | head -n 1; fi']
    };

    function statusLine(text) {
      var status = document.getElementById('status');
      if (status) {
        status.textContent = text;
      }
    }

    function bridgeExec(argv) {
      if (!window.wizardry || typeof window.wizardry.rpc !== 'function') {
        throw new Error('wizardry bridge unavailable');
      }
      return window.wizardry.rpc('bridge.exec', { argv: argv });
    }

    async function resolvePort() {
      var result = await bridgeExec(commands.getPort);
      var raw = String((result && result.stdout) || '').trim();
      if (!/^[0-9]+$/.test(raw)) {
        throw new Error('unable to resolve UNIX Settings port from site.conf');
      }
      return raw;
    }

    async function boot() {
      var frame = document.getElementById('settings-frame');
      try {
        statusLine('Starting UNIX Settings daemon…');
        await bridgeExec(commands.start);
        var port = await resolvePort();
        var url = 'http://localhost:' + port + entryPath;
        frame.src = url;
        statusLine('Running: ' + url);
      } catch (error) {
        frame.src = 'about:blank';
        statusLine('Error: ' + String(error && error.message ? error.message : error));
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      // Wait one tick so bridge loader can attach window.wizardry.
      setTimeout(boot, 20);
    });
  </script>
</body>
</html>
