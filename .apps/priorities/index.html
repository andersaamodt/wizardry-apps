<!DOCTYPE html>
<html lang="en" class="priorities-booting">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priorities</title>
  <style>
    html.priorities-booting,
    html.priorities-booting body {
      background: #ffffff;
    }

    html.priorities-booting #startup-modal,
    html.priorities-booting main.app {
      visibility: hidden;
    }

  </style>
  <link rel="stylesheet" href="style.css">
  <link id="priorities-theme-stylesheet" rel="stylesheet" href="themes/psionic.css?v=priorities20260220a">
</head>
<body>
  <div id="startup-modal" class="startup-modal hidden" role="dialog" aria-modal="true" aria-labelledby="startup-title">
    <div class="startup-card">
      <h2 id="startup-title">Choose Priorities Folder</h2>
      <p>Type a path or browse for the folder containing your priorities.</p>
      <div class="startup-row">
        <input id="startup-path" type="text" placeholder="/path/to/folder" spellcheck="false">
        <button id="startup-browse" type="button">Browse</button>
      </div>
      <div class="startup-actions">
        <button id="startup-open" type="button">Open Folder</button>
      </div>
    </div>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="topbar-main">
        <div class="title-cluster">
          <button id="drill-up" class="drill-up hidden" type="button" title="Up one level" aria-label="Up one level">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7.5a2 2 0 0 1 2-2h4l1.5 2H18a2 2 0 0 1 2 2V17a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M12 15V10M12 10l-2 2M12 10l2 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <h1 id="title-folder">Priorities</h1>
        </div>
        <div class="right-tools">
          <div class="dock-toolbar" role="group" aria-label="Window position">
            <button id="dock-left" class="corner-dock" type="button" title="Move to top-left corner" aria-label="Move to top-left corner">◀</button>
            <button id="dock-center" class="corner-dock corner-dock-center" type="button" title="Move to top-center" aria-label="Move to top-center">•</button>
            <button id="dock-right" class="corner-dock" type="button" title="Move to top-right corner" aria-label="Move to top-right corner">▶</button>
          </div>
          <button id="settings-toggle" class="settings-toggle" type="button" aria-expanded="false" title="Settings">
            <svg class="settings-gear-glyph" viewBox="0 0 14 14" aria-hidden="true" focusable="false">
              <path d="M14 8.3V5.73l-1.58-.264c-.117-.44-.292-.848-.496-1.2l.93-1.285-1.81-1.84-1.31.908c-.371-.205-.781-.38-1.187-.497L8.288 0H5.72l-.263 1.578c-.437.117-.816.293-1.196.497L2.979 1.17 1.141 2.98l.934 1.287c-.2.38-.376.79-.493 1.228L.004 5.73V8.3l1.575.264c.117.438.292.818.496 1.198l-.93 1.315 1.809 1.813 1.312-.938c.38.205.787.38 1.224.497l.26 1.55h2.566l.263-1.58c.408-.117.817-.293 1.196-.497l1.315.935 1.81-1.812-.935-1.315c.203-.38.38-.76.495-1.2L14 8.305zM7 9.704c-1.488 0-2.683-1.2-2.683-2.69S5.542 4.327 7 4.327s2.683 1.198 2.683 2.69c0 1.49-1.195 2.688-2.683 2.688z" fill="currentColor"/>
            </svg>
          </button>
          <button id="copy-markdown" class="copy-markdown-toggle" type="button" title="Copy visible priorities as markdown">
            <svg class="copy-markdown-glyph" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 4h9a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M5 8H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <section id="settings-panel" class="settings-panel hidden popover" aria-label="Settings">
      <div class="settings-row">
        <label for="root-dir">Folder</label>
        <div class="root-row">
          <input id="root-dir" type="text" value="." spellcheck="false">
          <button id="browse" type="button">Browse</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </div>
      <div class="settings-row">
        <label for="theme-picker-btn">Theme</label>
        <div class="menu-anchor">
          <button id="theme-picker-btn" type="button" class="theme-picker-btn" aria-haspopup="menu" aria-expanded="false">Psionic</button>
          <div id="theme-picker-menu" class="floating-menu hidden" role="menu" aria-label="Theme selector">
            <div id="theme-picker-list" class="menu-list"></div>
          </div>
        </div>
      </div>
      <div class="settings-row">
        <label for="font-select">Font</label>
        <select id="font-select" class="font-select" aria-label="Font"></select>
      </div>
      <div class="settings-row">
        <label for="text-size-value">Scale</label>
        <div class="text-size-row">
          <div class="scale-stepper" role="group" aria-label="Scale">
            <button id="text-size-decrease" type="button" class="scale-btn" title="Decrease scale" aria-label="Decrease scale">−</button>
            <span id="text-size-value" class="text-size-value">100%</span>
            <button id="text-size-increase" type="button" class="scale-btn" title="Increase scale" aria-label="Increase scale">+</button>
          </div>
          <button id="text-size-reset" type="button" class="scale-reset" title="Reset scale">Reset</button>
        </div>
      </div>
    </section>

    <div id="loading-overlay" class="loading-overlay hidden" aria-hidden="true">
      <div class="loading-card">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span class="loading-text">Loading...</span>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite" aria-hidden="true"></div>
    <div id="tree" class="tree" aria-live="polite"></div>
  </main>

  <script>
    (function loadBridge() {
      var candidates = [
        './.host/shared/wizardry-bridge.js',
        '../.host/shared/wizardry-bridge.js',
        '../../.host/shared/wizardry-bridge.js'
      ];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var THEME_KEY = 'wizardry.priorities.theme';
    var FONT_KEY = 'wizardry.priorities.font';
    var UI_SCALE_KEY = 'wizardry.priorities.uiScale';
    var TEXT_SCALE_KEY = 'wizardry.priorities.textScale';
    var ROOT_KEY = 'priorities.root';
    var SNAPSHOT_PREF = 'startup_snapshot';
    var NEXT_ACTION_CACHE_KEY = 'wizardry.priorities.nextActionCache';
    var THEME_ASSET_VERSION = 'priorities20260220a';
    var DEFAULT_THEMES = [
      'adept', 'alchemist', 'archmage', 'athenian', 'chronomancer', 'conjurer', 'druid',
      'empath', 'enchanter', 'geomancer', 'hermeticist', 'hierophant', 'illusionist',
      'lich', 'necromancer', 'psionic', 'pyromancer', 'seer', 'shaman', 'sorcerer', 'sorceress',
      'technomancer', 'thaumaturge', 'thelemite', 'theurgist', 'wadjet', 'warlock', 'wizard'
    ];

    var state = {
      root: '.',
      expanded: Object.create(null),
      cache: Object.create(null),
      cacheAliases: Object.create(null),
      nextActionLabelCache: Object.create(null),
      pendingNextAction: Object.create(null),
      busy: false,
      pendingPrioritizePath: '',
      pendingCheckPath: '',
      pendingExpandPath: '',
      pendingDirRevalidate: Object.create(null),
      pendingAdd: false,
      pendingAddSave: false,
      pendingMakeProjectPath: '',
      revealedMakeProjectPath: '',
      openMenuPath: '',
      editingPath: '',
      pendingRenamePath: '',
      pendingAddText: '',
      addQueue: [],
      addQueueActive: false,
      prioritizeQueue: [],
      prioritizeQueueActive: false,
      uiScale: 1,
      drillStack: [],
      rowClickTimer: null,
      themes: ['psionic'],
      activeTheme: '',
      activeFont: '',
      fontOptions: [],
      themeHotkeysEnabled: false,
      dockState: 'none',
      dockPollTimer: null,
      backendScriptPath: '',
      rootCeiling: '',
      windowWidthRequested: 0,
      windowHeightRequested: 640,
      windowAutoGrowTimer: null,
      windowSizingReady: false,
      uiPrefs: {},
      rootPrefSaveTimer: null,
      snapshotPrefSaveTimer: null,
      nextActionCacheSaveTimer: null,
      startupSnapshotRestored: false,
      hostBootReadySent: false,
      snapshotLastSerialized: ''
    };

    function parseKeyValueText(blob) {
      var out = {};
      String(blob || '').split('\n').forEach(function (line) {
        if (!line) {
          return;
        }
        var idx = line.indexOf('=');
        if (idx <= 0) {
          return;
        }
        out[line.slice(0, idx)] = line.slice(idx + 1);
      });
      return out;
    }

    function prefNameForStorageKey(storageKey) {
      if (storageKey === THEME_KEY) return 'theme';
      if (storageKey === FONT_KEY) return 'font';
      if (storageKey === UI_SCALE_KEY || storageKey === TEXT_SCALE_KEY) return 'ui_scale';
      if (storageKey === ROOT_KEY) return 'root';
      if (storageKey === SNAPSHOT_PREF) return SNAPSHOT_PREF;
      if (storageKey === NEXT_ACTION_CACHE_KEY) return 'next_action_cache';
      return '';
    }

    function prefValue(prefName, fallback) {
      var value = state.uiPrefs[prefName];
      if (typeof value === 'string' && value !== '') {
        return value;
      }
      return fallback || '';
    }

    async function persistUiPref(prefName, value) {
      if (!prefName) {
        return;
      }
      try {
        await runBackend(['set-ui-pref', prefName, String(value || '')]);
      } catch (_) {
        return;
      }
    }

    async function loadUiPrefs() {
      try {
        var result = await runBackend(['get-ui-prefs']);
        state.uiPrefs = parseKeyValueText((result && result.stdout) || '');
      } catch (_) {
        state.uiPrefs = {};
      }
    }

    function saveStorage(storageKey, value) {
      var prefName = prefNameForStorageKey(storageKey);
      if (!prefName) {
        return;
      }
      var normalized = String(value || '');
      if (state.uiPrefs[prefName] === normalized) {
        return;
      }
      state.uiPrefs[prefName] = normalized;
      persistUiPref(prefName, normalized);
    }

    function loadStorage(storageKey) {
      var prefName = prefNameForStorageKey(storageKey);
      if (!prefName) {
        return '';
      }
      return prefValue(prefName, '');
    }

    function clampTextScale(value) {
      var n = Number(value);
      if (!Number.isFinite(n)) {
        return 1;
      }
      if (n < 0.8) {
        return 0.8;
      }
      if (n > 1.6) {
        return 1.6;
      }
      return Math.round(n * 100) / 100;
    }

    function updateTextSizeDisplays() {
      var percent = Math.round(state.uiScale * 100) + '%';
      var el = document.getElementById('text-size-value');
      if (el) {
        el.textContent = percent;
      }
      var reset = document.getElementById('text-size-reset');
      if (reset) {
        reset.hidden = Math.abs(state.uiScale - 1) < 0.001;
        reset.disabled = reset.hidden;
      }
    }

    function applyTextScale(nextScale) {
      state.uiScale = clampTextScale(nextScale);
      saveStorage(UI_SCALE_KEY, String(state.uiScale));
      document.documentElement.style.setProperty('--ui-scale', String(state.uiScale));
      document.documentElement.style.setProperty('--text-scale', String(state.uiScale));
      updateTextSizeDisplays();
      scheduleAutoGrowWindowWidth();
    }

    function increaseTextScale() {
      applyTextScale(state.uiScale + 0.1);
    }

    function decreaseTextScale() {
      applyTextScale(state.uiScale - 0.1);
    }

    function resetTextScale() {
      applyTextScale(1);
    }

    function hasBridge() {
      return !!(window.wizardry && typeof window.wizardry.rpc === 'function');
    }

    async function waitForBridge(timeoutMs) {
      var start = Date.now();
      while (!hasBridge()) {
        if (Date.now() - start > (timeoutMs || 4000)) {
          throw new Error('wizardry bridge unavailable; run this app in the native host');
        }
        await new Promise(function (resolve) { setTimeout(resolve, 50); });
      }
    }

    async function bridgeExec(argv) {
      await waitForBridge(4000);
      var res = await window.wizardry.rpc('bridge.exec', { argv: argv });
      var code = Number(res && res.exit_code);
      if (!Number.isFinite(code) || code === 0) {
        return res || {};
      }
      var stderr = String((res && res.stderr) || '').trim();
      var stdout = String((res && res.stdout) || '').trim();
      throw new Error(stderr || stdout || ('exit ' + code));
    }

    async function requestWindowShape() {
      try {
        var width = clampAutoWindowWidth(Number(window.innerWidth) || 420);
        var height = state.windowHeightRequested || 640;
        state.windowWidthRequested = width;
        state.windowHeightRequested = height;
        await bridgeExec(['__wizardry_host_pin_top']);
        await bridgeExec(['__wizardry_host_center_x']);
        await refreshDockState();
      } catch (_) {
        // Ignore host resize errors.
      }
    }

    function clampAutoWindowWidth(widthPx) {
      var n = Number(widthPx);
      if (!Number.isFinite(n)) {
        return 0;
      }
      var minWidth = 300;
      var maxWidth = 920;
      var availWidth = 0;
      try {
        availWidth = Number(window.screen && window.screen.availWidth) || 0;
      } catch (_) {
        availWidth = 0;
      }
      if (availWidth > 0) {
        maxWidth = Math.min(maxWidth, Math.max(minWidth, Math.floor(availWidth * 0.92)));
      }
      if (n < minWidth) {
        n = minWidth;
      }
      if (n > maxWidth) {
        n = maxWidth;
      }
      return Math.round(n);
    }

    function computeAutoWindowWidthFromContent() {
      var app = document.querySelector('.app');
      if (!app) {
        return 0;
      }
      var top = document.querySelector('.topbar-main');
      var tree = document.getElementById('tree');
      var contentWidth = 0;
      if (top) {
        contentWidth = Math.max(contentWidth, Math.ceil(top.scrollWidth));
      }
      if (tree) {
        contentWidth = Math.max(contentWidth, Math.ceil(tree.scrollWidth));
      }
      if (contentWidth <= 0) {
        return 0;
      }
      var styles = window.getComputedStyle(app);
      var padLeft = parseFloat(styles.paddingLeft || '0') || 0;
      var padRight = parseFloat(styles.paddingRight || '0') || 0;
      var chromeAllowance = 18;
      return clampAutoWindowWidth(contentWidth + padLeft + padRight + chromeAllowance);
    }

    async function maybeAutoGrowWindowWidth() {
      if (!hasBridge()) {
        return;
      }
      var desired = computeAutoWindowWidthFromContent();
      if (!desired) {
        return;
      }
      var current = Number(state.windowWidthRequested) || 0;
      if (desired <= current + 2) {
        return;
      }
      state.windowWidthRequested = desired;
      try {
        await bridgeExec(['__wizardry_host_resize', String(desired), String(state.windowHeightRequested || 640)]);
        await bridgeExec(['__wizardry_host_pin_top']);
        if (state.dockState !== 'left' && state.dockState !== 'right') {
          await bridgeExec(['__wizardry_host_center_x']);
        }
      } catch (_) {
        // Ignore host resize errors.
      }
    }

    function scheduleAutoGrowWindowWidth() {
      if (!state.windowSizingReady) {
        return;
      }
      if (state.windowAutoGrowTimer) {
        clearTimeout(state.windowAutoGrowTimer);
      }
      state.windowAutoGrowTimer = setTimeout(function () {
        state.windowAutoGrowTimer = null;
        maybeAutoGrowWindowWidth();
      }, 28);
    }

    async function dockWindow(side) {
      try {
        if (side === 'left') {
          await bridgeExec(['__wizardry_host_snap_top_left']);
        } else if (side === 'center') {
          await bridgeExec(['__wizardry_host_pin_top']);
          await bridgeExec(['__wizardry_host_center_x']);
        } else if (side === 'right') {
          await bridgeExec(['__wizardry_host_snap_top_right']);
        }
        await refreshDockState();
        return;
      } catch (_) {
        // Fallback for older hosts: at least pin to top.
      }
      try {
        await bridgeExec(['__wizardry_host_pin_top']);
        await refreshDockState();
      } catch (error) {
        status('Window docking requires updated mac host build.', true);
      }
    }

    function setDockButtonsDisabled(activeDock) {
      var left = document.getElementById('dock-left');
      var center = document.getElementById('dock-center');
      var right = document.getElementById('dock-right');
      if (!left || !center || !right) {
        return;
      }
      left.disabled = false;
      center.disabled = false;
      right.disabled = false;
      left.classList.toggle('snap-active-hidden', activeDock === 'left');
      center.classList.toggle('snap-active-hidden', activeDock === 'center');
      right.classList.toggle('snap-active-hidden', activeDock === 'right');
    }

    async function refreshDockState() {
      try {
        var result = await bridgeExec(['__wizardry_host_snap_state']);
        var stateText = String((result && result.stdout) || '').trim();
        if (stateText !== 'left' && stateText !== 'center' && stateText !== 'right') {
          stateText = 'none';
        }
        state.dockState = stateText;
        setDockButtonsDisabled(stateText);
      } catch (_) {
        state.dockState = 'none';
        setDockButtonsDisabled('none');
      }
    }

    function status(text, isError) {
      var el = document.getElementById('toast');
      if (!el) {
        return;
      }
      var message = String(text || '').trim();
      if (el._hideTimer) {
        clearTimeout(el._hideTimer);
        el._hideTimer = null;
      }
      if (el._clearTimer) {
        clearTimeout(el._clearTimer);
        el._clearTimer = null;
      }
      if (!message) {
        el.classList.remove('visible', 'fading-out', 'error', 'success');
        el.classList.add('hidden');
        el.textContent = '';
        el.setAttribute('aria-hidden', 'true');
        return;
      }
      el.textContent = message;
      el.classList.toggle('error', !!isError);
      el.classList.toggle('success', !isError);
      el.classList.remove('hidden', 'fading-out', 'visible');
      void el.offsetWidth;
      el.classList.add('visible');
      el.setAttribute('aria-hidden', 'false');
      el._hideTimer = setTimeout(function () {
        el._hideTimer = null;
        el.classList.remove('visible');
        el.classList.add('fading-out');
        el.setAttribute('aria-hidden', 'true');
        el._clearTimer = setTimeout(function () {
          el._clearTimer = null;
          el.classList.add('hidden');
          el.classList.remove('fading-out', 'error', 'success');
          el.textContent = '';
        }, 210);
      }, 3000);
    }

    function setLoadingOverlay(visible) {
      var el = document.getElementById('loading-overlay');
      if (!el) {
        return;
      }
      if (visible) {
        if (el._hideTimer) {
          clearTimeout(el._hideTimer);
          el._hideTimer = null;
        }
        el.classList.remove('hidden');
        el.classList.add('visible');
        el.classList.remove('fading-out');
        el.setAttribute('aria-hidden', 'false');
        return;
      }
      if (el.classList.contains('hidden')) {
        return;
      }
      el.classList.remove('visible');
      el.classList.add('fading-out');
      el.setAttribute('aria-hidden', 'true');
      el._hideTimer = setTimeout(function () {
        el.classList.add('hidden');
        el.classList.remove('fading-out');
        el._hideTimer = null;
      }, 220);
    }

    function revealBootUi() {
      document.documentElement.classList.remove('priorities-booting');
      if (state.hostBootReadySent) {
        return;
      }
      state.hostBootReadySent = true;
      if (hasBridge()) {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            bridgeExec(['__wizardry_host_boot_ready']).catch(function () {
              return;
            });
          });
        });
      }
    }

    function decodeSnapshotPayload(encoded) {
      var raw = String(encoded || '').trim();
      if (!raw) {
        return null;
      }
      try {
        return JSON.parse(decodeURIComponent(escape(window.atob(raw))));
      } catch (_) {
        return null;
      }
    }

    function encodeSnapshotPayload(payload) {
      try {
        return window.btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      } catch (_) {
        return '';
      }
    }

    function restoreStartupSnapshotFromPrefs() {
      // Snapshot restore is disabled so first visible paint always reflects
      // authoritative backend state (checkboxes and next actions).
      return false;
    }

    function saveStartupSnapshot() {
      if (state.snapshotPrefSaveTimer) {
        clearTimeout(state.snapshotPrefSaveTimer);
      }
      state.snapshotPrefSaveTimer = setTimeout(function () {
        state.snapshotPrefSaveTimer = null;
        var tree = treeEl();
        var root = String(state.root || '').trim();
        if (!tree || !root || !tree.childNodes || !tree.childNodes.length) {
          return;
        }
        var payload = {
          root: root,
          title: String((document.getElementById('title-folder') || {}).textContent || ''),
          treeHtml: tree.innerHTML,
          savedAt: Date.now()
        };
        var encoded = encodeSnapshotPayload(payload);
        if (!encoded || state.snapshotLastSerialized === encoded) {
          return;
        }
        state.snapshotLastSerialized = encoded;
        saveStorage(SNAPSHOT_PREF, encoded);
      }, 180);
    }

    function rootInputValue() {
      return String(document.getElementById('root-dir').value || '.').trim() || '.';
    }

    function normalizeRootPath(path) {
      var raw = String(path || '').trim();
      if (!raw) {
        return '';
      }
      if (raw === '/') {
        return '/';
      }
      var normalized = raw.replace(/\/+$/, '');
      return normalized || '/';
    }

    function folderNameFromPath(path) {
      var p = String(path || '').replace(/\/+$/, '');
      if (!p || p === '.') {
        return '.';
      }
      if (p === '/') {
        return '/';
      }
      var slash = p.lastIndexOf('/');
      if (slash < 0) {
        return p;
      }
      return p.slice(slash + 1) || '/';
    }

    function parentDirOfPath(path) {
      var p = String(path || '').replace(/\/+$/, '');
      if (!p || p === '.') {
        return '.';
      }
      if (p === '/') {
        return '/';
      }
      var slash = p.lastIndexOf('/');
      if (slash < 0) {
        return '.';
      }
      if (slash === 0) {
        return '/';
      }
      return p.slice(0, slash);
    }

    function renamedSiblingPath(path, nextName) {
      var p = String(path || '').replace(/\/+$/, '');
      var name = String(nextName || '').trim();
      if (!p || !name) {
        return p || name;
      }
      var slash = p.lastIndexOf('/');
      if (slash < 0) {
        return name;
      }
      if (slash === 0) {
        return '/' + name;
      }

      var pathB = String((b && b.path) || '');

    function applyOptimisticPrioritize(dir, path) {

      var start = Number.isFinite(snapshot.start) ? Math.max(0, Math.min(valueLen, snapshot.start)) : valueLen;
      var end = Number.isFinite(snapshot.end) ? Math.max(0, Math.min(valueLen, snapshot.end)) : start;
      try {
        input.setSelectionRange(start, end, snapshot.direction);
      } catch (_) {
        // Ignore selection restore failures.
      }
    }

    function getVisiblePrioritiesMarkdown() {
      var rows = treeEl().querySelectorAll('.row[data-path]');
      var lines = [];
      for (var i = 0; i < rows.length; i += 1) {
        var row = rows[i];
        var depth = Number(row.getAttribute('data-depth'));
        if (!Number.isFinite(depth) || depth < 0) {
          depth = 0;
        }
        var checkbox = row.querySelector('.chk');
        var checked = checkbox && checkbox.checked ? 'x' : ' ';
        var edit = row.querySelector('.name-edit');
        var nameEl = row.querySelector('.name');
        var name = edit ? edit.value : (nameEl ? nameEl.textContent : '');
        name = normalizeMarkdownLineText(name);
        if (!name) {

        }
        lines.push(new Array(depth + 1).join('  ') + '- [' + checked + '] ' + name);

      return lines.join('\n');

    async function copyTextToClipboard(text) {
      var value = String(text || '');
      if (!value) {
        return false;
      }
      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(value);
          return true;
        }
      } catch (_) {
        // Fall through to legacy copy path.
      }
      try {
        var helper = document.createElement('textarea');
        helper.value = value;
        helper.setAttribute('readonly', 'readonly');
        helper.style.position = 'fixed';
        helper.style.opacity = '0';
        helper.style.left = '-9999px';
        helper.style.top = '0';
        document.body.appendChild(helper);
        helper.focus();
        helper.select();
        var copied = document.execCommand('copy');
        document.body.removeChild(helper);
        return copied;
      } catch (_) {
        return false;
      }
    }

    function captureRowPositions() {

          left: rect.left,
          width: rect.width

        var pathKey = String(row.getAttribute('data-path') || '').trim();
        if (pathKey) {
          map.byPath[pathKey] = metrics;
        }
        var animKey = String(row.getAttribute('data-anim-key') || '').trim();
        if (animKey) {
          if (!map.byAnimKey[animKey]) {
            map.byAnimKey[animKey] = [];

    function captureEchelonBlockMetrics() {
      var map = {};
      var blocks = treeEl().querySelectorAll('.echelon-block[data-echelon-key]');
      for (var i = 0; i < blocks.length; i += 1) {
        var block = blocks[i];
        var key = String(block.getAttribute('data-echelon-key') || '').trim();
        if (!key) {
          continue;
        }
        var rect = block.getBoundingClientRect();
        map[key] = {
          top: rect.top,
          left: rect.left,
          height: rect.height
        };

      return map;

    function animateEchelonBlockResize(previousMetrics) {
      if (!previousMetrics) {
        return;
      }
      var blocks = treeEl().querySelectorAll('.echelon-block[data-echelon-key]');
      var moved = [];
      for (var i = 0; i < blocks.length; i += 1) {
        var block = blocks[i];
        var key = String(block.getAttribute('data-echelon-key') || '').trim();
        var prev = previousMetrics[key];
        if (!key || !prev || typeof prev.top !== 'number' || typeof prev.left !== 'number' || typeof prev.height !== 'number') {
          continue;
        }
        var rect = block.getBoundingClientRect();
        if (rect.height <= 0) {
          continue;
        }
        var scaleY = prev.height > 0 ? (prev.height / rect.height) : 1;
        if (Math.abs(scaleY - 1) < 0.01) {
          continue;
        }
        block.style.willChange = 'transform';
        block.style.transition = 'none';
        block.style.transformOrigin = 'top';
        block.style.transform = 'scaleY(' + scaleY + ')';
        moved.push(block);
      }
      if (!moved.length) {
        return;
      }
      treeEl().getBoundingClientRect();
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          for (var j = 0; j < moved.length; j += 1) {
            var block = moved[j];
            block.style.transition = 'transform 280ms cubic-bezier(0.2, 0.75, 0.2, 1)';
            block.style.transform = 'scaleY(1)';
            block.addEventListener('transitionend', function onEnd() {
              this.style.transition = '';
              this.style.transform = '';
              this.style.transformOrigin = '';
              this.style.willChange = '';
              this.removeEventListener('transitionend', onEnd);
            });
          }
        });
      });
      setTimeout(function () {
        for (var k = 0; k < moved.length; k += 1) {
          var block = moved[k];
          block.style.transition = '';
          block.style.transform = '';
          block.style.transformOrigin = '';
          block.style.willChange = '';
        }
      }, 380);
    }

    function animateRowReorder(previousPositions) {
      if (!previousPositions || !previousPositions.byPath) {
        return;
      }
      treeEl().classList.add('reordering');
      var consumedAnimMatches = Object.create(null);
      var rows = treeEl().querySelectorAll('.row[data-path]');
      var moved = [];
      for (var i = 0; i < rows.length; i += 1) {
        var row = rows[i];
        var key = String(row.getAttribute('data-path') || '').trim();
        var prev = previousPositions.byPath[key];
        if (!prev) {
          var animKey = String(row.getAttribute('data-anim-key') || '').trim();
          if (animKey) {
            var candidates = previousPositions.byAnimKey[animKey];
            if (candidates && candidates.length) {
              var consumed = consumedAnimMatches[animKey] || 0;
              if (consumed < candidates.length) {
                prev = candidates[consumed];
                consumedAnimMatches[animKey] = consumed + 1;
              }
            }
          }
        }
        if (!key || !prev || typeof prev.top !== 'number' || typeof prev.left !== 'number' || typeof prev.width !== 'number') {
          continue;
        }
        var nextRect = row.getBoundingClientRect();
        var deltaY = prev.top - nextRect.top;
        var deltaX = prev.left - nextRect.left;
        var widthDelta = prev.width - nextRect.width;
        if (Math.abs(deltaY) < 1 && Math.abs(deltaX) < 1 && Math.abs(widthDelta) < 0.5) {
          continue;
        }
        row.style.willChange = 'transform,width';
        row.style.transition = 'none';
        row.style.backfaceVisibility = 'hidden';
        row.style.transform = 'translate3d(' + deltaX + 'px,' + deltaY + 'px,0)';
        if (Math.abs(widthDelta) >= 0.5 && prev.width > 0) {
          row.style.width = prev.width + 'px';
        }
        row.dataset.reorderTargetWidth = nextRect.width > 0 ? String(nextRect.width) : '';
        moved.push(row);
      }
      if (!moved.length) {
        treeEl().classList.remove('reordering');
        return;
      }
      // Force styles to apply before transitioning back to natural position.
      treeEl().getBoundingClientRect();
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          for (var j = 0; j < moved.length; j += 1) {
            var movedRow = moved[j];
            movedRow.style.transition = 'transform 300ms cubic-bezier(0.2, 0.75, 0.2, 1), width 300ms cubic-bezier(0.2, 0.75, 0.2, 1)';
            movedRow.style.transform = 'translate3d(0,0,0)';
            if (movedRow.dataset.reorderTargetWidth) {
              movedRow.style.width = movedRow.dataset.reorderTargetWidth + 'px';
            }
            movedRow.addEventListener('transitionend', function onEnd() {
              this.style.transition = '';
              this.style.transform = '';
              this.style.willChange = '';
              this.style.width = '';
              this.style.backfaceVisibility = '';
              delete this.dataset.reorderTargetWidth;
              this.removeEventListener('transitionend', onEnd);
            });
          }
        });
      });
      setTimeout(function () {
        for (var k = 0; k < moved.length; k += 1) {
          var movedRow = moved[k];
          movedRow.style.transition = '';
          movedRow.style.transform = '';
          movedRow.style.willChange = '';
          movedRow.style.width = '';
          movedRow.style.backfaceVisibility = '';
          delete movedRow.dataset.reorderTargetWidth;
        }
        treeEl().classList.remove('reordering');
      }, 420);
    }

    function themeLabel(name) {
      var value = String(name || '').replace(/[-_]+/g, ' ').trim();
      if (!value) {
        return 'Theme';
      }
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function normalizeThemes(list) {
      var out = [];
      var seen = Object.create(null);
      var input = Array.isArray(list) ? list : [];
      for (var i = 0; i < input.length; i += 1) {
        var item = String(input[i] || '').toLowerCase().trim();
        if (!item || !/^[a-z0-9_-]+$/.test(item) || seen[item]) {
          continue;
        }
        seen[item] = true;
        out.push(item);
      }
      if (!seen.psionic) {
        out.unshift('psionic');
      }
      out.sort(function (a, b) {
        if (a === 'psionic') {
          return -1;
        }
        if (b === 'psionic') {
          return 1;
        }
        return a.localeCompare(b);
      });
      return out;
    }

    function parseThemeListOutput(blob) {
      var list = [];
      String(blob || '').split('\n').forEach(function (line) {
        var value = String(line || '').toLowerCase().trim();
        if (!value) {
          return;
        }
        list.push(value);
      });
      return list;
    }

    function ensureActiveThemeInList() {
      if (!Array.isArray(state.themes) || !state.themes.length) {
        state.themes = ['psionic'];

      if (state.themes.indexOf(state.activeTheme) < 0) {
        if (state.themes.indexOf('psionic') >= 0) {

    async function loadThemes() {
      var themes = DEFAULT_THEMES.slice();

          var result = await runBackend(['list-themes']);
          var loaded = parseThemeListOutput((result && result.stdout) || '');
          if (loaded.length) {
            themes = loaded;
          }
        } catch (_) {
          // Keep default catalog if backend theme load fails.
        }
      }
      state.themes = normalizeThemes(themes);
      ensureActiveThemeInList();
    }

    function renderThemePicker() {
      var list = document.getElementById('theme-picker-list');
      var button = document.getElementById('theme-picker-btn');

      ensureActiveThemeInList();

      }

    function applyTheme(themeName) {
      var normalized = String(themeName || '').toLowerCase().trim();
      if (!/^[a-z0-9_-]+$/.test(normalized) || state.themes.indexOf(normalized) < 0) {
        if (state.themes.indexOf('psionic') >= 0) {
          normalized = 'psionic';
        } else {
          normalized = state.themes[0] || 'psionic';
        }
      }
      var themeChanged = state.activeTheme !== normalized;
      state.activeTheme = normalized;
      if (themeChanged) {
        saveStorage(THEME_KEY, normalized);
      }
      var stylesheet = document.getElementById('priorities-theme-stylesheet');
      if (stylesheet) {
        var nextHref = 'themes/' + normalized + '.css?v=' + THEME_ASSET_VERSION;
        if (String(stylesheet.getAttribute('href') || '') !== nextHref) {
          stylesheet.href = nextHref;
        }
      }
      renderThemePicker();
    }

    function waitForThemeStylesheet(themeName, timeoutMs) {
      return new Promise(function (resolve) {
        var stylesheet = document.getElementById('priorities-theme-stylesheet');
        if (!stylesheet) {
          resolve();
          return;
        }
        var expected = 'themes/' + String(themeName || '').toLowerCase().trim() + '.css?v=' + THEME_ASSET_VERSION;
        var hrefAttr = String(stylesheet.getAttribute('href') || '');
        if (hrefAttr !== expected && hrefAttr.indexOf('/' + String(themeName || '').toLowerCase().trim() + '.css') < 0) {
          resolve();
          return;
        }
        if (stylesheet.sheet) {
          resolve();
          return;
        }
        var done = false;
        var timer = setTimeout(function () {
          if (done) {
            return;
          }
          done = true;
          cleanup();
          resolve();
        }, Math.max(200, Number(timeoutMs) || 1200));
        function cleanup() {
          stylesheet.removeEventListener('load', onDone);
          stylesheet.removeEventListener('error', onDone);
          clearTimeout(timer);
        }
        function onDone() {
          if (done) {
            return;
          }
          done = true;
          cleanup();
          resolve();
        }
        stylesheet.addEventListener('load', onDone);
        stylesheet.addEventListener('error', onDone);
      });
    }

    function cycleTheme(step) {
      var total = state.themes.length;
      if (!total) {
        return;
      }
      var current = state.themes.indexOf(state.activeTheme);
      if (current < 0) {
        current = 0;
      }
      var next = (current + step + total) % total;
      applyTheme(state.themes[next]);
    }

    function detectPlatform() {
      var platform = String(navigator.platform || '').toLowerCase();
      var userAgent = String(navigator.userAgent || '').toLowerCase();
      if (platform.indexOf('mac') >= 0 || userAgent.indexOf('mac os') >= 0) {
        return 'mac';

      if (platform.indexOf('linux') >= 0 || userAgent.indexOf('linux') >= 0) {
        return 'linux';

      if (platform.indexOf('win') >= 0 || userAgent.indexOf('windows') >= 0) {
        return 'windows';
      }
      return 'other';

        if (state.pendingPrioritizePath === path) {

        var queuePosition = getPrioritizeQueuePosition(path);

    function revalidateDirInBackground(path) {
      var key = String(path || '').trim();
      if (!key || state.pendingDirRevalidate[key]) {
        return;
      }
      state.pendingDirRevalidate[key] = true;

    async function renderDir(container, dir, depth, options) {
      var items = getCachedDirItems(dir);
      if (!items) {
        items = await listDir(dir);
        setCachedDirItems(dir, items);
      }

      var insertedAddRow = false;
      var topEchelon = (depth === 0 && items.length) ? items[0].echelon : -1;
      var currentBlock = null;
      var currentBlockEchelon = null;
      for (var i = 0; i < items.length; i += 1) {
        var item = items[i];
        var edgeClass = '';
        if (depth === 0) {
          var prevItem = i > 0 ? items[i - 1] : null;
          var nextItem = i < items.length - 1 ? items[i + 1] : null;
          var startOfEchelon = !prevItem || prevItem.echelon !== item.echelon;
          var endOfEchelon = !nextItem || nextItem.echelon !== item.echelon;
          var topEchelonAddAfter = topEchelon >= 0 && item.echelon === topEchelon && endOfEchelon;
          if (topEchelonAddAfter) {
            if (startOfEchelon) {
              edgeClass = 'echelon-start';
            } else {
              edgeClass = 'echelon-mid';
            }
          } else if (startOfEchelon && endOfEchelon) {
            edgeClass = 'echelon-single';
          } else if (startOfEchelon) {
            edgeClass = 'echelon-start';
          } else if (endOfEchelon) {
            edgeClass = 'echelon-end';
          } else {
            edgeClass = 'echelon-mid';
          }

          if (currentBlockEchelon !== item.echelon) {
            currentBlock = document.createElement('div');
            currentBlock.className = 'echelon-block';
            currentBlock.setAttribute('data-echelon-key', String(depth) + ':' + String(item.echelon));
            container.appendChild(currentBlock);
            currentBlockEchelon = item.echelon;
          }
        }

        var firstRootItem = depth === 0 && i === 0;
        var row = buildRow(item, depth, edgeClass, {
          highlightFirstRow: firstRootItem,
          highlightFirstNextActionPill: firstRootItem && !!item.hasSubpriorities,
          hidePrioritizeButton: firstRootItem
        });
        if (depth === 0 && currentBlock) {
          currentBlock.appendChild(row);
        } else {
          container.appendChild(row);
        }
        if (depth === 0 && !insertedAddRow && topEchelon >= 0) {
          var nextTop = i < items.length - 1 ? items[i + 1] : null;
          var shouldInsertAddHere = item.echelon === topEchelon && (!nextTop || nextTop.echelon !== topEchelon);
          if (shouldInsertAddHere) {
            if (currentBlock) {
              currentBlock.appendChild(buildInlineAddRow(depth, 'echelon-end'));
            } else {
              container.appendChild(buildInlineAddRow(depth, 'echelon-end'));
            }
            insertedAddRow = true;
          }
        }
        if (item.kind === 'dir' && state.expanded[item.path] && item.hasSubpriorities) {
          if (!(options && options.deferPendingExpandPath && options.deferPendingExpandPath === item.path)) {
            var childContainer = (depth === 0 && currentBlock) ? currentBlock : container;
            await renderDir(childContainer, item.path, depth + 1, options);
          }
        }
      }

      if (depth === 0 && !insertedAddRow) {
        container.appendChild(buildInlineAddRow(depth, 'echelon-single'));
      }
    }

    async function render(options) {
      options = options || {};
      var tree = treeEl();
      var previousPositions = null;
      var previousBlockMetrics = null;
      var showOverlay = !options.animateReorder && !options.suppressLoadingOverlay;
      var selectionSnapshot = options.preserveInputSelection ? captureTreeInputSelection() : null;
      if (options.animateReorder) {
        previousPositions = captureRowPositions();
        previousBlockMetrics = captureEchelonBlockMetrics();
      }

      try {
        if (showOverlay) {
          setLoadingOverlay(true);
        }
        var fragment = document.createDocumentFragment();
        await renderDir(fragment, state.root, 0, options);
        tree.replaceChildren(fragment);
        if (selectionSnapshot) {
          restoreTreeInputSelection(selectionSnapshot);
        }

        if (options.animateReorder) {
          animateRowReorder(previousPositions);
          // Disable block scale animation during reorder to avoid vertical
          // squish artifacts on project rows.
        }
        if (!tree.childNodes.length) {
          status('No priorities found.', false);
        } else {
          status('', false);
          saveStartupSnapshot();
        }
      } catch (error) {
        status(String(error && error.message ? error.message : error), true);
      } finally {
        if (showOverlay) {
          setLoadingOverlay(false);
        }
      }
    }

    async function expandWithSpinner(path) {
      if (!path) {
        return;
      }
      state.expanded[path] = true;
      state.pendingExpandPath = path;
      try {
        await render({ suppressLoadingOverlay: true, deferPendingExpandPath: path });
        var items = await listDir(path);
        setCachedDirItems(path, items);
      } catch (error) {
        state.expanded[path] = false;
        status(String(error && error.message ? error.message : error), true);
      } finally {
        state.pendingExpandPath = '';
        await render({ suppressLoadingOverlay: true });
      }
    }

    async function runAction(fn, options) {
      options = options || {};
      if (state.busy) {
        return;
      }
      state.busy = true;
      try {
        await fn();
        if (options.invalidateAllCache) {
          state.cache = Object.create(null);
          state.cacheAliases = Object.create(null);
        } else {
          invalidateCachedDirs(options.invalidateDirs || []);
        }
        await render({
          animateReorder: !!options.animateReorder,
          suppressLoadingOverlay: !!options.suppressLoadingOverlay
        });
      } catch (error) {
        status(String(error && error.message ? error.message : error), true);
      } finally {
        state.busy = false;
        processPrioritizeQueue();
      }
    }

    function processPrioritizeQueue() {
      syncPrioritizeButtonsToQueue();
    }

    function actPrioritize(path, button) {
      if (!path || state.busy || state.pendingPrioritizePath) {
        return;
      }
      var parentDir = parentDirOfPath(path);
      var previousItems = applyOptimisticPrioritize(parentDir, path);
      state.pendingPrioritizePath = path;
      state.busy = true;
      syncPrioritizeButtonsToQueue();
      if (button) {
        button.blur();
      }
      (async function () {
        try {
          if (previousItems) {
            await render({ animateReorder: true, suppressLoadingOverlay: true });
          }
          var appliedQuick = false;
          try {
            var result = await runBackend(['prioritize-quick', path]);
            var quick = parsePrioritizeQuickOutput(result && result.stdout);
            appliedQuick = applyPrioritizeQuickToCache(parentDir, path, quick);
          } catch (_) {
            // Compatibility fallback for older backend copies that do not yet
            // expose prioritize-quick.
            var fastResult = await runBackend(['prioritize-fast', path]);
            hydrateCachedDirFromResult(parentDir, fastResult);
            appliedQuick = true;
          }
          if (!appliedQuick) {
            var listResult = await runBackend(['list', parentDir]);
            hydrateCachedDirFromResult(parentDir, listResult);
          }
          if (!previousItems || listFingerprint(previousItems) !== listFingerprint(getCachedDirItems(parentDir))) {
            // Reconcile quietly after the optimistic animated move to avoid
            // double-animation artifacts on rows crossing echelon boundaries.
            await render({ suppressLoadingOverlay: true });
          }
        } catch (error) {
          if (previousItems) {
            setCachedDirItems(parentDir, previousItems);
            await render({ animateReorder: true, suppressLoadingOverlay: true });
          }
          status(String(error && error.message ? error.message : error), true);
        } finally {
          state.busy = false;
          state.pendingPrioritizePath = '';
          processPrioritizeQueue();
          syncPrioritizeButtonsToQueue();
        }
      })();
    }

    function processAddQueue() {
      if (state.addQueueActive) {
        return;
      }
      if (!state.addQueue.length) {
        state.pendingAddSave = false;
        return;
      }
      state.addQueueActive = true;
      state.pendingAddSave = true;
      (async function runQueue() {
        try {
          while (state.addQueue.length) {
            if (state.busy) {
              await new Promise(function (resolve) { setTimeout(resolve, 40); });
              continue;
            }
            var entry = state.addQueue.shift();
            if (!entry || !entry.dir || !entry.name) {
              continue;
            }
            state.busy = true;
            try {
              await runMutationWithListFallback(
                entry.dir,
                ['add-fast', entry.dir, entry.name],
                ['add', entry.dir, entry.name]
              );
              var refreshed = await listDir(entry.dir);
              setCachedDirItems(entry.dir, refreshed);
            } catch (error) {
              rollbackOptimisticAdd(entry.optimisticAdd);
              if (!String(state.pendingAddText || '').trim()) {
                state.pendingAddText = entry.name;
              }
              var detail = String(error && error.message ? error.message : error).trim();
              status(detail ? ('Add priority failed; reverted. ' + detail) : 'Add priority failed; reverted.', true);
            } finally {
              state.busy = false;
              processPrioritizeQueue();
              await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
            }
          }
        } finally {
          state.addQueueActive = false;
          state.pendingAddSave = false;
          if (state.addQueue.length) {
            setTimeout(processAddQueue, 0);
          }
        }
      })();
    }

    async function confirmDeleteIfNeeded(itemOrPath) {
      if (!itemOrPath) {
        return false;
      }
      var item = null;
      if (typeof itemOrPath === 'string') {
        item = {
          path: itemOrPath,
          kind: 'file',
          hasSubpriorities: false
        };
      } else {
        item = itemOrPath;
      }
      if (!item.path) {
        return false;
      }
      if (item.kind !== 'dir') {
        return true;
      }

      var taskCount = 0;
      try {
        var result = await runBackend(['descendant-count', item.path]);
        taskCount = Number(String((result && result.stdout) || '').trim());
      } catch (_) {
        taskCount = 0;
      }
      if (!Number.isFinite(taskCount) || taskCount < 0) {
        taskCount = 0;
      }
      if (taskCount <= 0) {
        return true;
      }

      var message = taskCount === 1
        ? 'Are you sure you want to delete this project and its task?'
        : 'Are you sure you want to delete this project and its ' + taskCount + ' tasks?';
      return window.confirm(message);
    }

    function actRemove(itemOrPath) {
      if (!itemOrPath || state.busy) {
        return;
      }
      var path = typeof itemOrPath === 'string' ? itemOrPath : itemOrPath.path;
      if (!path) {
        return;
      }
      confirmDeleteIfNeeded(itemOrPath).then(function (ok) {
        if (!ok) {
          return;
        }
        var parentDir = parentDirOfPath(path);
        var cachedParentItems = getCachedDirItems(parentDir);
        var previousItems = Array.isArray(cachedParentItems) ? cachedParentItems.slice() : null;
        var removedOptimistically = removeCachedItemByPath(parentDir, path);
        if (removedOptimistically) {
          render({ suppressLoadingOverlay: true, preserveInputSelection: true });
        }
        return runAction(function () {
          return runMutationWithListFallback(
            parentDir,
            ['remove-fast', path],
            ['remove', path]
          ).catch(function (error) {
            if (removedOptimistically && previousItems) {
              setCachedDirItems(parentDir, previousItems);
              render({ suppressLoadingOverlay: true, preserveInputSelection: true });
            }
            throw error;
          });
        }, {
          suppressLoadingOverlay: true
        });
      }).catch(function (error) {
        status(String(error && error.message ? error.message : error), true);
      });
    }

    function actRename(path, nextName) {
      if (!path || !nextName || state.pendingRenamePath) {
        return;
      }
      var parentDir = parentDirOfPath(path);
      var renamedPath = renamedSiblingPath(path, nextName);
      var optimisticTouches = applyOptimisticRename(path, nextName);
      state.pendingRenamePath = path;
      state.editingPath = '';
      (async function () {
        try {
          if (optimisticTouches.length) {
            await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
          }
          await runMutationWithListFallback(
            parentDir,
            ['rename-fast', path, nextName],
            ['rename', path, nextName]
          );
          moveNextActionLabelCache(path, renamedPath);
          await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
        } catch (error) {
          rollbackOptimisticRename(optimisticTouches);
          await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
          var detail = String(error && error.message ? error.message : error).trim();
          status(detail ? ('Rename failed; reverted. ' + detail) : 'Rename failed; reverted.', true);
        } finally {
          state.pendingRenamePath = '';
          state.editingPath = '';
        }
      })();
    }

    function actToggleChecked(path) {
      if (state.busy || state.pendingCheckPath) {
        return;
      }
      var parentDir = parentDirOfPath(path);
      var currentChecked = readCachedCheckedValue(path);
      var nextChecked = currentChecked === 1 ? 0 : 1;
      var optimisticTouches = applyOptimisticChecked(path, nextChecked);
      var hadOptimisticTouch = optimisticTouches.length > 0;
      state.pendingCheckPath = path;
      state.busy = true;
      (async function () {
        try {
          if (hadOptimisticTouch) {
            await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
          }
          await runMutationWithListFallback(
            parentDir,
            ['check-toggle-fast', path],
            ['check-toggle', path]
          );
          state.pendingCheckPath = '';
          state.busy = false;
          // Avoid a second full rerender when optimistic UI already matches the
          // successful backend result; this prevents row-control flicker.
          if (!hadOptimisticTouch) {
            await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
          }
        } catch (error) {
          rollbackOptimisticChecked(optimisticTouches);
          await render({ suppressLoadingOverlay: true, preserveInputSelection: true });
          var detail = String(error && error.message ? error.message : error).trim();
          status(detail ? ('Checkbox update failed; reverted. ' + detail) : 'Checkbox update failed; reverted.', true);
        } finally {
          if (state.pendingCheckPath === path) {
            state.pendingCheckPath = '';
          }
          if (state.busy) {
            state.busy = false;
          }
          processPrioritizeQueue();
        }
      })();
    }

    function addAtRoot(rawValue) {
      var name = String(rawValue || '').trim();
      if (!name) {
        return;
      }
      var targetDir = String(state.root || '.').trim() || '.';
      var optimisticAdd = applyOptimisticAdd(targetDir, name);
      state.pendingAddText = '';
      state.pendingAdd = false;
      render({ suppressLoadingOverlay: true, preserveInputSelection: true }).then(function () {
        focusNewPriorityInput();
      });
      state.addQueue.push({
        dir: targetDir,
        name: name,
        optimisticAdd: optimisticAdd
      });
      processAddQueue();
    }

    function actMakeProject(path) {
      if (!path || state.busy || state.pendingMakeProjectPath) {
        return;
      }
      state.pendingMakeProjectPath = path;
      render({ suppressLoadingOverlay: true });
      runAction(function () {
        return runBackend(['make-project', path]);
      }, {
        suppressLoadingOverlay: true,
        invalidateDirs: [parentDirOfPath(path)]
      }).then(function () {
        state.revealedMakeProjectPath = '';
        drillInto(path);
      }).finally(function () {
        state.pendingMakeProjectPath = '';
        render({ suppressLoadingOverlay: true });
      });
    }

    function updateDrillUpVisibility() {
      var up = document.getElementById('drill-up');
      if (!up) {
        return;
      }
      var currentRoot = String(state.root || rootInputValue() || '.').trim() || '.';
      var currentNormalized = normalizeRootPath(currentRoot);
      var ceiling = normalizeRootPath(state.rootCeiling || loadStorage(ROOT_KEY) || '');
      if (ceiling && currentNormalized === ceiling) {
        up.classList.add('hidden');
        return;
      }
      var nextRoot = parentNavPath(currentRoot);
      up.classList.toggle('hidden', !nextRoot || nextRoot === currentRoot);
    }

    function drillInto(path) {
      if (!path) {
        return;
      }
      document.getElementById('root-dir').value = path;
      setRootAndRefresh({ persistRoot: false });
      updateDrillUpVisibility();
    }

    function drillUp() {
      var currentRoot = String(state.root || rootInputValue() || '.').trim() || '.';
      var ceiling = normalizeRootPath(state.rootCeiling || loadStorage(ROOT_KEY) || '');
      if (ceiling && normalizeRootPath(currentRoot) === ceiling) {
        updateDrillUpVisibility();
        return;
      }
      var nextRoot = parentNavPath(currentRoot);
      if (!nextRoot || nextRoot === currentRoot) {
        updateDrillUpVisibility();
        return;
      }
      document.getElementById('root-dir').value = nextRoot;
      setRootAndRefresh({ persistRoot: false });
      updateDrillUpVisibility();
    }

    function setRootAndRefresh(options) {
      options = options || {};
      state.root = rootInputValue();
      state.expanded = Object.create(null);
      state.expanded[state.root] = true;
      state.cache = Object.create(null);
      state.cacheAliases = Object.create(null);
      state.revealedMakeProjectPath = '';
      state.pendingMakeProjectPath = '';
      state.openMenuPath = '';
      state.editingPath = '';
      state.pendingRenamePath = '';
      if (options.persistRoot !== false) {
        saveStorage(ROOT_KEY, state.root);
        state.rootCeiling = normalizeRootPath(state.root);
      }
      updateTitleFromRoot();
      if (!options.keepDrillStack) {
        state.drillStack = [];
      }
      updateDrillUpVisibility();
      var preloadStartupData = async function () {
        if (!options.preloadStartupData) {
          return null;
        }
        var rootItems = await listDir(state.root);
        setCachedDirItems(state.root, rootItems);
        return rootItems;
      };
      return preloadStartupData().then(function (rootItems) {
        return render({ suppressLoadingOverlay: !!options.suppressLoadingOverlay }).then(function () {
          if (!options.preloadStartupData || !Array.isArray(rootItems) || !rootItems.length) {
            return;
          }
          // Warm next-action caches after first paint to keep startup snappy.
          setTimeout(function () {
            var preloadTargets = [];
            for (var i = 0; i < rootItems.length; i += 1) {
              var item = rootItems[i];
              if (item && item.kind === 'dir' && item.hasSubpriorities) {
                preloadTargets.push(item.path);
              }
            }
            if (!preloadTargets.length) {
              return;
            }
            var idx = 0;
            var workerCount = Math.min(3, preloadTargets.length);
            var worker = async function () {
              while (idx < preloadTargets.length) {
                var path = preloadTargets[idx];
                idx += 1;
                try {
                  var childItems = await listDir(path);
                  setCachedDirItems(path, childItems);
                  upsertNextActionForPath(path);
                } catch (_) {
                  // Ignore warm-cache failures; normal lazy load still applies.
                }
              }
            };
            for (var w = 0; w < workerCount; w += 1) {
              worker();
            }
          }, 0);
        });
      });
    }

    function schedulePersistRootPref(value) {
      if (state.rootPrefSaveTimer) {
        clearTimeout(state.rootPrefSaveTimer);
      }
      state.rootPrefSaveTimer = setTimeout(function () {
        state.rootPrefSaveTimer = null;
        saveStorage(ROOT_KEY, value);
      }, 220);
    }

    function persistRootInputOnly() {
      var value = rootInputValue();
      schedulePersistRootPref(value);
      state.rootCeiling = normalizeRootPath(value);
      updateTitleFromRoot();
      updateDrillUpVisibility();
    }

    function focusNewPriorityInput() {
      var input = document.querySelector('.add-inline-input');
      if (!input || input.disabled) {
        return false;
      }
      try {
        input.focus();
        input.select();
      } catch (_) {
        return false;
      }
      return true;
    }

    async function browseForFolder(setter) {
      try {
        var result = await runBackend(['pick-dir']);
        var path = String((result && result.stdout) || '').trim();
        if (path) {
          setter(path);
        }
      } catch (error) {
        status(String(error && error.message ? error.message : error), true);
      }
    }

    async function openCurrentRootInFileBrowser() {
      var currentRoot = String(state.root || rootInputValue() || '.').trim() || '.';
      try {
        await runBackend(['open-dir', currentRoot]);
        return;
      } catch (_) {
        // Fall through to direct opener commands for compatibility with
        // backend copies that do not yet expose open-dir.
      }
      try {
        await bridgeExec(['open', currentRoot]);
        return;
      } catch (_) {
        // Continue fallbacks.
      }
      try {
        await bridgeExec(['xdg-open', currentRoot]);
        return;
      } catch (_) {
        // Continue fallbacks.
      }
      try {
        await bridgeExec(['explorer.exe', currentRoot]);
      } catch (_) {
        // Easter egg action is intentionally silent.
      }
    }

    function showStartupIfNeeded() {
      var modal = document.getElementById('startup-modal');
      var startupPath = document.getElementById('startup-path');
      var saved = loadStorage(ROOT_KEY);
      state.rootCeiling = normalizeRootPath(saved || '');

      if (saved) {
        document.getElementById('root-dir').value = saved;
        updateTitleFromRoot();
        return setRootAndRefresh({
          suppressLoadingOverlay: !!state.startupSnapshotRestored,
          preloadStartupData: true
        });
      }

      updateTitleFromRoot();
      modal.classList.remove('hidden');
      startupPath.focus();
      return Promise.resolve();
    }

    function toggleSettingsPanel(forceOpen) {
      var panel = document.getElementById('settings-panel');
      var button = document.getElementById('settings-toggle');
      var open = forceOpen;
      if (typeof open !== 'boolean') {
        open = panel.classList.contains('hidden');
      }
      panel.classList.toggle('hidden', !open);
      button.setAttribute('aria-expanded', open ? 'true' : 'false');
      button.classList.toggle('active', open);
      if (!open) {
        closeThemePickerMenu();
      }
    }

    window.addEventListener('DOMContentLoaded', async function () {
      requestWindowShape();
      var bootRevealTimer = setTimeout(revealBootUi, 8000);
      await loadUiPrefs();
      loadNextActionLabelCacheFromPrefs();
      state.activeTheme = String(loadStorage(THEME_KEY) || 'psionic').toLowerCase().trim();
      await loadThemes();
      applyTheme(state.activeTheme);
      await waitForThemeStylesheet(state.activeTheme, 1400);
      applyTextScale(loadStorage(UI_SCALE_KEY) || loadStorage(TEXT_SCALE_KEY) || '1');
      state.fontOptions = getPlatformFontOptions();
      populateFontSelect();
      applyFontFamily(loadStorage(FONT_KEY) || '');
      var restoredSnapshot = restoreStartupSnapshotFromPrefs();
      if (restoredSnapshot) {
        revealBootUi();
      }

      document.getElementById('settings-toggle').addEventListener('click', function () {
        toggleSettingsPanel();
      });
      document.getElementById('copy-markdown').addEventListener('click', function () {
        copyVisiblePrioritiesAsMarkdown();
      });
      var titleFolder = document.getElementById('title-folder');
      var titleCluster = document.querySelector('.title-cluster');
      var titleLastOpenAt = 0;
      var openTitleFolderIfDouble = function (event) {
        if (!event) {
          return;
        }
        var target = event.target;
        if (target && target.closest && target.closest('#drill-up')) {
          return;
        }
        var withinTitle = false;
        if (titleFolder && target) {
          withinTitle = target === titleFolder || titleFolder.contains(target);
        }
        if (!withinTitle && titleCluster && target) {
          withinTitle = titleCluster.contains(target);
        }
        if (!withinTitle) {
          return;
        }
        var isDouble = event.type === 'dblclick' || Number(event.detail) >= 2;
        if (!isDouble) {
          return;
        }
        var now = Date.now();
        if (now - titleLastOpenAt < 420) {
          return;
        }
        titleLastOpenAt = now;
        event.preventDefault();
        event.stopPropagation();
        openCurrentRootInFileBrowser();
      };
      if (titleFolder) {
        titleFolder.addEventListener('dblclick', openTitleFolderIfDouble);
        titleFolder.addEventListener('mouseup', function (event) {
          if (event.detail === 2) {
            openTitleFolderIfDouble(event);
          }
        });
      }
      if (titleCluster) {
        titleCluster.addEventListener('dblclick', openTitleFolderIfDouble);
        titleCluster.addEventListener('mouseup', function (event) {
          if (event.detail === 2) {
            openTitleFolderIfDouble(event);
          }
        });
      }
      document.getElementById('dock-left').addEventListener('click', function () {
        dockWindow('left');
      });
      document.getElementById('dock-center').addEventListener('click', function () {
        dockWindow('center');
      });
      document.getElementById('dock-right').addEventListener('click', function () {
        dockWindow('right');
      });
      setDockButtonsDisabled('none');
      refreshDockState();
      if (state.dockPollTimer) {
        clearInterval(state.dockPollTimer);
      }
      state.dockPollTimer = setInterval(refreshDockState, 1200);
      window.addEventListener('focus', refreshDockState);
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          refreshDockState();
        }
      });
      window.addEventListener('beforeunload', function () {
        if (state.dockPollTimer) {
          clearInterval(state.dockPollTimer);
          state.dockPollTimer = null;
        }
        if (state.windowAutoGrowTimer) {
          clearTimeout(state.windowAutoGrowTimer);
          state.windowAutoGrowTimer = null;
        }
        if (state.rootPrefSaveTimer) {
          clearTimeout(state.rootPrefSaveTimer);
          state.rootPrefSaveTimer = null;
        }
        if (state.snapshotPrefSaveTimer) {
          clearTimeout(state.snapshotPrefSaveTimer);
          state.snapshotPrefSaveTimer = null;
        }
        if (state.nextActionCacheSaveTimer) {
          clearTimeout(state.nextActionCacheSaveTimer);
          state.nextActionCacheSaveTimer = null;
        }
      });
      document.getElementById('refresh').addEventListener('click', setRootAndRefresh);
      document.getElementById('drill-up').addEventListener('click', drillUp);
      var rootDirInput = document.getElementById('root-dir');
      var startupPathInput = document.getElementById('startup-path');
      bindStandardTextboxBehavior(rootDirInput);
      bindStandardTextboxBehavior(startupPathInput);
      rootDirInput.addEventListener('input', persistRootInputOnly);
      rootDirInput.addEventListener('change', persistRootInputOnly);
      rootDirInput.addEventListener('keydown', function (event) {
        if ((event.metaKey || event.ctrlKey) && String(event.key || '').toLowerCase() === 'a') {
          return;
        }
        if (event.key === 'Enter') {
          setRootAndRefresh();
        }
      });
      document.getElementById('browse').addEventListener('click', function () {
        browseForFolder(function (path) {
          document.getElementById('root-dir').value = path;
          persistRootInputOnly();
        });
      });

      document.getElementById('startup-browse').addEventListener('click', function () {
        browseForFolder(function (path) {
          document.getElementById('startup-path').value = path;
        });
      });
      document.getElementById('startup-open').addEventListener('click', function () {
        var path = String(document.getElementById('startup-path').value || '').trim();
        if (!path) {
          return;
        }
        document.getElementById('root-dir').value = path;
        document.getElementById('startup-modal').classList.add('hidden');
        setRootAndRefresh();
      });
      startupPathInput.addEventListener('keydown', function (event) {
        if ((event.metaKey || event.ctrlKey) && String(event.key || '').toLowerCase() === 'a') {
          return;
        }
        if (event.key === 'Enter') {
          document.getElementById('startup-open').click();
        }
      });

      document.getElementById('theme-picker-btn').addEventListener('click', function (event) {
        event.stopPropagation();
        state.themeHotkeysEnabled = true;
        if (isThemePickerOpen()) {
          closeThemePickerMenu();
        } else {
          openThemePickerMenu();
        }
      });
      document.getElementById('theme-picker-list').addEventListener('click', function (event) {
        var button = event.target.closest('button[data-theme-name]');
        if (!button) {
          return;
        }
        event.stopPropagation();
        applyTheme(button.getAttribute('data-theme-name'));
        closeThemePickerMenu();
      });
      document.getElementById('text-size-increase').addEventListener('click', increaseTextScale);
      document.getElementById('text-size-decrease').addEventListener('click', decreaseTextScale);
      document.getElementById('text-size-reset').addEventListener('click', resetTextScale);
      document.getElementById('font-select').addEventListener('change', function (event) {
        applyFontFamily(String(event.target && event.target.value ? event.target.value : ''));
      });

      document.addEventListener('click', function (event) {
        var inThemePicker = event.target.closest('#theme-picker-menu') || event.target.closest('#theme-picker-btn');
        if (!inThemePicker) {
          closeThemePickerMenu();
        }
        var inRowMenu = event.target.closest('.row-menu') || event.target.closest('.btn.more');
        if (!inRowMenu && state.openMenuPath) {
          state.openMenuPath = '';
          render({ suppressLoadingOverlay: true, preserveInputSelection: true });
        }
        var inSettings = event.target.closest('#settings-panel') || event.target.closest('#settings-toggle');
        if (!inSettings && !document.getElementById('settings-panel').classList.contains('hidden')) {
          toggleSettingsPanel(false);
        }
        var inMakeProject = event.target.closest('.make-project-inline');
        if (!inMakeProject && state.revealedMakeProjectPath && !state.pendingMakeProjectPath) {
          state.revealedMakeProjectPath = '';
          render({ suppressLoadingOverlay: true, preserveInputSelection: true, animateReorder: true });
        }
      });

      document.addEventListener('keydown', function (event) {
        var hasPrimaryMod = !!(event.metaKey || event.ctrlKey);
        var target = event.target;
        var isAddInputFocused = !!(target && target.classList && target.classList.contains('add-inline-input'));

        if (hasPrimaryMod) {
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            drillUp();
            return;
          }
          if (event.key === 'ArrowLeft') {
            event.preventDefault();
            dockWindow('left');
            return;
          }
          if (event.key === 'ArrowRight') {
            event.preventDefault();
            dockWindow('right');
            return;
          }
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            dockWindow('center');
            return;
          }
        }

        if (event.key === 'Escape') {
          if (isAddInputFocused) {
            event.preventDefault();
            try {
              target.blur();
            } catch (_) {
              // Ignore blur failures.
            }
            return;
          }
          event.preventDefault();
          var drillUpButton = document.getElementById('drill-up');
          if (drillUpButton && !drillUpButton.classList.contains('hidden')) {
            drillUp();
            return;
          }
          closeThemePickerMenu();
          if (!document.getElementById('settings-panel').classList.contains('hidden')) {
            toggleSettingsPanel(false);
          }
          return;
        }

        if (isTypingContext(event.target)) {
          return;
        }

        if (event.key === 'Enter') {
          if (focusNewPriorityInput()) {
            event.preventDefault();
          }
          return;
        }

        if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
          if (state.themeHotkeysEnabled) {
            event.preventDefault();
            cycleTheme(event.key === 'ArrowDown' ? 1 : -1);
          }
        }
      });

      window.prioritiesHostAction = function (actionName) {
        var action = String(actionName || '');
        if (action === 'increase-text-size') {
          increaseTextScale();
          return;
        }
        if (action === 'decrease-text-size') {
          decreaseTextScale();
          return;
        }
        if (action === 'reset-text-size') {
          resetTextScale();
        }
      };

      await showStartupIfNeeded();
      clearTimeout(bootRevealTimer);
      revealBootUi();
      state.windowSizingReady = true;
      updateDrillUpVisibility();
    });
  </script>
</body>
</html>
