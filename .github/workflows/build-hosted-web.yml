name: Build Hosted Web

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate manifests
        run: sh tools/validate-manifest.sh

      - name: Build hosted web bundles
        run: |
          set -eu
          mkdir -p dist/hosted-web
          for template in $(jq -r '.templates[] | select(.publish == true) | .slug' config/templates.manifest.json); do
            [ -d ".web/$template" ] || { echo "missing template: $template" >&2; exit 1; }
            mkdir -p "dist/hosted-web/$template"
            cp -R ".web/$template"/. "dist/hosted-web/$template/"
          done
          cp -R spells/web dist/hosted-web/spells-web
          cp -R spells/.arcana/web-wizardry dist/hosted-web/arcana-web-wizardry

      - uses: actions/upload-artifact@v4
        with:
          name: hosted-web
          path: dist/hosted-web

      - name: Optional deploy to self-host
        if: startsWith(github.ref, 'refs/tags/v') && secrets.WEB_DEPLOY_HOST != ''
        env:
          WEB_DEPLOY_HOST: ${{ secrets.WEB_DEPLOY_HOST }}
          WEB_DEPLOY_USER: ${{ secrets.WEB_DEPLOY_USER }}
          WEB_DEPLOY_PATH: ${{ secrets.WEB_DEPLOY_PATH }}
          WEB_DEPLOY_SSH_KEY_BASE64: ${{ secrets.WEB_DEPLOY_SSH_KEY_BASE64 }}
        run: sh tools/release/deploy-hosted-web.sh dist/hosted-web
