name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq build-essential
      - run: sh tools/validate-manifest.sh
      - run: sh .tests/core/test-core-rpc.sh
      - run: sh .tests/adapters/test-http-cgi.sh
      - run: sh .tests/adapters/test-shell-parity.sh
      - run: sh .tests/adapters/test-core-shell-parity.sh
      - run: sh .tests/adapters/test-bridge-contract.sh
      - run: sh .tests/adapters/test-bridge-behavior.sh
      - run: sh .tests/release/test-workflow-presence.sh
      - run: sh .tests/release/test-release-tools.sh
      - run: sh .tests/release/test-godot-export-script.sh
      - run: sh .tests/release/test-ios-promotion-script.sh
      - run: |
          set -eu
          for t in \
            .tests/apps/test-forge-backend.sh \
            .tests/apps/test-forge-install-launch.sh \
            .tests/apps/test-forge-regressions.sh \
            .tests/apps/test-forge-run-modes.sh \
            .tests/apps/test-forge-ui-regressions.sh \
            .tests/apps/test-forge-ui-assets.sh \
            .tests/apps/test-macos-host-menu-contract.sh \
            .tests/apps/test-no-hardcoded-localhost-port.sh; do
            sh "$t"
          done
      - run: for t in .tests/.arcana/wizardry-apps/test-*.sh; do sh "$t"; done

  build_desktop:
    needs: validate
    uses: ./.github/workflows/build-desktop.yml

  build_mobile:
    needs: validate
    uses: ./.github/workflows/build-mobile.yml

  build_hosted:
    needs: validate
    uses: ./.github/workflows/build-hosted-web.yml

  build_godot:
    needs: validate
    uses: ./.github/workflows/build-godot.yml

  approval_gate:
    needs: [build_desktop, build_mobile, build_hosted, build_godot]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - run: echo "Release approval granted"

  sign_notarize_macos:
    needs: approval_gate
    runs-on: macos-latest
    env:
      APPLE_P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
      APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
      APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: dist/macos
      - name: Enforce macOS signing + notarization secrets
        run: |
          set -eu
          for v in APPLE_P12_BASE64 APPLE_P12_PASSWORD APPLE_DEVELOPER_ID_APP APPLE_TEAM_ID APPLE_NOTARY_KEY_ID APPLE_NOTARY_ISSUER_ID APPLE_NOTARY_PRIVATE_KEY_BASE64; do
            eval "val=\${$v-}"
            if [ -z "$val" ]; then
              echo "Missing required macOS release secret: $v" >&2
              exit 1
            fi
          done
      - name: Sign and notarize .app bundles
        run: |
          set -eu
          mkdir -p dist/macos-signed
          found=0
          for app in dist/macos/*.app; do
            [ -d "$app" ] || continue
            found=1
            sh tools/release/sign-and-notarize-macos.sh "$app"
            app_name=$(basename "$app")
            zip_name="${app_name%.app}-signed.zip"
            ditto -c -k --sequesterRsrc --keepParent "$app" "dist/macos-signed/$zip_name"
          done
          [ "$found" -eq 1 ] || { echo "No .app bundles found" >&2; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-signed
          path: dist/macos-signed/*.zip

  github_release:
    needs: [approval_gate, sign_notarize_macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: dist/release-artifacts/desktop-linux
      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-signed
          path: dist/release-artifacts/desktop-macos
      - uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: dist/release-artifacts/mobile-ios
      - uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: dist/release-artifacts/mobile-android
      - uses: actions/download-artifact@v4
        with:
          name: hosted-web
          path: dist/release-artifacts/hosted-web
      - uses: actions/download-artifact@v4
        with:
          name: godot-desktop
          path: dist/release-artifacts/godot
      - name: Create release archive
        run: |
          set -eu
          mkdir -p dist
          tar -czf dist/wizardry-apps-release-artifacts.tar.gz -C dist/release-artifacts .
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wizardry-apps-release-artifacts.tar.gz
            dist/release-artifacts/desktop-linux/*.AppImage
            dist/release-artifacts/desktop-macos/*.zip
            dist/release-artifacts/mobile-ios/*.ipa
            dist/release-artifacts/mobile-android/*.aab

  publish_testflight:
    needs: [approval_gate, sign_notarize_macos]
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mobile-ios
          path: dist/ios
      - name: Enforce TestFlight credentials
        run: |
          set -eu
          for v in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY_BASE64; do
            eval "val=\${$v-}"
            if [ -z "$val" ]; then
              echo "Missing required TestFlight secret: $v" >&2
              exit 1
            fi
          done
      - name: Upload all IPA artifacts to TestFlight
        run: |
          set -eu
          found=0
          for ipa in dist/ios/*.ipa; do
            [ -f "$ipa" ] || continue
            found=1
            sh tools/release/upload-testflight.sh "$ipa"
          done
          [ "$found" -eq 1 ] || { echo "No IPA artifacts found" >&2; exit 1; }

  publish_play_internal:
    needs: [approval_gate, sign_notarize_macos]
    runs-on: ubuntu-latest
    env:
      PLAY_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y jq openssl curl
      - uses: actions/download-artifact@v4
        with:
          name: mobile-android
          path: dist/android
      - name: Enforce Play credentials
        run: |
          set -eu
          [ -n "${PLAY_SERVICE_ACCOUNT_JSON_BASE64-}" ] || {
            echo "Missing required Play secret: PLAY_SERVICE_ACCOUNT_JSON_BASE64" >&2
            exit 1
          }
      - name: Upload production AAB artifacts to Play internal track
        run: |
          set -eu
          for app in $(sh tools/release/list-production-apps.sh); do
            aab="dist/android/wizardry-$app-release.aab"
            [ -f "$aab" ] || { echo "Missing AAB artifact: $aab" >&2; exit 1; }
            package_name=$(sh tools/release/get-app-bundle-id.sh android "$app")
            sh tools/release/upload-play-internal.sh "$aab" "$package_name" internal
          done

  deploy_hosted_web:
    needs: [approval_gate, sign_notarize_macos]
    runs-on: ubuntu-latest
    if: secrets.WEB_DEPLOY_HOST != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: hosted-web
          path: dist/hosted-web
      - name: Deploy hosted web
        env:
          WEB_DEPLOY_HOST: ${{ secrets.WEB_DEPLOY_HOST }}
          WEB_DEPLOY_USER: ${{ secrets.WEB_DEPLOY_USER }}
          WEB_DEPLOY_PATH: ${{ secrets.WEB_DEPLOY_PATH }}
          WEB_DEPLOY_SSH_KEY_BASE64: ${{ secrets.WEB_DEPLOY_SSH_KEY_BASE64 }}
        run: sh tools/release/deploy-hosted-web.sh dist/hosted-web
