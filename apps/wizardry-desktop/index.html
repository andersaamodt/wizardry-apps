      function renderMudPage() {
        var rows = state.mudActions || [];
        var selected = findMudActionById(state.mudSelectedAction);
        if (!selected) {
          state.mudSelectedAction = '';
        }
        var transition = state.mudDrillTransition;
        state.mudDrillTransition = '';

        var rootHtml = '';
        if (state.mudActionsLoading) {
          rootHtml = '<p class="wd-empty">Loading MUD actions…</p>';
        } else if (!rows.length) {
          rootHtml = '<p class="wd-empty">No MUD actions found. Install/enable MUD in wizardry.</p>';
        } else {
          rootHtml = '<div class="wd-drill-list wd-system-actions">';
          for (var i = 0; i < rows.length; i += 1) {
            var row = rows[i];
            var active = selected && selected.id === row.id ? ' wd-drill-item-active' : '';
            var disabled = row.available ? '' : ' disabled';
            var buttonTitle = row.available
              ? (' title="' + escapeAttrValue(row.description || row.label) + '"')
              : (' title="' + escapeAttrValue(row.reason || 'Unavailable') + '"');
            rootHtml += '<div class="wd-menu-action-row">';
            rootHtml += '<button type="button" class="wd-drill-item wd-system-row' + active + '" data-mud-select="' + escapeAttrValue(row.id) + '"' + disabled + buttonTitle + '>';
            rootHtml += '<span class="wd-drill-item-main"><span class="wd-system-row-title">' + escapeText(row.label) + '</span></span>';
            rootHtml += '<span class="wd-drill-arrow" aria-hidden="true">›</span>';
            rootHtml += '</button>';
            rootHtml += '</div>';
          }
          rootHtml += '</div>';
        }

        var detailHtml = '';
        if (!selected) {
          detailHtml += '<p class="wd-empty">Select a MUD command to inspect and run it.</p>';
        } else {
          var runLabel = selected.mode === 'menu' || selected.mode === 'command' ? 'Open' : 'Run';
          var disabledAction = selected.available ? '' : ' disabled';
          var actionTitle = selected.available
            ? (' title="' + escapeAttrValue(runLabel + ' ' + selected.label) + '"')
            : (' title="' + escapeAttrValue(selected.reason || 'Unavailable') + '"');
          var argValue = String(state.mudDraftArgs[selected.id] || '');
          detailHtml += '<div class="wd-drill-head">';
          detailHtml += '<h4>' + escapeText(selected.label) + '</h4>';
          detailHtml += '</div>';
          detailHtml += '<p class="wd-subline">' + escapeText(selected.description) + '</p>';
          if (!selected.available && selected.reason) {
            detailHtml += '<p class="wd-empty">' + escapeText(selected.reason) + '</p>';
          }
          if (selected.argMode === 'required' || selected.argMode === 'optional') {
            detailHtml += '<label class="wd-row-label" for="mud-action-arg">' + escapeText(selected.argLabel || 'Argument') + '</label>';
            detailHtml += '<input id="mud-action-arg" type="text" class="wd-inline-input wd-mud-arg-input" data-mud-arg="' + escapeAttrValue(selected.id) + '" value="' + escapeAttrValue(argValue) + '" placeholder="' + escapeAttrValue(selected.argExample || '') + '">';
            if (selected.argMode === 'optional') {
              detailHtml += '<p class="wd-subline">Argument is optional.</p>';
            }
          }
          detailHtml += '<div class="wd-tool-strip"><button type="button" class="wd-polite-btn" data-mud-run-action="' + escapeAttrValue(selected.id) + '"' + disabledAction + actionTitle + '>' + runLabel + ' ' + escapeText(selected.label) + '</button></div>';
          detailHtml += '<pre id="mud-output" class="wd-mono-box" aria-live="polite">' + escapeText(state.mudOutput || 'Choose a MUD action to run.') + '</pre>';
        }

        return '<section class="wd-panel"><h3>MUD Tools</h3>' +
          '<p class="wd-subline">Play the MUD with the currently installed wizardry capabilities.</p>' +
          '<div class="wd-drill-shell"><div class="' + drillTrackClass(!!selected, transition) + '">' +
          '<section class="wd-drill-panel">' + rootHtml + '</section>' +
          '<section class="wd-drill-panel wd-drill-panel-detail">' + detailHtml + '</section>' +
          '</div></div>' +
          '</section>';
      }

      function renderPage() {
        var title = 'Cast';
        var subtitle = '';
        var content = '';
        var drillBackSection = '';

        if (state.activePage === 'cast') {
          title = 'Cast';
          if (state.cast.selectedCategory) {
            drillBackSection = 'cast';
          }
          content = renderCastPage();
        } else if (state.activePage === 'spellbook') {
          title = 'Spellbook';
          content = renderSpellbookPage();
        } else if (state.activePage === 'arcana') {
          title = 'Arcana';
          if (state.arcanaSelectedModule) {
            drillBackSection = 'arcana';
          }
          content = renderArcanaPage();
        } else if (state.activePage === 'system') {
          title = 'Computer';
          if (state.systemSelectedAction) {
            drillBackSection = 'system';
          }
          content = renderSystemPage();
        } else if (state.activePage === 'mud') {
          title = 'MUD';
          if (state.mudSelectedAction) {
            drillBackSection = 'mud';
          }
          if (!state.mudActions.length && !state.mudActionsLoading) {
            loadMudActions();
          }
          content = renderMudPage();
        }

        if (els.pageTitle) {
          els.pageTitle.textContent = title;
        }
        if (els.pageSubtitle) {
          els.pageSubtitle.textContent = subtitle;
          els.pageSubtitle.classList.toggle('wd-hidden', !subtitle);
        }
        if (els.pageDrillBack) {
          if (drillBackSection) {
            els.pageDrillBack.classList.remove('wd-hidden');
            els.pageDrillBack.setAttribute('data-drill-back', drillBackSection);
          } else {
            els.pageDrillBack.classList.add('wd-hidden');
            els.pageDrillBack.setAttribute('data-drill-back', '');
          }
        }
        if (els.contentScroll) {
          els.contentScroll.classList.toggle('wd-content-scroll-spellbook', state.activePage === 'spellbook');
        }
        if (els.contentArea) {
          els.contentArea.classList.toggle('wd-page-spellbook', state.activePage === 'spellbook');
          els.contentArea.innerHTML = content;
        }
        setRowSelection();
      }

      function setRowSelection() {
        var rows = Array.prototype.slice.call(els.leftNav.querySelectorAll('.wd-nav-row'));
        for (var i = 0; i < rows.length; i += 1) {
          rows[i].classList.toggle('wd-nav-row-active', i === state.selectedNavIndex || rows[i].getAttribute('data-page') === state.activePage);
        }
      }

      function syncPrefsStatus() {
        if (els.prefsStatus) {
          setText(els.prefsStatus, state.prefsLoaded ? 'loaded' : 'fallback');
        }
      }

      function setBridgeState(value) {
        state.bridgeReady = !!value;
      }

      function ensureBridge() {
        if (!bridgeAvailable()) {
          setBridgeState(false);
          return false;
        }
        setBridgeState(true);
        return true;
      }

      function applyBridgeReadyGate() {
        state.bridgeReady = false;
        var tries = 0;
        var limit = 160;
        function check() {
          if (state.bridgeReady) {
            return;
          }
          state.bridgeReady = bridgeAvailable();
          if (!state.bridgeReady) {
            if (tries >= limit) {
              setBridgeState(false);
              return;
            }
            tries += 1;
            setTimeout(check, 50);
            return;
          }
          setBridgeState(true);
        }
        check();
      }

      function notifyHostBootReady(attempt) {
        var tries = typeof attempt === 'number' ? attempt : 0;
        if (state.hostBootReadySent) {
          return;
        }
        if (!bridgeAvailable()) {
          if (tries >= 160) {
            return;
          }
          setTimeout(function () {
            notifyHostBootReady(tries + 1);
          }, 50);
          return;
        }
        state.hostBootReadySent = true;
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            execArgv(['__wizardry_host_boot_ready']).then(function () {
              revealUI();
            }).catch(function () {
              state.hostBootReadySent = false;
              if (tries >= 160) {
                revealUI();
                return;
              }
              setTimeout(function () {
                notifyHostBootReady(tries + 1);
              }, 50);
            });
          });
        });
      }

      function revealUI() {
        if (els.splash) {
          els.splash.classList.add('wd-splash-fade');
          els.splash.setAttribute('aria-hidden', 'true');
          setTimeout(function () {
            if (els.splash) {
              els.splash.hidden = true;
            }
          }, 60);
        }
        if (els.app) {
          els.app.classList.remove('hidden');
          els.app.setAttribute('aria-hidden', 'false');
        }
        if (els.body) {
          els.body.classList.remove('wd-booting');
        }
      }

      function setActivityOpen(open) {
        state.activityOpen = !!open;
        applyLayoutColumns();
        renderActivityDrawer();
        if (state.activityOpen) {
          loadWatchHistory();
          if (!state.activityWatchTimer) {
            state.activityWatchTimer = setInterval(function () {
              if (!state.activityOpen) {
                stopActivityWatch();
                return;
              }
              loadWatchHistory();
            }, state.activityWatchIntervalMs);
          }
        } else {
          stopActivityWatch();
        }
      }

      function stopActivityWatch() {
        if (state.activityWatchTimer) {
          clearInterval(state.activityWatchTimer);
          state.activityWatchTimer = null;
        }
      }

      function renderActivityDrawer() {
        if (!els.activityDrawer) {
          return;
        }
        els.activityDrawer.classList.toggle('wd-closed', !state.activityOpen);
        if (els.activityToggle) {
          els.activityToggle.classList.toggle('wd-active', state.activityOpen);
          els.activityToggle.setAttribute('aria-pressed', state.activityOpen ? 'true' : 'false');
        }
        if (state.activityOpen) {
          renderActivity();
          if (els.activityFeed) {
            els.activityFeed.scrollTop = 0;
          }
        }
      }

      function setSelectedNavFromIndex(delta) {
        var navPages = getNavPages();
        var next = state.selectedNavIndex + delta;
        if (next < 0 || next >= navPages.length) {
          return;
        }
        state.selectedNavIndex = next;
        var row = rowElementForPage(navPages[next].id);
        if (row) {
          row.focus();
          row.scrollIntoView({ block: 'nearest' });
          if (els.leftNav) {
            var allRows = Array.prototype.slice.call(els.leftNav.querySelectorAll('.wd-nav-row'));
            allRows.forEach(function (item, idx) {
              item.setAttribute('tabindex', idx === next ? '0' : '-1');
            });
          }
        }
      }

      function loadMainMenuEntries() {
        return callBackend('list-main-menu-entries').then(function (text) {
          var lines = String(text || '').split('\n');
          var order = [];
          for (var i = 0; i < lines.length; i += 1) {
            var parts = String(lines[i] || '').split('|');
            var pageId = String(parts[0] || '').trim();
            if (!pageId || !NAV_PAGE_MAP[pageId]) {
              continue;
            }
            if (order.indexOf(pageId) >= 0) {
              continue;
            }
            order.push(pageId);
          }
          if (!order.length) {
            order = DEFAULT_MAIN_MENU_ORDER.slice(0);
          }
          state.mainMenuOrder = order;
          if (!navHasPage(state.activePage)) {
            state.activePage = order[0] || 'cast';
          }
          renderNav();
          renderPage();
        }).catch(function () {
          state.mainMenuOrder = DEFAULT_MAIN_MENU_ORDER.slice(0);
          renderNav();
        });
      }

      function loadSystemMenuActions() {
        if (state.systemMenuLoading) {
          return Promise.resolve(state.systemMenuActions);
        }
        state.systemMenuLoading = true;
        if (state.activePage === 'system') {
          renderPage();
        }
        return callBackend('list-system-menu-actions').then(function (text) {
          var lines = String(text || '').split('\n');
          var parsed = [];
          for (var i = 0; i < lines.length; i += 1) {
            var line = String(lines[i] || '').trim();
            if (!line) {
              continue;
            }
            var parts = line.split('|');
            var id = String(parts[0] || '').trim();
            var label = String(parts[1] || '').trim();
            var mode = String(parts[2] || '').trim() || 'spell';
            var description = String(parts[3] || '').trim();
            var danger = String(parts[4] || '').trim() === '1';
            var available = String(parts[5] || '').trim() !== '0';
            var reason = String(parts[6] || '').trim();
            if (!id || !label) {
              continue;
            }
            parsed.push({
              id: id,
              label: label,
              mode: mode,
              description: description,
              danger: danger,
              available: available,
              reason: reason
            });
          }
          state.systemMenuActions = parsed;
          if (state.systemSelectedAction) {
            var stillExists = parsed.some(function (row) { return row.id === state.systemSelectedAction; });
            if (!stillExists) {
              state.systemSelectedAction = '';
            }
          }
          return parsed;
        }).catch(function () {
          state.systemMenuActions = [];
          state.systemSelectedAction = '';
          return [];
        }).finally(function () {
          state.systemMenuLoading = false;
          if (state.activePage === 'system') {
            renderPage();
          }
        });
      }

      function loadMudActions() {
        if (state.mudActionsLoading) {
          return Promise.resolve(state.mudActions);
        }
        state.mudActionsLoading = true;
        if (state.activePage === 'mud') {
          renderPage();
        }
        return callBackend('list-mud-actions').then(function (text) {
          var lines = String(text || '').split('\n');
          var parsed = [];
          for (var i = 0; i < lines.length; i += 1) {
            var line = String(lines[i] || '').trim();
            if (!line) {
              continue;
            }
            var parts = line.split('|');
            var id = String(parts[0] || '').trim();
            var label = String(parts[1] || '').trim();
            var mode = String(parts[2] || '').trim() || 'spell';
            var description = String(parts[3] || '').trim();
            var argMode = String(parts[4] || '').trim() || 'none';
            var argLabel = String(parts[5] || '').trim();
            var argExample = String(parts[6] || '').trim();
            var available = String(parts[7] || '').trim() !== '0';
            var reason = String(parts[8] || '').trim();
            if (!id || !label) {
              continue;
            }
            parsed.push({
              id: id,
              label: label,
              mode: mode,
              description: description,
              argMode: argMode,
              argLabel: argLabel,
              argExample: argExample,
              available: available,
              reason: reason
            });
          }
          state.mudActions = parsed;
          if (state.mudSelectedAction) {
            var stillExists = parsed.some(function (row) { return row.id === state.mudSelectedAction; });
            if (!stillExists) {
              state.mudSelectedAction = '';
            }
          }
          return parsed;
        }).catch(function () {
          state.mudActions = [];
          state.mudSelectedAction = '';
          return [];
        }).finally(function () {
          state.mudActionsLoading = false;
          if (state.activePage === 'mud') {
            renderPage();
          }
        });
      }

      function loadCastData() {
        state.castPageLoading = true;
        renderPage();
        state.spellCache = {};

        var categoriesPromise = callBackend('list-spell-categories')
          .then(function (text) {
            var rows = String(text || '').split('\n').map(function (line) {
              return String(line || '').trim();
            }).filter(Boolean);
            var parsed = [];
            for (var i = 0; i < rows.length; i += 1) {
              var line = rows[i];
              var parts = line.split('|');
              var id = parts[0] || '';
              var kind = parts[1] || 'spell';
              var label = parts[2] || id;
              var count = Number(parts[3] || 0);
              if (!label && id.indexOf(':') !== -1) {
                label = id.split(':')[1];
              }
              if (isNaN(count) || count < 0) {
                count = 0;
              }
              if (id) {
                parsed.push({ id: id, kind: kind, title: label, count: count });
              }
            }
            parsed.sort(function (left, right) {
              return (left.title || '').localeCompare(right.title || '');
            });
            state.cast.categories = parsed;
            if (state.cast.selectedCategory) {
              var stillExists = parsed.some(function (row) { return row.id === state.cast.selectedCategory; });
              if (!stillExists) {
                state.cast.selectedCategory = '';
              }
            }
            return parsed;
          })
          .catch(function () {
            state.cast.categories = [
              { id: 'builtin:arcana', kind: 'builtin', title: 'Arcana', count: 0 },
              { id: 'builtin:web', kind: 'builtin', title: 'Web', count: 0 },
              { id: 'custom:local', kind: 'custom', title: 'Local', count: 0 }
            ];
            if (state.cast.selectedCategory && !findCastCategoryById(state.cast.selectedCategory)) {
              state.cast.selectedCategory = '';
            }
            return state.cast.categories;
          })
          .then(function (categories) {
            var loads = [];
            for (var i = 0; i < categories.length; i += 1) {
              loads.push(loadSpellRowsForCategory(categories[i].id).catch(function () {}));
            }
            return Promise.all(loads);
          });

        var memorizedPromise = callBackend('list-memorized-spells')
          .then(function (text) {
            var raw = String(text || '').split('\n');
            var parsed = [];
            for (var i = 0; i < raw.length; i += 1) {
              var parts = String(raw[i] || '').split('\t');
              if (!parts[0]) {
                continue;
              }
              parsed.push({ name: String(parts[0]).trim(), command: String(parts[1] || '').trim() });
            }
            state.cast.memorized = parsed;
          })
          .catch(function () {
            state.cast.memorized = [];
          });

        return Promise.all([categoriesPromise, memorizedPromise]).finally(function () {
          state.castPageLoading = false;
          renderPage();
        });
      }

      function loadMenuCatalog() {
        return callBackend('list-menu-spells').then(function (text) {
          var lines = String(text || '').split('\n');
          var parsed = [];
          for (var i = 0; i < lines.length; i += 1) {
            var parts = String(lines[i] || '').split('|');
            var name = String(parts[0] || '').trim();
            var sourcedOnly = String(parts[1] || '').trim() === '1';
            var argMode = String(parts[2] || '').trim() || 'none';
            var topLevel = String(parts[3] || '').trim() === '1';
            var invocation = String(parts[4] || '').trim();
            var argLabel = String(parts[5] || '').trim();
            var argHelp = String(parts[6] || '').trim();
            var argExample = String(parts[7] || '').trim();
            var argValues = String(parts[8] || '').trim();
            if (!name) {
              continue;
            }
            parsed.push({
              name: name,
              sourcedOnly: sourcedOnly,
              argMode: argMode === 'required' || argMode === 'optional' ? argMode : 'none',
              topLevel: topLevel,
              invocation: invocation || name,
              argLabel: argLabel,
              argHelp: argHelp,
              argExample: argExample,
              argValues: argValues ? argValues.split(',').map(function (item) { return String(item || '').trim(); }).filter(Boolean) : []
            });
          }
          state.menuCatalog = parsed;
          if (state.composer.open) {
            renderComposer();
          }
        }).catch(function () {
          state.menuCatalog = [];
        });
      }

      function loadSpellbookAliases() {
        return callBackend('list-synonyms').then(function (text) {
          var lines = String(text || '').split('\n');
          var parsed = [];
          for (var i = 0; i < lines.length; i += 1) {
            var line = String(lines[i] || '').trim();
            if (!line) {
              continue;
            }
            var parts = line.split('|');
            var alias = String(parts[0] || '').trim();
            var command = String(parts[1] || '').trim();
            var scope = String(parts[2] || '').trim().toLowerCase();
            if (!alias || !command) {
              continue;
            }
            if (scope !== 'custom' && scope !== 'default') {
              scope = 'default';
            }
            parsed.push({ alias: alias, command: command, scope: scope });
          }
          state.spellbookBuiltin = parsed;
        }).catch(function () {
          state.spellbookBuiltin = [];
        }).finally(function () {
          state.spellbookAliasesLoaded = true;
          if (state.activePage === 'spellbook') {
            renderPage();
          }
        });
      }

      function loadArcanaInstall() {
        return callBackend('list-arcana-install').then(function (text) {
          var lines = String(text || '').split('\n');
          var parsed = [];
          for (var i = 0; i < lines.length; i += 1) {
            var parts = String(lines[i] || '').split('|');
            var name = String(parts[0] || '').trim();
            var status = String(parts[1] || '').trim();
            var label = String(parts[2] || '').trim();
            if (!name) {
              continue;
            }
            parsed.push({ name: name, status: status || 'not installed', label: label || name });
          }
          state.arcanaInstall = parsed;
          if (state.arcanaSelectedModule) {
            var stillExists = parsed.some(function (row) { return row.name === state.arcanaSelectedModule; });
            if (!stillExists) {
              state.arcanaSelectedModule = '';
            }
          }
          if (state.activePage === 'arcana') {
            renderPage();
          }
          if (state.composer.open) {
            renderComposer();
          }
        }).catch(function () {
          state.arcanaInstall = [];
          state.arcanaSelectedModule = '';
        });
      }

      function loadArcanaModuleItems(moduleName) {
        var name = String(moduleName || '').trim();
        if (!name) {
          return Promise.resolve([]);
        }
        state.arcanaModuleItemsLoading[name] = true;
        if (state.activePage === 'arcana') {
          renderPage();
        }
        return callBackend('list-arcana-module-items', [name]).then(function (text) {
          var lines = String(text || '').split('\n');
          var items = [];
          for (var i = 0; i < lines.length; i += 1) {
            var line = String(lines[i] || '').trim();
            if (!line) {
              continue;
            }
            var parts = line.split('|');
            var kind = String(parts[0] || '').trim();
            var value = String(parts[1] || '').trim();
            var label = String(parts[2] || '').trim();
            if (!kind || !value) {
              continue;
            }
            items.push({
              kind: kind,
              value: value,
              name: value,
              label: label || value
            });
          }
          state.arcanaModuleItems[name] = items;
          return items;
        }).catch(function () {
          state.arcanaModuleItems[name] = [];
          return [];
        }).finally(function () {
          state.arcanaModuleItemsLoading[name] = false;
          if (state.activePage === 'arcana') {
            renderPage();
          }
        });
      }

      function loadSpellRowsForCategory(catId) {
        if (!catId) {
          return Promise.resolve();
        }
        return callBackend('list-spells', [catId]).then(function (text) {
          var rows = String(text || '').split('\n').map(function (line) {
            return String(line || '').trim();
          }).filter(Boolean);
          state.spellCache[catId] = rows;
          if (!rows.length && state.cast.categories.length) {
            var selected = state.cast.categories.filter(function (item) { return item.id === catId; })[0];
            if (selected) {
              selected.count = 0;
            }
          }
          if (state.composer.open) {
            renderComposer();
          }
        }).catch(function () {
          state.spellCache[catId] = [];
        });
      }

      function isArcanaAction(kind) {
        return String(kind || '').indexOf('arcana:') === 0;
      }

      function runQuickAction(kind, target, options) {
        options = options || {};
        if (state.actionInFlight) {
          return;
        }
        state.actionInFlight = true;
        pushActivity('app', 'Queued ' + kind + (target ? ': ' + target : ''), { kind: kind, target: target, section: 'app', app: 'wizardry-core' });
        callBackend('run-action', [kind, target]).then(function (text) {
          var output = String(text || '').trim();
          if (options.outputId) {
            setOutputBlock(options.outputId, output || ('Action ' + kind + ' complete.'));
          }
          pushActivity('app', kind + ' completed', { kind: kind, output: output, section: 'app', app: 'wizardry-core', status: 'ok' });
        }).catch(function (error) {
          if (options.outputId) {
            setOutputBlock(options.outputId, String(error && error.message ? error.message : error || 'Action failed.'));
          }
          pushActivity('app', kind + ' failed: ' + (error && error.message ? error.message : String(error || '')), { kind: kind, section: 'app', app: 'wizardry-core', status: 'error' });
        }).finally(function () {
          loadWatchHistory();

      function copyActivityLog() {

        var text = state.activity.casting.concat(state.activity.app, state.activity.output).map(function (row) {
          return timestampForRow(row.ts) + ' ' + row.kind + ' ' + row.text +
            (row.payload && row.payload.app ? (' app=' + row.payload.app) : '') +

      function openSettings(open) {
        els.settingsPanel.classList.toggle('wd-hidden', !open);
        if (open && els.railWidthInput) {
          els.railWidthInput.value = String(state.railWidth);
        }
      }

      function setDividerListeners() {
        var startX = 0;
        var startW = state.railWidth;

        function onMove(event) {
          if (!state.dividerDragging) {
            return;
          }
          var clientX = event.clientX;
          var delta = clientX - startX;
          saveRailWidth(startW + delta);
        }

        function onEnd() {
          state.dividerDragging = false;
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onEnd);
        }

        if (!els.railDivider) {
          return;
        }
        els.railDivider.addEventListener('pointerdown', function (event) {
          event.preventDefault();
          state.dividerDragging = true;
          startX = event.clientX;
          startW = state.railWidth;
          document.addEventListener('pointermove', onMove);
          document.addEventListener('pointerup', onEnd);
        });
      }

      function setOutputBlock(id, value) {
        var el = document.getElementById(id);
        var outputText = String(value == null ? '' : value).trim() || 'No output.';
        if (el) {
          el.textContent = outputText;
        }
        pushCommandOutput(id, outputText);
      }

      function bindEvents() {
        document.addEventListener('click', function (event) {
          var path = typeof event.composedPath === 'function' ? event.composedPath() : [];
          var insideComposer = path.indexOf(els.composerPanel) >= 0 || path.indexOf(els.composerToggle) >= 0;
          if (state.composer.open && !insideComposer && !event.target.closest('.wd-composer-panel') && !event.target.closest('#command-composer-toggle')) {
            setComposerOpen(false);
          }
          if (els.themeMenu && !els.themeMenu.classList.contains('wd-hidden')) {
            if (!event.target.closest('#theme-picker-btn') && !event.target.closest('#theme-menu')) {
              closeThemeMenu(true);
            }
          }
          if (state.activityOpen && !event.target.closest('#activity-drawer') && !event.target.closest('#activity-toggle')) {
            setActivityOpen(false);
          }
          if (!state.dividerDragging && !els.settingsPanel.classList.contains('wd-hidden') && !event.target.closest('#settings-panel') && !event.target.closest('#settings-toggle')) {
            openSettings(false);
          }
        });

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            if (state.composer.open) {
              setComposerOpen(false);
              return;
            }
            closeThemeMenu(false);
            setActivityOpen(false);
            openSettings(false);
            return;
          }
          if (document.activeElement && document.activeElement.tagName === 'INPUT' && event.ctrlKey) {
            return;
          }
          if (state.themeMenuOpen && (event.key === 'ArrowDown' || event.key === 'ArrowUp')) {
            cycleTheme(event.key === 'ArrowDown' ? 1 : -1);
            return;
          }
          if (document.activeElement && document.activeElement.closest('#left-nav')) {
            if (event.key === 'ArrowDown') {
              setSelectedNavFromIndex(1);
              return;
            }
            if (event.key === 'ArrowUp') {
              setSelectedNavFromIndex(-1);
              return;
            }
            if (event.key === 'Enter' || event.key === ' ') {
              var navPages = getNavPages();
              var selectedPage = navPages[state.selectedNavIndex];
              if (!selectedPage) {
                return;
              }
              var selected = rowElementForPage(selectedPage.id);
              if (selected) {
                setActivePage(selected.getAttribute('data-page'));
              }
              return;
            }
          }
        });

        if (els.leftNav) {
          els.leftNav.addEventListener('click', function (event) {
            var pageButton = event.target.closest('[data-page]');
            if (pageButton) {
              setActivePage(pageButton.getAttribute('data-page'));
            }
          });
        }

        if (els.themePickerBtn) {
          els.themePickerBtn.addEventListener('click', function () {
            if (state.themeMenuOpen) {
              closeThemeMenu(true);
            } else {
              openThemeMenu();
            }
          });
        }

        if (els.themeMenu) {
          els.themeMenu.addEventListener('click', function (event) {
            var item = event.target.closest('.wd-theme-item');
            if (!item) {
              return;
            }
            var name = item.getAttribute('data-theme-name');
            if (name) {
              applyTheme(name);
              closeThemeMenu(true);
            }
          });
        }

        if (els.composerToggle) {
          els.composerToggle.addEventListener('click', function () {
            state.composer.startupLock = false;
            if (state.composer.open) {
              setComposerOpen(false);
            } else {
              composerOpenWithTokens([], { userInitiated: true, allowEmpty: true, seededDefaults: false });
            }
          });
        }
        if (els.composerBackdrop) {
          els.composerBackdrop.addEventListener('click', function () {
            setComposerOpen(false);
          });
        }
        if (els.composerClose) {
          els.composerClose.addEventListener('click', function () {
            setComposerOpen(false);
          });
        }
        if (els.composerCloseBtn) {
          els.composerCloseBtn.addEventListener('click', function () {
            setComposerOpen(false);
          });
        }
        if (els.composerCopy) {
          els.composerCopy.addEventListener('click', function () {
            copyComposerCommand();
          });
        }
        if (els.composerClear) {
          els.composerClear.addEventListener('click', function () {
            clearComposer();
          });
        }
        if (els.composerRun) {
          els.composerRun.addEventListener('click', function () {
            runComposerFromDraft();
          });
        }
        if (els.composerInput) {
          els.composerInput.addEventListener('click', function () {
            state.composer.selectedToken = -1;
            renderComposer();
          });
          els.composerInput.addEventListener('input', function () {
            state.composer.rawInput = String(els.composerInput.value || '');
            renderComposer();
          });
          els.composerInput.addEventListener('keydown', function (event) {
            if (event.ctrlKey || event.metaKey || event.altKey) {
              return;
            }
            if (event.key === 'Tab') {
              if (composerApplyAutocompleteSelection()) {
                event.preventDefault();
              }
              return;
            }
            if (event.key === 'Enter') {
              event.preventDefault();
              if (event.shiftKey) {
                runComposerFromDraft();
                return;
              }
              if (composerApplyAutocompleteSelection()) {
                return;
              }
              commitComposerInput(true);
              renderComposer();
              return;
            }
            if (event.key === ' ' || event.key === ',') {
              event.preventDefault();
              commitComposerInput(true);
              return;
            }
            if (event.key === 'ArrowDown') {
              if (composerMoveAutocomplete(1)) {
                event.preventDefault();
              }
              return;
            }
            if (event.key === 'ArrowUp') {
              if (composerMoveAutocomplete(-1)) {
                event.preventDefault();
                return;
              }
              if (String(els.composerInput.value || '') === '') {
                event.preventDefault();
                if (state.composer.tokens.length) {
                  setComposerSelectedToken(state.composer.tokens.length - 1);
                  renderComposer();
                }
              }
              return;
            }
            if (event.key === 'Backspace') {
              if (String(els.composerInput.value || '') === '') {
                if (state.composer.selectedToken >= 0) {
                  removeComposerTokenAt(state.composer.selectedToken);
                  return;
                }
                if (state.composer.tokens.length) {
                  setComposerSelectedToken(state.composer.tokens.length - 1);
                  renderComposer();
                  return;
                }
              }
              return;
            }
            if (event.key === 'ArrowLeft' && String(els.composerInput.value || '') === '') {
              if (state.composer.tokens.length) {
                event.preventDefault();
                var prev = state.composer.selectedToken;
                if (prev < 0) {
                  setComposerSelectedToken(state.composer.tokens.length - 1);
                } else if (prev === 0) {
                  setComposerSelectedToken(state.composer.tokens.length - 1);
                } else {
                  setComposerSelectedToken(prev - 1);
                }
                renderComposer();
              }
              return;
            }
            if (event.key === 'ArrowRight' && String(els.composerInput.value || '') === '') {
              if (state.composer.tokens.length) {
                event.preventDefault();
                var next = state.composer.selectedToken;
                if (next < 0 || next >= state.composer.tokens.length - 1) {
                  setComposerSelectedToken(0);
                } else {
                  setComposerSelectedToken(next + 1);
                }
                renderComposer();
              }
              return;
            }
            if (event.key === 'Home') {
              if (state.composer.tokens.length) {
                event.preventDefault();
                setComposerSelectedToken(0);
                renderComposer();
              }
              return;
            }
            if (event.key === 'End') {
              if (state.composer.tokens.length) {
                event.preventDefault();
                setComposerSelectedToken(state.composer.tokens.length - 1);
                renderComposer();
              }
              return;
            }
            if (event.key === 'Delete') {
              if (state.composer.selectedToken >= 0) {
                event.preventDefault();
                removeComposerTokenAt(state.composer.selectedToken);
              }
              return;
            }
            if (event.key === 'Escape') {
              setComposerOpen(false);
              return;
            }
          });
        }
        if (els.composerTokenRow) {
          els.composerTokenRow.addEventListener('click', function (event) {
            var remove = event.target.closest('[data-composer-token-remove]');
            if (remove) {
              removeComposerTokenAt(remove.getAttribute('data-composer-token-remove'));
              return;
            }
            var token = event.target.closest('[data-composer-token]');
            if (token) {
              editComposerTokenAt(token.getAttribute('data-composer-token'));
              return;
            }
          });
          els.composerTokenRow.addEventListener('keydown', function (event) {
            var tokenEl = event.target.closest('[data-composer-token]');
            if (!tokenEl) {
              return;
            }
            var idx = Number(tokenEl.getAttribute('data-composer-token'));
            if (event.key === 'ArrowLeft') {
              event.preventDefault();
              moveComposerTokenSelection(-1);
              return;
            }
            if (event.key === 'ArrowRight') {
              event.preventDefault();
              moveComposerTokenSelection(1);
              return;
            }
            if (event.key === 'Home') {
              event.preventDefault();
              setComposerSelectedToken(0);
              renderComposer();
              return;
            }
            if (event.key === 'End') {
              event.preventDefault();
              setComposerSelectedToken(state.composer.tokens.length - 1);
              renderComposer();
              return;
            }
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              editComposerTokenAt(idx);
              return;
            }
            if (event.key === 'Delete' || event.key === 'Backspace') {
              event.preventDefault();
              removeComposerTokenAt(idx);
              return;
            }
            if (event.key === 'Escape') {
              event.preventDefault();
              if (state.composer.tokens.length) {
                setComposerSelectedToken(-1);
                renderComposer();
                if (typeof focusComposerInput === 'function') {
                  focusComposerInput();
                }
              } else {
                setComposerOpen(false);
              }
            }
          });
        }
        if (els.composerAutocomplete) {
          els.composerAutocomplete.addEventListener('click', function (event) {
            var option = event.target.closest('[data-composer-suggest-index]');
            if (!option) {
              return;
            }
            var index = Number(option.getAttribute('data-composer-suggest-index'));
            composerApplyAutocompleteSelection(index);
          });
        }
        if (els.composerPanel) {
          els.composerPanel.addEventListener('keydown', function (event) {
            if (event.key !== 'Tab') {
              return;
            }
            var focusables = composerFocusableElements();
            if (!focusables.length) {
              return;
            }
            var index = focusables.indexOf(document.activeElement);
            if (event.shiftKey) {
              if (index <= 0) {
                event.preventDefault();
                focusables[focusables.length - 1].focus();
              }
              return;
            }
            if (index === focusables.length - 1) {
              event.preventDefault();
              focusables[0].focus();
            }
          });
        }

        if (els.activityToggle) {
          els.activityToggle.addEventListener('click', function () {
            setActivityOpen(!state.activityOpen);
          });
        }
        if (els.activityCopy) {
          els.activityCopy.addEventListener('click', copyActivityLog);
        }
        if (els.activityClose) {
          els.activityClose.addEventListener('click', function () {
            setActivityOpen(false);
          });
        }
        if (els.settingsToggle) {
          els.settingsToggle.addEventListener('click', function () {
            openSettings(true);
          });
        }
        if (els.settingsClose) {
          els.settingsClose.addEventListener('click', function () {
            openSettings(false);
          });
        }
        if (els.railWidthInput) {
          els.railWidthInput.addEventListener('input', function (event) {
            saveRailWidth(event.target.value);
          });
          els.railWidthInput.min = '220';
          els.railWidthInput.max = '420';
          els.railWidthInput.value = String(state.railWidth);
        }
        if (els.pageDrillBack) {
          els.pageDrillBack.addEventListener('click', function () {
            runDrillBack(els.pageDrillBack.getAttribute('data-drill-back'));
          });
        }
        if (els.contentArea) {
          els.contentArea.addEventListener('click', function (event) {
            var drillBack = event.target.closest('[data-drill-back]');
            if (drillBack) {
              runDrillBack(drillBack.getAttribute('data-drill-back'));
              return;
            }

            var castCategoryOpen = event.target.closest('[data-cast-category-open]');
            if (castCategoryOpen) {
              var categoryId = castCategoryOpen.getAttribute('data-cast-category-open');
              if (categoryId) {
                setCastSelectedCategory(categoryId, 'forward');
              }
              return;
            }

            var arcanaModuleOpen = event.target.closest('[data-arcana-module-open]');
            if (arcanaModuleOpen) {
              var moduleOpen = arcanaModuleOpen.getAttribute('data-arcana-module-open');
              if (moduleOpen) {
                setArcanaSelectedModule(moduleOpen, 'forward');
              }
              return;
            }

            var systemSelect = event.target.closest('[data-system-select]');
            if (systemSelect) {
              var selectedSystemAction = systemSelect.getAttribute('data-system-select');
              if (selectedSystemAction) {
                setSystemSelectedAction(selectedSystemAction, 'forward');
              }
              return;
            }

            var mudSelect = event.target.closest('[data-mud-select]');
            if (mudSelect) {
              var selectedMudAction = mudSelect.getAttribute('data-mud-select');
              if (selectedMudAction) {
                setMudSelectedAction(selectedMudAction, 'forward');
              }
              return;
            }

            var runSpellBtn = event.target.closest('[data-run-spell]');
            if (runSpellBtn) {
              var value = runSpellBtn.getAttribute('data-run-spell');
              if (value && value.indexOf('|') >= 0) {
                var pieces = value.split('|');
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['run-spell', pieces[0], pieces[1]], { userInitiated: true });
                  return;
                }
                runSpell(pieces[0], pieces[1]);
              }
              return;
            }

            var helpBtn = event.target.closest('[data-help]');
            if (helpBtn) {
              var helpValue = helpBtn.getAttribute('data-help');
              if (helpValue && helpValue.indexOf('|') >= 0) {
                var pair = helpValue.split('|');
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['spell-help', pair[0], pair[1]], { userInitiated: true });
                  return;
                }
                runSpellHelp(pair[0], pair[1]);
              }
              return;
            }

            var memorizeBtn = event.target.closest('[data-memorize-spell]');
            if (memorizeBtn) {
              var memorizeValue = memorizeBtn.getAttribute('data-memorize-spell');
              if (memorizeValue && memorizeValue.indexOf('|') >= 0) {
                var memorizePair = memorizeValue.split('|');
                memorizeSpell(memorizePair[1]);
              }
              return;
            }

            var installArcana = event.target.closest('[data-install-arcana]');
            if (installArcana) {
              var moduleName = installArcana.getAttribute('data-install-arcana');
              if (moduleName) {
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['run-action', 'arcana:install', moduleName], { userInitiated: true });
                  return;
                }
                runArcanaAction('arcana:install', moduleName, {
                  outputId: 'arcana-output',
                  refreshArcana: true
                });
              }
              return;
            }

            var arcanaMenu = event.target.closest('[data-arcana-menu]');
            if (arcanaMenu) {
              var menuModule = arcanaMenu.getAttribute('data-arcana-menu');
              if (menuModule) {
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['run-action', 'arcana:menu', menuModule], { userInitiated: true });
                  return;
                }
                runArcanaAction('arcana:menu', menuModule, {
                  outputId: 'arcana-output',
                  refreshArcana: true
                });
              }
              return;
            }

            var adminAction = event.target.closest('[data-admin-action]');
            if (adminAction) {
              var action = adminAction.getAttribute('data-admin-action');
              if (action) {
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['run-action', action], { userInitiated: true });
                  return;
                }
                runQuickAction(action, action, {
                  outputId: 'arcana-output',
                  refreshArcana: isArcanaAction(action)
                });
                if (action === 'arcana:themes') {
                  setOutputBlock('arcana-output', 'Themes: ' + state.themes.join(', '));
                }
              }
              return;
            }

            var systemMenuAction = event.target.closest('[data-system-menu-action]');
            if (systemMenuAction) {
              var systemActionId = systemMenuAction.getAttribute('data-system-menu-action');
              var systemActionLabel = systemMenuAction.getAttribute('data-system-label') || systemActionId;
              if (systemActionId) {
                if (event.shiftKey || event.metaKey || event.ctrlKey) {
                  composerOpenWithTokens(['run-system', systemActionId], { userInitiated: true });
                  return;
                }
                runSystemMenuAction(systemActionId, {
                  label: systemActionLabel
                });
              }
              return;
            }

            var hostAction = event.target.closest('[data-host-action]');
            if (hostAction) {
              var command = hostAction.getAttribute('data-host-action');
              var systemCommand = command && command.indexOf('system:') === 0 ? command : 'system:' + command;
              if (event.shiftKey || event.metaKey || event.ctrlKey) {
                composerOpenWithTokens(['run-system', systemCommand], { userInitiated: true });
                return;
              }
              var output = callBackend('run-system', [command]).then(function (text) {
                setOutputBlock('system-output', text || 'no output');
              }).catch(function (error) {
                setOutputBlock('system-output', String(error && error.message ? error.message : error || 'failure'));
              });
              return;
            }

            var mudRunAction = event.target.closest('[data-mud-run-action]');
            if (mudRunAction) {
              var mudActionId = String(mudRunAction.getAttribute('data-mud-run-action') || '').trim();
              var mudRow = findMudActionById(mudActionId);
              var mudArgValue = String(state.mudDraftArgs[mudActionId] || '');
              if (mudRow && mudRow.argMode === 'required' && mudArgValue.trim() === '') {
                state.mudOutput = (mudRow.argLabel || 'Argument') + ' is required.';
                setOutputBlock('mud-output', state.mudOutput);
                return;
              }
              runMudAction(mudActionId, mudArgValue, {
                label: mudRow ? mudRow.label : mudActionId
              });
              return;
            }

            var addToggle = event.target.closest('#spellbook-add-toggle');
            if (addToggle) {
              var form = document.getElementById('spellbook-add-dialog');
              setSynonymDialogOpen(!form || form.classList.contains('wd-hidden'));
              return;
            }
            var saveBtn = event.target.closest('#spell-save');
            if (saveBtn) {
              saveSynonymFromDialog();
              return;
            }
            var cancelBtn = event.target.closest('#spell-cancel');
            if (cancelBtn) {
              setSynonymDialogOpen(false);
              return;
            }

            var removeSynonym = event.target.closest('[data-remove-synonym]');
            if (removeSynonym) {
              removeSynonymFromElement(removeSynonym.getAttribute('data-remove-synonym'));
            }
          });

          els.contentArea.addEventListener('input', function (event) {
            var mudArgInput = event.target.closest('[data-mud-arg]');
            if (!mudArgInput) {
              return;
            }
            var mudActionId = String(mudArgInput.getAttribute('data-mud-arg') || '').trim();
            if (!mudActionId) {
              return;
            }
            state.mudDraftArgs[mudActionId] = String(mudArgInput.value || '');
          });
        }

        if (els.contentArea) {
          els.contentArea.addEventListener('keydown', function (event) {
            var mudArgInput = event.target && event.target.closest && event.target.closest('[data-mud-arg]');
            if (mudArgInput && event.key === 'Enter' && !event.shiftKey) {
              event.preventDefault();
              var mudActionId = String(mudArgInput.getAttribute('data-mud-arg') || '').trim();
              var runButton = mudActionId ? document.querySelector('[data-mud-run-action="' + mudActionId + '"]') : null;
              if (runButton && typeof runButton.click === 'function') {
                runButton.click();
              }
              return;
            }

            var dialog = document.getElementById('spellbook-add-dialog');
            if (!dialog || dialog.classList.contains('wd-hidden')) {
              return;
            }
            if (!event.target) {
              return;
            }
            var isAliasInput = event.target.id === 'spell-alias';
            var isCommandInput = event.target.id === 'spell-command';
            if (!isAliasInput && !isCommandInput) {
              return;
            }

            if (event.key === 'Escape') {
              setSynonymDialogOpen(false);
              return;
            }
            if (event.key === 'Enter') {
              event.preventDefault();
              if (isAliasInput) {
                var commandInput = document.getElementById('spell-command');
                if (commandInput && typeof commandInput.focus === 'function') {
                  commandInput.focus();
                }
                return;
              }
              saveSynonymFromDialog();
            }
          });
        }

        if (els.railDivider) {
          els.railDivider.addEventListener('keydown', function (event) {
            if (event.key === 'ArrowLeft') {
              saveRailWidth(state.railWidth - 10);
            }
            if (event.key === 'ArrowRight') {
              saveRailWidth(state.railWidth + 10);
            }
          });
        }

        document.addEventListener('pointerup', function () {
          state.dividerDragging = false;
        });
        setDividerListeners();

        document.addEventListener('keydown', function (event) {
          if (!state.themeMenuOpen) {
            return;
          }
          if (event.key === 'ArrowDown' || event.key === 'ArrowUp' || event.key === 'Home' || event.key === 'End') {
            event.preventDefault();
          }
          if (event.key === 'Escape') {
            closeThemeMenu(true);
          }
          if (event.key === 'ArrowDown') {
            cycleTheme(1);
          } else if (event.key === 'ArrowUp') {
            cycleTheme(-1);
          } else if (event.key.length === 1) {
            handleThemeTypeahead(event.key);
          }
        });
      }

      function removeSynonymFromElement(index) {
        var aliasName = String(index || '').trim();
        if (!aliasName) {
          return;
        }
        removeSynonym(aliasName);
      }

      function initThemeControlFallback() {
        if (els.themePickerBtn) {
          els.themePickerBtn.textContent = themeLabel(state.activeTheme || 'adept');
        }
        if (els.railWidthInput) {
          els.railWidthInput.value = String(state.railWidth);
        }
        applyRailWidth();
      }

      function bootstrap() {
        initElements();
        setDividerListeners();
        bindEvents();
        setComposerOpen(false, { skipFocus: true });
        window.addEventListener('pageshow', function () {
          setComposerOpen(false, { skipFocus: true });
        });
        document.addEventListener('visibilitychange', function () {
          if (document.hidden && state.composer.open) {
            setComposerOpen(false, { skipFocus: true });
          }
        });
        renderNav();
        renderPage();
        renderThemeMenu();
        renderActivity();
        initThemeControlFallback();
        ensureBridge();
        setBridgeState(bridgeAvailable());
        window.addEventListener('pointerdown', function () {
          state.composer.startupLock = false;
        }, { once: true, capture: true });
        window.addEventListener('keydown', function () {
          state.composer.startupLock = false;
        }, { once: true, capture: true });
        var startupCloseTicks = 0;
        var startupCloseTimer = setInterval(function () {
          if (!state.composer.startupLock || startupCloseTicks >= 10) {
            clearInterval(startupCloseTimer);
            return;
          }
          setComposerOpen(false, { skipFocus: true });
          startupCloseTicks += 1;
        }, 120);
        setTimeout(function () {
          state.composer.startupLock = false;
        }, 1400);

        loadRootHint().finally(function () {
          Promise.all([ensureBridge(), loadThemes(), loadPreferences(), loadMainMenuEntries(), loadMenuCatalog(), loadCastData(), loadSpellbookAliases(), loadArcanaInstall(), loadSystemMenuActions(), loadWatchHistory()])
            .catch(function () {
              state.bridgeReady = bridgeAvailable();
            })
            .finally(function () {
              setBridgeState(state.bridgeReady);
              applyLayoutColumns();
              setComposerOpen(false, { skipFocus: true });
              renderPage();
              pushActivity('boot', 'Wizardry Desktop is ready. Theme: ' + state.activeTheme, {});
              notifyHostBootReady(0);
              revealUI();
            });
        });
      }

      bootstrap();
    }());
  </script>
</body>
</html>
