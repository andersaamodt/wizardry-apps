<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Wizardry Desktop</title>
  <link rel="stylesheet" href="style.css?v=wizardry-desktop20260402a">
  <link id="wd-theme-stylesheet" rel="stylesheet" href="themes/psionic.css?v=wizardry-desktop20260402a">
  <link rel="icon" href="assets/forge-icon.png" type="image/png">
</head>
  <body class="wd-booting">
    <div id="splash" class="wd-splash" aria-live="polite">
      <img class="wd-splash-icon" src="assets/forge-icon.png" alt="" aria-hidden="true">
    </div>

  <main id="wd-app" class="wd-app-shell hidden" aria-hidden="true">
    <aside id="left-rail" class="wd-left-rail" aria-label="Wizardry workflow list">
      <header class="wd-rail-head" aria-hidden="true"></header>
      <nav id="left-nav" class="wd-nav" role="listbox" aria-label="Wizardry pages"></nav>
      <footer class="wd-rail-footer">
        <button id="settings-toggle" type="button" class="wd-icon-btn wd-icon-settings" title="Settings" aria-label="Open settings">
          <svg viewBox="0 0 14 14" focusable="false" aria-hidden="true">
            <path d="M14 8.3V5.73l-1.58-.264c-.117-.44-.292-.848-.496-1.2l.93-1.285-1.81-1.84-1.31.908c-.371-.205-.781-.38-1.187-.497L8.288 0H5.72l-.263 1.578c-.437.117-.816.293-1.196.497L2.979 1.17 1.141 2.98l.934 1.287c-.2.38-.376.79-.493 1.228L.004 5.73V8.3l1.575.264c.117.438.292.818.496 1.198l-.93 1.315 1.809 1.813 1.312-.938c.38.205.787.38 1.224.497l.26 1.55h2.566l.263-1.58c.408-.117.817-.293 1.196-.497l1.315.935 1.81-1.812-.935-1.315c.203-.38.38-.76.495-1.2L14 8.305zM7 9.704c-1.488 0-2.683-1.2-2.683-2.69S5.542 4.327 7 4.327s2.683 1.198 2.683 2.69c0 1.49-1.195 2.688-2.683 2.688z"></path>
          </svg>
        </button>
        <div class="wd-theme-wrap">
          <button id="theme-picker-btn" type="button" class="wd-icon-btn wd-theme-btn" title="Theme" aria-haspopup="true" aria-expanded="false" aria-controls="theme-menu">Theme</button>
          <div id="theme-menu" class="wd-floating wd-hidden" role="menu" aria-label="Theme selector">
            <div id="theme-list"></div>
          </div>
        </div>
      </footer>
    </aside>

    <div id="rail-divider" class="wd-rail-divider" role="separator" aria-orientation="vertical" tabindex="0" aria-label="Resize left rail"></div>

    <section id="main-column" class="wd-main-column">
      <header class="wd-content-head">
        <div class="wd-title-wrap">
          <div class="wd-title-row">
            <button id="page-drill-back" type="button" class="wd-drill-back wd-title-back wd-hidden" data-drill-back="" title="Back" aria-label="Back">←</button>
            <h2 id="page-title">Cast</h2>
          </div>
          <p id="page-subtitle" class="wd-hidden"></p>
        </div>
        <div class="wd-head-actions">
          <button id="command-composer-toggle" type="button" class="wd-icon-btn wd-composer-btn" title="Compose command..." aria-label="Compose command..." aria-expanded="false" aria-controls="command-composer-modal">
            <span class="wd-icon-composer" aria-hidden="true">
              <svg viewBox="0 0 18 18" focusable="false" aria-hidden="true">
                <g fill="currentColor">
                  <rect x="1" y="1" width="6" height="6" rx="1" ry="1"></rect>
                  <rect x="11" y="1" width="6" height="6" rx="1" ry="1"></rect>
                  <rect x="6" y="6" width="6" height="6" rx="1" ry="1"></rect>
                  <rect x="11" y="11" width="6" height="6" rx="1" ry="1"></rect>
                </g>
              </svg>
            </span>
            <span class="wd-hidden">Compose</span>
          </button>
          <button id="activity-toggle" type="button" class="wd-icon-btn wd-watch-btn" title="Toggle Casting Watch" aria-label="Toggle Casting Watch" aria-pressed="false">
            <svg viewBox="0 0 18 18" focusable="false" aria-hidden="true">
              <path d="M4 1.8h10a1 1 0 0 1 1 1V15a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2.8a1 1 0 0 1 1-1Zm.4 1.8v10.8h9.2V3.6H4.4Zm1.4 2.2h6.4v1.1H5.8V5.8Zm0 2.5h6.4v1.1H5.8V8.3Zm0 2.5h4.1v1.1H5.8v-1.1Z" fill="currentColor"></path>
            </svg>
          </button>
        </div>
      </header>
      <section id="content-scroll" class="wd-content-scroll">
        <div id="content-area"></div>
      </section>
    </section>

    <aside id="settings-panel" class="wd-settings wd-hidden" aria-label="Settings panel">
      <header class="wd-settings-head">
        <h2>Settings</h2>
        <button id="settings-close" type="button" class="wd-icon-btn wd-compact" aria-label="Close settings">×</button>
      </header>
      <section class="wd-settings-card">
        <h3>Rail Width</h3>
        <label for="rail-width" class="wd-row-label">Resize rail (persistent)</label>
        <input id="rail-width" type="range" min="220" max="420" step="10">
      </section>
      <section class="wd-settings-card">
        <h3>Theme</h3>
        <p class="wd-subline">Theme controls are in the rail footer.</p>
      </section>
      <section class="wd-settings-card">
        <h3>Persistence</h3>
        <div class="wd-status-pairs">
          <span>UI prefs</span>
          <span id="prefs-status">loaded</span>
        </div>
      </section>
    </aside>

    <aside id="activity-drawer" class="wd-activity-drawer wd-closed" aria-label="Casting watch">
      <div class="wd-activity-head">
        <div>
          <h3>Casting Watch</h3>
          <p id="activity-count" class="wd-subline">No events yet</p>
        </div>
        <div class="wd-activity-head-actions">
          <button id="activity-copy" type="button" class="wd-icon-btn wd-compact" title="Copy log">⎘</button>
          <button id="activity-close" type="button" class="wd-icon-btn wd-compact" title="Close casting watch">×</button>
        </div>
      </div>
      <div id="activity-feed" class="wd-activity-feed" role="log" aria-live="polite"></div>
    </aside>
  </main>

  <div id="command-composer-modal" class="wd-composer-modal wd-hidden" role="dialog" aria-modal="true" aria-labelledby="composer-title" hidden>
    <div id="composer-backdrop" class="wd-composer-backdrop" aria-hidden="true"></div>
    <section class="wd-composer-panel" role="document">
      <header class="wd-composer-head">
        <div>
          <h3 id="composer-title">Compose command</h3>
        </div>
        <button id="composer-close" type="button" class="wd-icon-btn wd-compact" title="Close composer" aria-label="Close command composer">×</button>
      </header>
      <div class="wd-composer-field">
        <label for="composer-input" class="wd-composer-label">Command builder</label>
        <div class="wd-composer-input-row">
          <div class="wd-composer-token-surface">
            <div id="composer-token-row" class="wd-composer-token-row" aria-label="Command tokens" role="list"></div>
            <input id="composer-input" class="wd-composer-input" type="text" placeholder="Type command tokens..." autocomplete="off" spellcheck="false" aria-autocomplete="list" title="Wrap values in quotes to keep spaces in one token.">
          </div>
          <button id="composer-copy" type="button" class="wd-icon-btn wd-compact wd-composer-copy-inline" title="Copy command" aria-label="Copy command">⎘</button>
          <button id="composer-run" type="button" class="wd-polite-btn wd-composer-run-inline" title="Press Enter to add token, Shift+Enter to run current command.">Run</button>
        </div>
        <div id="composer-autocomplete" class="wd-composer-autocomplete wd-hidden" role="listbox" aria-label="Command autocomplete"></div>
        <p id="composer-feedback" class="wd-composer-feedback wd-subline"></p>
      </div>
      <pre id="composer-output" class="wd-mono-box wd-composer-output" aria-live="polite">No command run yet.</pre>
      <footer class="wd-composer-actions">
        <button id="composer-clear" type="button" class="wd-polite-btn wd-secondary">Reset</button>
        <button id="composer-close-btn" type="button" class="wd-polite-btn wd-secondary">Close</button>
      </footer>
    </section>
  </div>

  <script src="../.host/shared/wizardry-bridge.js"></script>
  <script>
    (function () {
      'use strict';

      var ASSET_VERSION = 'wizardry-desktop20260402a';
      var THEME_FALLBACK = ['archmage', 'adept', 'chrono', 'chronomancer', 'conjurer', 'druid', 'empath'];
      var COMPOSER_ACTIONS = ['run-spell', 'spell-help', 'run-action', 'run-system'];
      var COMPOSER_SYSTEM_ACTIONS = [
        'system:restart-menu',
        'system:update-all',
        'system:update-wizardry',
        'system:services-menu',
        'system:nixos-rebuild',
        'system:verify-posix',
        'system:test-magic',
        'system:profile-tests',
        'system:uninstall-wizardry',
        'system:whoami',
        'system:pwd',
        'system:date',
        'system:status',
        'system:environment'
      ];
      var COMPOSER_PRESET_LIMIT = 8;
      var COMPOSER_TOKEN_RE = /^[a-z0-9._:-]+$/i;
      var COMPOSER_ARG_TOKEN_RE = /^[a-z0-9._:\/~+\-@% ]+$/i;
      var COMPOSER_REF_RE = /^[a-z0-9._-]+:[a-z0-9._-]+$/i;
      var NAV_PAGE_MAP = {
        cast: { id: 'cast', title: 'Cast', blurb: 'Cast spells and monitor memorized commands.' },
        mud: { id: 'mud', title: 'MUD', blurb: 'MUD-focused runtime commands.' },
        spellbook: { id: 'spellbook', title: 'Spellbook', blurb: 'Manage in-app spell aliases.' },
        arcana: { id: 'arcana', title: 'Arcana', blurb: 'Tools for wizardry app setup.' },
        system: { id: 'system', title: 'Computer', blurb: 'System maintenance and wizardry operations.' }
      };
      var DEFAULT_MAIN_MENU_ORDER = ['cast', 'mud', 'spellbook', 'arcana', 'system'];
      var COMPOSER_RUN_ACTIONS = {
        'arcana:install': { label: 'Arcana install', requiresArg: true, minArgs: 1, maxArgs: 1 },
        'arcana:menu': { label: 'Arcana menu', requiresArg: false, minArgs: 0, maxArgs: 1 },
        'arcana:themes': { label: 'Arcana themes', requiresArg: false, minArgs: 0, maxArgs: 0 },
        'arcana:reload': { label: 'Reload arcana index', requiresArg: false, minArgs: 0, maxArgs: 0 },
        'arcana:install-menu': { label: 'Arcana install menu', requiresArg: false, minArgs: 0, maxArgs: 0 },
        'arcana:module-menu': { label: 'Arcana module menu', requiresArg: true, minArgs: 1, maxArgs: 1 },
        'menu:list': { label: 'List all wizardry menus', requiresArg: false, minArgs: 0, maxArgs: 0 },
        'menu:help': { label: 'Show menu help', requiresArg: true, minArgs: 1, maxArgs: 1 },
        'menu:run': { label: 'Run menu command', requiresArg: true, minArgs: 1, maxArgs: 2 },
        'menu:terminal': { label: 'Open menu in terminal', requiresArg: true, minArgs: 1, maxArgs: 2 },
        'app-help': { label: 'Show app help', requiresArg: true, minArgs: 1, maxArgs: 1 }
      };
      var state = {
        activePage: 'cast',
        busy: false,
        bridgeReady: false,
        hostBootReadySent: false,
        rootHint: '',
        themes: [],
        activeTheme: 'adept',
        themeMenuOpen: false,
        themeTypeahead: '',
        themeTypeaheadTimer: null,
        prefsLoaded: false,
        railWidth: 300,
        dividerDragging: false,
        selectedNavIndex: 0,
        castPageLoading: false,
        cast: {
          categories: [],
          memorized: [],
          selectedCategory: ''
        },
        menuCatalog: [],
        spellCache: {},
        arcanaInstall: [],
        arcanaSelectedModule: '',
        arcanaModuleItems: {},
        arcanaModuleItemsLoading: {},
        mainMenuOrder: DEFAULT_MAIN_MENU_ORDER.slice(0),
        systemMenuLoading: false,
        systemMenuActions: [],
        systemOutput: 'Choose a Computer action to run.',
        mudActionsLoading: false,
        mudActions: [],
        mudOutput: 'Choose a MUD action to run.',
        mudDraftArgs: {},
        systemSelectedAction: '',
        mudSelectedAction: '',
        castDrillTransition: '',
        arcanaDrillTransition: '',
        systemDrillTransition: '',
        mudDrillTransition: '',
        spellbookAliasesLoaded: false,
        spellbookBuiltin: [],
        activityLoading: false,
        activity: {
          casting: [],
          app: [],
          output: []
        },
        activityOpen: false,
        activityDrawerWidth: 340,
        activityWatchIntervalMs: 2000,
        activityWatchTimer: null,
        activityRowsLimit: 220,
        actionInFlight: false,
        prefWriteQueue: Promise.resolve(),
        composer: {
          open: false,
          startupLock: true,
          seededDefaults: false,
          rawInput: '',
          tokens: [],
          selectedToken: -1,
          autocompleteIndex: -1,
          autocompleteEntries: [],
          message: '',
          output: 'No command run yet.',
          running: false
        }
      };

      var els = {};
      var backendScriptCache = '';

      function initElements() {
        els = {
          body: document.body,
          app: document.getElementById('wd-app'),
          splash: document.getElementById('splash'),
          leftRail: document.getElementById('left-rail'),
          mainColumn: document.getElementById('main-column'),
          leftNav: document.getElementById('left-nav'),
          railDivider: document.getElementById('rail-divider'),
          pageDrillBack: document.getElementById('page-drill-back'),
          pageTitle: document.getElementById('page-title'),
          pageSubtitle: document.getElementById('page-subtitle'),
          contentScroll: document.getElementById('content-scroll'),
          contentArea: document.getElementById('content-area'),
          activityToggle: document.getElementById('activity-toggle'),
          activityDrawer: document.getElementById('activity-drawer'),
          activityCount: document.getElementById('activity-count'),
          activityFeed: document.getElementById('activity-feed'),
          activityCopy: document.getElementById('activity-copy'),
          activityClose: document.getElementById('activity-close'),
          themeStylesheet: document.getElementById('wd-theme-stylesheet'),
          themePickerBtn: document.getElementById('theme-picker-btn'),
          themeMenu: document.getElementById('theme-menu'),
          themeList: document.getElementById('theme-list'),
          settingsPanel: document.getElementById('settings-panel'),
          settingsToggle: document.getElementById('settings-toggle'),
          settingsClose: document.getElementById('settings-close'),
          prefsStatus: document.getElementById('prefs-status'),
          railWidthInput: document.getElementById('rail-width'),
          arcanaList: document.getElementById('arcana-list'),
          composerModal: document.getElementById('command-composer-modal'),
          composerBackdrop: document.getElementById('composer-backdrop'),
          composerToggle: document.getElementById('command-composer-toggle'),
          composerClose: document.getElementById('composer-close'),
          composerCloseBtn: document.getElementById('composer-close-btn'),
          composerPanel: document.querySelector('.wd-composer-panel'),
          composerRun: document.getElementById('composer-run'),
          composerClear: document.getElementById('composer-clear'),
          composerCopy: document.getElementById('composer-copy'),
          composerCommandPreview: document.getElementById('composer-command-preview'),
          composerInput: document.getElementById('composer-input'),
          composerAutocomplete: document.getElementById('composer-autocomplete'),
          composerFeedback: document.getElementById('composer-feedback'),
          composerTokenRow: document.getElementById('composer-token-row'),
          composerOutput: document.getElementById('composer-output')
        };
      }

      function bridgeAvailable() {
        return !!(window.wizardry && window.wizardry.exec);
      }

      function detectBackendScriptCandidates() {
        var out = [];
        try {
          var pagePath = decodeURIComponent(String(window.location.pathname || ''));
          var appMarker = '/wizardry-desktop/index.html';
          var appIdx = pagePath.lastIndexOf(appMarker);
          if (appIdx >= 0) {
            out.push(pagePath.slice(0, appIdx) + '/wizardry-desktop/scripts/wizardry-desktop-backend.sh');
          }
          var workspaceMarker = '/wizardry-desktop/app/index.html';
          var workspaceIdx = pagePath.lastIndexOf(workspaceMarker);
          if (workspaceIdx >= 0) {
            var rootBase = pagePath.slice(0, workspaceIdx);
            out.push(rootBase + '/wizardry-desktop/app/scripts/wizardry-desktop-backend.sh');
            out.push(rootBase + '/wizardry-apps/apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh');
            if (!state.rootHint) {
              state.rootHint = rootBase + '/wizardry-apps';
            }
          }
          var repoMarker = '/apps/wizardry-desktop/';
          var repoIdx = pagePath.lastIndexOf(repoMarker);
          if (repoIdx >= 0) {
            state.rootHint = pagePath.slice(0, repoIdx);
            out.push(state.rootHint + '/apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh');
          }
          out.push('scripts/wizardry-desktop-backend.sh');
          out.push('apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh');
          out.push('chatroom/scripts/chatroom-backend.sh');
        } catch (_err) {
          // ignore
        }
        return out.filter(function (value, idx, arr) {
          return value && arr.indexOf(value) === idx;
        });
      }

      function isMissingBackendScriptError(error) {
        var msg = String(error && error.message ? error.message : error).toLowerCase();
        return msg.indexOf('wizardry-desktop-backend.sh') >= 0 && (msg.indexOf('no such file') >= 0 || msg.indexOf('cannot open') >= 0);
      }

      function ensureRootHint() {
        if (state.rootHint) {
          return state.rootHint;
        }
        var candidates = detectBackendScriptCandidates();
        for (var i = 0; i < candidates.length; i += 1) {
          var candidate = candidates[i];
          var marker = '/apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh';
          var idx = candidate.lastIndexOf(marker);
          if (idx > 0) {
            state.rootHint = candidate.slice(0, idx);
            return state.rootHint;
          }
        }
        return '';
      }

      function syncRootHintFromBackendPath(scriptPath) {
        var value = String(scriptPath || '');
        if (!value || state.rootHint) {
          return;
        }
        var marker = '/apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh';
        var idx = value.lastIndexOf(marker);
        if (idx > 0) {
          state.rootHint = value.slice(0, idx);
          return;
        }
        var workspaceMarker = '/wizardry-desktop/app/scripts/wizardry-desktop-backend.sh';
        idx = value.lastIndexOf(workspaceMarker);
        if (idx > 0) {
          state.rootHint = value.slice(0, idx) + '/wizardry-apps';
        }
      }

      function execArgv(argv) {
        return window.wizardry.exec(argv);
      }

      function parseKeyValueBlob(text) {
        var out = {};
        String(text || '').split('\n').forEach(function (line) {
          if (!line) {
            return;
          }
          var idx = line.indexOf('=');
          if (idx <= 0) {
            return;
          }
          out[line.slice(0, idx)] = line.slice(idx + 1);
        });
        return out;
      }

      async function callBackend(action, args) {
        args = args || [];
        var candidates = [];
        if (backendScriptCache) {
          candidates.push(backendScriptCache);
        }
        detectBackendScriptCandidates().forEach(function (candidate) {
          if (candidates.indexOf(candidate) < 0) {
            candidates.push(candidate);
          }
        });

        var lastErr;
        for (var i = 0; i < candidates.length; i += 1) {
          var scriptPath = candidates[i];
          try {
            var argv = ['sh', scriptPath, action].concat(args);
            var result = await execArgv(argv);
            if (typeof result !== 'undefined' && result !== null) {
              if (typeof result.exit_code !== 'undefined' && Number(result.exit_code) !== 0) {
                throw new Error(String((result.stderr || result.stdout || 'command failed').trim()));
              }
            }
            backendScriptCache = scriptPath;
            syncRootHintFromBackendPath(scriptPath);
            return String((result && result.stdout) || '');
          } catch (error) {
            lastErr = error;
            if (!isMissingBackendScriptError(error)) {
              throw error;
            }
          }
        }
        if (!candidates.length) {
          throw new Error('backend command unavailable');
        }
        if (bridgeAvailable()) {
          var fallback = ['sh', '-c', 'root="${WIZARDRY_APPS_ROOT:-}"; if [ -z "$root" ]; then root="${HOME}/git/wizardry-apps"; fi; exec sh "$root/apps/wizardry-desktop/scripts/wizardry-desktop-backend.sh" "$@"', 'wizardry-desktop-backend', action].concat(args);
          var fallbackResult = await execArgv(fallback);
          if (typeof fallbackResult !== 'undefined' && fallbackResult !== null && Number(fallbackResult.exit_code || 0) !== 0) {
            throw new Error(String((fallbackResult.stderr || fallbackResult.stdout || 'command failed').trim()));
          }
          return String((fallbackResult && fallbackResult.stdout) || '');
        }
        throw lastErr || new Error('backend unavailable');
      }

      function setText(el, value) {
        if (!el) {
          return;
        }
        el.textContent = String(value || '');
      }

      function focusComposerInput() {
        if (!els.composerInput) {
          return;
        }
        if (typeof els.composerInput.focus === 'function') {
          els.composerInput.focus();
        }
      }

      function moveComposerTokenSelection(delta) {
        var count = state.composer.tokens.length;
        if (!count) {
          return;
        }
        if (state.composer.selectedToken < 0) {
          state.composer.selectedToken = delta < 0 ? count - 1 : 0;
        } else {
          state.composer.selectedToken = (state.composer.selectedToken + delta + count) % count;
        }
        renderComposer();
      }

      function composerDefaultTokensForPage(pageId) {
        if (pageId === 'cast') {
          return ['run-spell'];
        }
        if (pageId === 'arcana') {
          return ['run-action'];
        }
        if (pageId === 'system' || pageId === 'mud') {
          return ['run-system'];
        }
        return ['run-action'];
      }

      function composerFocusableElements() {
        if (!els.composerModal) {
          return [];
        }
        var panel = els.composerModal.querySelector('.wd-composer-panel');
        if (!panel) {
          return [];
        }
        var nodes = Array.prototype.slice.call(panel.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'));
        return nodes.filter(function (node) {
          return node.offsetParent !== null && node.getAttribute('aria-hidden') !== 'true' && !node.disabled;
        });
      }

      function normalizeComposerToken(value) {
        return String(value || '').trim();
      }

      function parseComposerText(value) {
        var input = String(value == null ? '' : value);
        var tokens = [];
        var token = '';
        var quote = '';
        var escaped = false;
        var i = 0;
        for (i = 0; i < input.length; i += 1) {
          var ch = input.charAt(i);
          if (escaped) {
            token += ch;
            escaped = false;
            continue;
          }
          if (quote) {
            if (ch === '\\') {
              escaped = true;
              continue;
            }
            if (ch === quote) {
              quote = '';
              continue;
            }
            token += ch;
            continue;
          }
          if (ch === '"' || ch === "'") {
            quote = ch;
            continue;
          }
          if (ch === ',' || /\s/.test(ch)) {
            if (token) {
              tokens.push(token);
              token = '';
            }
            continue;
          }
          token += ch;
        }
        if (token) {
          tokens.push(token);
        }
        return {
          tokens: tokens.map(normalizeComposerToken).filter(Boolean),
          unclosedQuote: !!quote
        };
      }

      function splitComposerText(value) {
        return parseComposerText(value).tokens;
      }

      function escapeHtmlAttribute(value) {
        return String(value == null ? '' : value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function composerDraftState() {
        var tokens = Array.prototype.slice.call(state.composer.tokens || []);
        var parsed = parseComposerText(state.composer.rawInput);

        result.preview = action;

            result.message = 'Add a spell name.';

              actionName: actionName,

      function composerPushSuggestion(entries, seen, value, meta, hint) {

          meta: meta || '',
          hint: hint || ''

      function composerAutocompleteContext(plan) {

      function renderComposerTokenRow(plan) {

        }
        els.composerTokenRow.innerHTML = html;

      function renderComposerAutocomplete(plan) {

        for (var i = 0; i < suggestions.length; i += 1) {

          html += '<span class="wd-composer-suggest-label">' + escapeText(suggestion.value) + '</span>';
          if (suggestion.meta) {
            html += '<span class="wd-composer-suggest-meta">' + escapeText(suggestion.meta) + '</span>';
          }
          html += '</button>';
        }
        els.composerAutocomplete.innerHTML = html;
        els.composerAutocomplete.classList.remove('wd-hidden');

          els.composerInput.setAttribute('aria-activedescendant', 'composer-suggest-' + active);

      }

      function composerAutocompleteItems() {

        var nextValue = String(entry.value);
        if (/[\s,]/.test(nextValue)) {
          nextValue = '"' + nextValue.replaceAll('\\', '\\\\').replaceAll('"', '\\"') + '"';
        }
        state.composer.rawInput = nextValue;
        if (els.composerInput) {
          els.composerInput.value = nextValue;
        }
        commitComposerInput(true);
        if (els.composerInput) {
          focusComposerInput();
        }
        return true;
      }

      function updateComposerOutput(value, options) {
        options = options || {};
        state.composer.output = String(value == null ? '' : value).trim() || 'No command output.';
        if (els.composerOutput) {
          setText(els.composerOutput, state.composer.output);
        }
        if (!options.silent) {
          pushCommandOutput('composer', state.composer.output);
        }
      }

      function renderComposerFeedback(plan) {
        if (!els.composerFeedback) {
          return;
        }
        var status = plan && plan.status ? plan.status : 'idle';
        var message = plan && plan.message ? plan.message : '';
        if (state.composer.running) {
          status = 'running';
          message = 'Executing command...';
        }
        els.composerFeedback.textContent = message;
        els.composerFeedback.className = 'wd-composer-feedback wd-subline wd-composer-feedback-' + status;
      }

      function renderComposerPreview(plan) {
        if (!els.composerCommandPreview) {
          return;
        }
        var tokens = [];
        if (plan && Array.isArray(plan.tokens)) {
          tokens = plan.tokens.slice(0);
        }
        if (!tokens.length) {
          setText(els.composerCommandPreview, 'No command preview');
          return;
        }
        setText(els.composerCommandPreview, tokens.join(' '));
      }

      function copyComposerCommand() {
        var tokens = composerDraftTokens();
        var command = String(tokens.join(' ')).trim();
        if (!command) {
          return;
        }
        if (typeof navigator === 'undefined' || !navigator.clipboard || !navigator.clipboard.writeText) {
          return;
        }
        navigator.clipboard.writeText(command).catch(function () {});
      }

      function renderComposer() {
        if (!state.composer.open) {
          return;
        }
        composerResetSelectedToken();
        var draftState = composerDraftState();
        var plan = composerPlanFromTokens(draftState.tokens);
        if (draftState.unclosedQuote) {
          plan.status = 'incomplete';
          plan.ready = false;
          plan.message = 'Close the quoted token to continue.';
        }
        renderComposerTokenRow(plan);
        renderComposerAutocomplete(plan);
        renderComposerFeedback(plan);
        renderComposerPreview(plan);
        updateComposerOutput(state.composer.output || 'No command run yet.', { silent: true });
        if (els.composerRun) {
          els.composerRun.title = 'Press Enter to add token, Shift+Enter to run current command.';
          els.composerRun.disabled = state.composer.running || state.actionInFlight || !plan.ready;
        }
        if (els.composerCloseBtn) {
          els.composerCloseBtn.disabled = false;
        }
        if (state.composer.selectedToken >= 0) {
          var activeToken = els.composerTokenRow && els.composerTokenRow.querySelector('[data-composer-token="' + state.composer.selectedToken + '"]');
          if (activeToken && typeof activeToken.focus === 'function') {
            activeToken.focus();
          }
        }
      }

      function setComposerOpen(open, options) {
        options = options || {};
        if (open && state.composer.startupLock && !options.userInitiated) {
          return;
        }
        state.composer.open = !!open;
        if (!els.composerModal || !els.composerToggle) {
          return;
        }
        els.composerModal.classList.toggle('wd-hidden', !state.composer.open);
        els.composerModal.hidden = !state.composer.open;
        els.composerToggle.setAttribute('aria-expanded', String(state.composer.open));
        if (state.composer.open) {
          if (els.composerInput) {
            els.composerInput.value = state.composer.rawInput || '';
            focusComposerInput();
          }
          renderComposer();
          if (state.composer.tokens.length && state.composer.selectedToken >= 0) {
            setComposerSelectedToken(state.composer.selectedToken);
          }
          return;
        }
        if (!options.skipFocus && typeof els.composerToggle.focus === 'function') {
          els.composerToggle.focus();
        }
      }

      function clearComposer() {
        state.composer.tokens = [];
        state.composer.seededDefaults = false;
        state.composer.rawInput = '';
        state.composer.selectedToken = -1;
        state.composer.autocompleteIndex = -1;
        state.composer.autocompleteEntries = [];
        state.composer.message = '';
        state.composer.output = 'No command run yet.';
        state.composer.running = false;
        if (els.composerInput) {
          els.composerInput.value = '';
        }
        renderComposer();
      }

      function setSynonymDialogOpen(open) {
        var dialog = document.getElementById('spellbook-add-dialog');
        var toggle = document.getElementById('spellbook-add-toggle');
        if (!dialog || !toggle) {
          return;
        }
        if (open) {
          dialog.classList.remove('wd-hidden');
          toggle.setAttribute('aria-expanded', 'true');
          var aliasInput = document.getElementById('spell-alias');
          if (aliasInput && typeof aliasInput.focus === 'function') {
            aliasInput.focus();
          }
          return;
        }
        dialog.classList.add('wd-hidden');
        toggle.setAttribute('aria-expanded', 'false');
      }

      function clearSynonymInputs() {
        var aliasInput = document.getElementById('spell-alias');
        var commandInput = document.getElementById('spell-command');
        if (aliasInput) {
          aliasInput.value = '';
        }
        if (commandInput) {
          commandInput.value = '';
        }
      }

      function getSynonymValues() {
        var aliasInput = document.getElementById('spell-alias');
        var commandInput = document.getElementById('spell-command');
        return {
          alias: String(aliasInput ? aliasInput.value : '').trim(),
          command: String(commandInput ? commandInput.value : '').trim()
        };
      }

      function saveSynonymFromDialog() {
        var values = getSynonymValues();
        if (!values.alias || !values.command) {
          return;
        }
        addSynonym(values.alias, values.command).then(function () {
          clearSynonymInputs();
          setSynonymDialogOpen(false);
        }).catch(function () {
          // keep dialog open so user can fix values
        });
      }

      function routeMenuActionToGui(actionName, params) {
        var action = String(actionName || '').trim();
        if (action !== 'menu:run') {
          return false;
        }
        var menuName = Array.isArray(params) && params.length ? String(params[0] || '').trim().toLowerCase() : '';
        if (menuName !== 'cast') {
          return false;
        }
        setActivePage('cast');
        updateComposerOutput('Opened Cast tab (menu:run cast routed to GUI).');
        pushActivity('app', 'menu:run cast routed to Cast tab', { section: 'app', app: 'wizardry-desktop', source: 'run-action:menu:run', status: 'ok' });
        return true;
      }

      function executeComposerCommand(plan) {
        if (!plan || !plan.ready || !plan.backend) {
          if (plan && plan.message && els.composerFeedback) {
            renderComposerFeedback(plan);
          }
          return;
        }
        if (state.composer.running || state.actionInFlight) {
          return;
        }
        state.composer.running = true;
        updateComposerOutput('Running ' + String(plan.tokens && plan.tokens.length ? plan.tokens.join(' ') : 'command') + ' ...');
        renderComposerFeedback(plan);
        var run;
        if (plan.backend.type === 'run-spell') {
          run = runSpell(plan.backend.ref, plan.backend.name, { outputId: 'composer-output' });
        } else if (plan.backend.type === 'spell-help') {
          run = runSpellHelp(plan.backend.ref, plan.backend.name, { outputId: 'composer-output' });
        } else if (plan.backend.type === 'run-system') {
          run = callBackend('run-system', [plan.backend.command]).then(function (text) {
            updateComposerOutput(text || 'ok');
            pushActivity('app', 'system:' + plan.backend.command + ' completed', { kind: 'system:' + plan.backend.command, section: 'app', app: 'host', source: plan.backend.command, status: 'ok' });
          }).catch(function (error) {
            updateComposerOutput(error && error.message ? error.message : String(error || 'failed'));
            pushActivity('app', 'system:' + plan.backend.command + ' failed', { section: 'app', app: 'host', source: plan.backend.command, status: 'error' });
          });
        } else if (plan.backend.type === 'run-action') {
          if (routeMenuActionToGui(plan.backend.actionName, plan.backend.params)) {
            run = Promise.resolve();
          } else {
            var actionArgs = [plan.backend.actionName];
            if (Array.isArray(plan.backend.params) && plan.backend.params.length) {
              actionArgs = actionArgs.concat(plan.backend.params);
            }
            run = callBackend('run-action', actionArgs).then(function (text) {
              updateComposerOutput(text || 'ok');
              pushActivity('app', 'run-action ' + plan.backend.actionName + ' completed', { section: 'app', app: 'wizardry-core', source: 'run-action:' + plan.backend.actionName, status: 'ok' });
            }).catch(function (error) {
              updateComposerOutput(error && error.message ? error.message : String(error || 'failed'));
              pushActivity('app', 'run-action ' + plan.backend.actionName + ' failed', { section: 'app', app: 'wizardry-core', source: 'run-action:' + plan.backend.actionName, status: 'error' });
            });
          }
        }

        Promise.resolve(run).finally(function () {
          state.composer.running = false;
          renderComposer();
          loadWatchHistory();
        });
      }

      function pushActivity(kind, message, payload) {
        var section = payload && payload.section ? payload.section : (kind === 'cast' ? 'casting' : 'app');
        if (section !== 'casting' && section !== 'app' && section !== 'output') {
          section = kind === 'cast' ? 'casting' : 'app';
        }
        var bucket = state.activity[section];
        if (!bucket) {
          bucket = [];
          state.activity[section] = bucket;
        }
        bucket.unshift({
          ts: Math.floor(Date.now() / 1000),
          kind: kind,
          text: String(message || ''),
          payload: payload || {}
        });
        if (bucket.length > state.activityRowsLimit) {
          bucket.length = state.activityRowsLimit;
        }
        renderActivity();
      }

      function pushCommandOutput(source, text) {
        var message = String(text == null ? '' : text).trim();
        if (!message) {
          return;
        }
        pushActivity('output', source + ': ' + message, {
          section: 'output',
          source: source,
          app: 'wizardry-desktop'
        });
      }

      function normalizeWatchPayload(part) {
        if (!part) {
          return {};
        }
        return {
          section: part.kind === 'cast' ? 'casting' : 'app',
          source: part.source || part.app || '',
          app: part.app || '',
          status: part.status || ''
        };
      }

      function parseWatchLog(text) {
        var lines = String(text || '').split('\n');
        var casting = [];
        var app = [];
        for (var i = 0; i < lines.length; i += 1) {
          var line = String(lines[i] || '').trim();
          if (!line) {
            continue;
          }
          var parts = line.split('\t');
          if (parts.length < 5) {
            continue;
          }
          var ts = Number(parts[0]);
          var kind = String(parts[1] || '').trim();
          var source = String(parts[2] || '').trim();
          var appName = String(parts[3] || '').trim();
          var status = String(parts[4] || '').trim();
          var message;
          if (kind === 'cast') {
            message = source;
          } else if (kind === 'app') {
            message = source;
          } else {
            message = source;
          }
          var row = {
            ts: isNaN(ts) ? Math.floor(Date.now() / 1000) : ts,
            kind: kind,
            text: String(message || ''),
            payload: normalizeWatchPayload({
              kind: kind,
              source: source,
              app: appName,
              status: status
            })
          };
          if (kind === 'cast') {
            casting.push(row);
          } else {
            app.push(row);
          }
        }
        return {
          casting: casting,
          app: app
        };
      }

      function loadWatchHistory() {
        if (state.activityLoading) {
          return Promise.resolve();
        }
        state.activityLoading = true;
        return callBackend('list-watch', [String(state.activityRowsLimit)])
          .then(function (text) {
            var parsed = parseWatchLog(text);
            state.activity.casting = parsed.casting;
            state.activity.app = parsed.app;
          })
          .catch(function () {
            // Keep live activity stack if log unavailable.
          })
          .finally(function () {
            state.activityLoading = false;
            renderActivity();
          });
      }

      function timestampForRow(ts) {
        var date = new Date(ts * 1000);
        var h = String(date.getHours()).padStart(2, '0');
        var m = String(date.getMinutes()).padStart(2, '0');
        var s = String(date.getSeconds()).padStart(2, '0');
        return h + ':' + m + ':' + s;
      }

      function renderActivity() {
        if (!els.activityFeed) {
          return;
        }
        var casting = state.activity.casting || [];
        var app = state.activity.app || [];
        var output = state.activity.output || [];
        var visibleCasting = casting;
        var visibleApp = app;
        var visibleOutput = output;

        if (els.activityFeed) {
          var castingRows = visibleCasting.slice(0, 180);
          var commandRows = visibleApp.slice(0, 180);
          var outputRows = visibleOutput.slice(0, 180);
          var castingHtml = '';
          var commandHtml = '';
          var outputHtml = '';
          var castingCount = Number(visibleCasting.length || 0);
          var commandCount = Number(visibleApp.length || 0);
          var outputCount = Number(visibleOutput.length || 0);
          var castingTitle = 'Active Casting' + (castingCount ? ' (' + castingCount + ')' : '');
          var commandTitle = 'App Commands' + (commandCount ? ' (' + commandCount + ')' : '');
          var outputTitle = 'Command Output' + (outputCount ? ' (' + outputCount + ')' : '');

          if (!castingRows.length) {
            castingHtml = '<p class="wd-empty">No cast actions yet.</p>';
          } else {
            castingHtml = castRowsHtml(castingRows);
          }
          if (!commandRows.length) {
            commandHtml = '<p class="wd-empty">No app commands yet.</p>';
          } else {
            commandHtml = castRowsHtml(commandRows);
          }
          if (!outputRows.length) {
            outputHtml = '<p class="wd-empty">No command output yet.</p>';
          } else {
            outputHtml = castRowsHtml(outputRows);
          }

          els.activityFeed.innerHTML = '<div class="wd-activity-sections"><section class="wd-activity-section"><h4>' + escapeText(castingTitle) + '</h4><div class="wd-activity-list wd-scroll-list wd-activity-list-scrolled">' + castingHtml + '</div></section>' +
            '<section class="wd-activity-section"><h4>' + escapeText(commandTitle) + '</h4><div class="wd-activity-list wd-scroll-list wd-activity-list-scrolled">' + commandHtml + '</div></section>' +
            '<section class="wd-activity-section"><h4>' + escapeText(outputTitle) + '</h4><div class="wd-activity-list wd-scroll-list wd-activity-list-scrolled">' + outputHtml + '</div></section></div>';
        }
        if (els.activityCount) {
          var total = Number(visibleCasting.length || 0) + Number(visibleApp.length || 0) + Number(visibleOutput.length || 0);
          setText(els.activityCount, total ? total + ' events tracked' : 'No events yet');
        }
      }

      function castRowsHtml(rows) {
        return rows.map(function (row) {
          var app = row.payload && row.payload.app ? (' ' + escapeText(row.payload.app)) : '';
          var source = row.payload && row.payload.source ? (' ' + escapeText(row.payload.source)) : '';
          var kind = escapeText(row.kind);
          return '<article class="wd-log-row"><span class="wd-log-time">' + timestampForRow(row.ts) + '</span><span class="wd-log-kind">' + kind + '</span><span class="wd-log-message">' + escapeText(row.text || '') + '<span class="wd-log-meta">' + app + source + '</span></span></article>';
        }).join('');
      }

      function escapeText(value) {
        return String(value == null ? '' : value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;');
      }

      function escapeAttrValue(value) {
        return String(value == null ? '' : value)
          .replaceAll('&', '&amp;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;');
      }

      function themeLabel(value) {
        if (!value) {
          return '';
        }
        return String(value).replace(/[-_]/g, ' ').replace(/\b\w/g, function (m) {
          return m.toUpperCase();
        });
      }

      function buildThemeStylesheetHref(themeName) {
        var theme = String(themeName || '').trim();
        if (!theme) {
          theme = 'adept';
        }
        var primary = ensureRootHint() + '/web/.themes/' + theme + '.css';
        if (state.rootHint && theme === 'psionic') {
          primary = ensureRootHint() + '/web/.themes/' + theme + '.css';
        }
        if (!state.rootHint) {
          primary = 'web/.themes/' + theme + '.css';
        }
        return primary + '?v=' + ASSET_VERSION + '&ts=' + Date.now();
      }

      function setThemeStylesheet(themeName) {
        if (!els.themeStylesheet) {
          return;
        }
        var next = els.themeStylesheet.cloneNode(false);
        next.href = buildThemeStylesheetHref(themeName);
        next.setAttribute('data-theme-name', themeName);
        if (els.themeStylesheet.parentNode) {
          els.themeStylesheet.parentNode.replaceChild(next, els.themeStylesheet);
        }
        els.themeStylesheet = next;
      }

      function savePreference(key, value) {
        var prefKey = String(key || '').trim();
        if (!prefKey) {
          return Promise.resolve();
        }
        var prefValue = String(value == null ? '' : value);
        var run = function () {
          return callBackend('set-ui-pref', [prefKey, prefValue]).catch(function () {});
        };
        state.prefWriteQueue = (state.prefWriteQueue || Promise.resolve()).then(run, run);
        return state.prefWriteQueue;
      }

      function loadRootHint() {
        return callBackend('root-hint').then(function (text) {
          var root = String(text || '').split('\n')[0];
          root = String(root || '').trim();
          if (root) {
            state.rootHint = root;
            if (state.activeTheme) {
              setThemeStylesheet(state.activeTheme);
            }
          }
        }).catch(function () {});
      }

      function ensureThemes() {
        if (!Array.isArray(state.themes) || !state.themes.length) {
          state.themes = ['archmage', 'adept', 'chrono', 'chronomancer', 'conjurer'];
        }
        if (state.themes.indexOf(state.activeTheme) < 0) {
          state.activeTheme = state.themes[0] || 'adept';
        }
      }

      function loadThemes() {
        return callBackend('list-themes').then(function (text) {
          var list = String(text || '').split('\n').map(function (line) {
            return String(line || '').trim();
          }).filter(Boolean).filter(function (name) {
            return /^[a-z0-9_-]+$/.test(name);
          });
          if (list.length) {
            state.themes = list;
          } else {
            ensureThemes();
          }
        }).catch(function () {
          ensureThemes();
        });
      }

      function openThemeMenu() {
        if (!els.themeMenu || !els.themePickerBtn) {
          return;
        }
        closeFloatingMenus({ keepTheme: true });
        els.themeMenu.classList.remove('wd-hidden');
        els.themePickerBtn.setAttribute('aria-expanded', 'true');
        renderThemeMenu();
        state.themeMenuOpen = true;
      }

      function closeThemeMenu(restoreFocus) {
        if (!els.themeMenu || !els.themePickerBtn) {
          return;
        }
        els.themeMenu.classList.add('wd-hidden');
        els.themePickerBtn.setAttribute('aria-expanded', 'false');
        state.themeTypeahead = '';
        state.themeMenuOpen = false;
        if (restoreFocus && typeof els.themePickerBtn.focus === 'function') {
          els.themePickerBtn.focus();
        }
      }

      function closeFloatingMenus(options) {
        options = options || {};
        if (!options.keepTheme) {
          closeThemeMenu(false);
        }
        if (state.activityOpen) {
          state.activityOpen = false;
          renderActivityDrawer();
        }
      }

      function renderThemeMenu() {
        if (!els.themeList) {
          return;
        }
        ensureThemes();
        var html = '';
        for (var i = 0; i < state.themes.length; i += 1) {
          var theme = state.themes[i];
          var active = theme === state.activeTheme ? ' wd-theme-item-active' : '';
          html += '<button type="button" class="wd-theme-item' + active + '" data-theme-name="' + escapeAttrValue(theme) + '" aria-pressed="' + (theme === state.activeTheme ? 'true' : 'false') + '">' +
            '<span>' + themeLabel(theme) + '</span><span class="wd-theme-check" aria-hidden="true">✓</span></button>';
        }
        els.themeList.innerHTML = html;
        if (els.themePickerBtn) {
          els.themePickerBtn.textContent = themeLabel(state.activeTheme);
        }
      }

      function applyTheme(themeName, options) {
        options = options || {};
        var persist = options.persist !== false;
        ensureThemes();
        if (state.themes.indexOf(themeName) < 0) {
          if (options.allowUnlisted && themeName) {
            // keep explicitly set custom themes in menu state.
          } else {
            themeName = state.themes[0] || 'adept';
          }
        }
        state.activeTheme = themeName;
        setThemeStylesheet(themeName);
        if (persist) {
          savePreference('theme', themeName);
        }
        if (els.themePickerBtn) {
          els.themePickerBtn.textContent = themeLabel(themeName);
        }
        renderThemeMenu();
      }

      function cycleTheme(step) {
        ensureThemes();
        var current = state.themes.indexOf(state.activeTheme);
        if (current < 0) {
          current = 0;
        }
        var idx = (current + step + state.themes.length) % state.themes.length;
        applyTheme(state.themes[idx]);
      }

      function handleThemeTypeahead(key) {
        if (!/^[a-z0-9 _-]$/.test(String(key || '').toLowerCase())) {
          return false;
        }
        state.themeTypeahead = (state.themeTypeahead || '') + String(key).toLowerCase();
        if (state.themeTypeaheadTimer) {
          clearTimeout(state.themeTypeaheadTimer);
        }
        state.themeTypeaheadTimer = setTimeout(function () {
          state.themeTypeahead = '';
        }, 700);

        var query = state.themeTypeahead;
        for (var i = 0; i < state.themes.length; i += 1) {
          if (state.themes[i].indexOf(query) === 0 || themeLabel(state.themes[i]).toLowerCase().indexOf(query) === 0) {
            applyTheme(state.themes[i]);
            return true;
          }
        }
        return false;
      }

      function loadPreferences() {
        var preferredTheme = state.activeTheme || 'adept';
        return callBackend('get-ui-prefs').then(function (text) {
          var prefs = parseKeyValueBlob(text);
          state.prefsLoaded = true;
          syncPrefsStatus();
          preferredTheme = prefs.theme || prefs.desktop_theme || 'adept';
          state.activeTheme = preferredTheme;
          state.railWidth = Number(prefs.leftRailWidth || state.railWidth);
          return ensureThemes();
        }).catch(function () {
          state.prefsLoaded = false;
          syncPrefsStatus();
          return ensureThemes();
        }).then(function () {
          state.railWidth = Math.min(420, Math.max(220, Number(state.railWidth) || 300));
          applyTheme(preferredTheme, { allowUnlisted: true, persist: false });
        });
      }

      function saveRailWidth(width) {
        state.railWidth = Math.min(420, Math.max(220, Number(width) || 300));
        applyRailWidth();
        savePreference('leftRailWidth', String(state.railWidth));
      }

      function applyRailWidth() {
        if (!els.leftRail || !els.mainColumn) {
          return;
        }
        var px = state.railWidth + 'px';
        els.leftRail.style.width = px;
        document.documentElement.style.setProperty('--wd-rail-width', px);
        applyLayoutColumns();
        if (els.railDivider) {
          els.railDivider.style.width = '8px';
        }
      }

      function applyLayoutColumns() {
        var activityWidth = state.activityOpen ? state.activityDrawerWidth : 0;
        document.documentElement.style.setProperty('--wd-activity-width', activityWidth + 'px');
      }

      function getNavPages() {
        var pages = [];
        var seen = {};
        var order = Array.isArray(state.mainMenuOrder) && state.mainMenuOrder.length
          ? state.mainMenuOrder
          : DEFAULT_MAIN_MENU_ORDER;
        for (var i = 0; i < order.length; i += 1) {
          var key = String(order[i] || '').trim();
          if (!key || seen[key] || !NAV_PAGE_MAP[key]) {
            continue;
          }
          pages.push(NAV_PAGE_MAP[key]);
          seen[key] = true;
        }
        if (!pages.length) {
          return DEFAULT_MAIN_MENU_ORDER.map(function (key) {
            return NAV_PAGE_MAP[key];
          }).filter(Boolean);
        }
        return pages;
      }

      function navHasPage(pageId) {
        var pages = getNavPages();
        for (var i = 0; i < pages.length; i += 1) {
          if (pages[i].id === pageId) {
            return true;
          }
        }
        return false;
      }

      function renderNav() {
        if (!els.leftNav) {
          return;
        }
        var navPages = getNavPages();
        var activeIdx = 0;
        var html = '';
        for (var i = 0; i < navPages.length; i += 1) {
          var page = navPages[i];
          if (page.id === state.activePage) {
            activeIdx = i;
          }
          var rowClass = 'wd-nav-row' + (page.id === state.activePage ? ' wd-nav-row-active' : '');
          html += '<button type="button" role="option" class="' + rowClass + '" data-page="' + page.id + '" aria-selected="' + (page.id === state.activePage ? 'true' : 'false') + '" tabindex="' + (page.id === state.activePage ? '0' : '-1') + '">' +
            '<span class="wd-nav-title">' + escapeText(page.title) + '</span>' +
            '</button>';
        }
        els.leftNav.innerHTML = html;
        state.selectedNavIndex = activeIdx;
        if (els.leftNav.firstElementChild && els.leftNav.firstElementChild.focus) {
          // keep focus where needed during rerender.
        }
      }

      function rowElementForPage(pageId) {
        return els.leftNav && els.leftNav.querySelector('[data-page="' + pageId + '"]');
      }

      function setActivePage(pageId) {
        if (!navHasPage(pageId)) {
          var fallbackPages = getNavPages();
          pageId = fallbackPages.length ? fallbackPages[0].id : 'cast';
        }
        if (state.activePage === pageId) {
          return;
        }
        state.activePage = pageId;
        renderNav();
        var idx = getNavPages().findIndex(function (page) {
          return page.id === pageId;
        });
        if (idx >= 0) {
          state.selectedNavIndex = idx;
        }
        if (pageId === 'arcana' && state.arcanaInstall.length === 0) {
          loadArcanaInstall();
        }
        if (pageId === 'spellbook' && !state.spellbookAliasesLoaded) {
          loadSpellbookAliases();
        }
        if (pageId === 'cast' && !state.cast.categories.length) {
          loadCastData();
        }
        if (pageId === 'system' && !state.systemMenuActions.length) {
          loadSystemMenuActions();
        }
        if (pageId === 'mud' && !state.mudActions.length) {
          loadMudActions();
        }
        renderPage();
      }

      function runDrillBack(section) {
        var key = String(section || '').trim();
        if (!key) {
          if (state.activePage === 'cast' && state.cast.selectedCategory) {
            key = 'cast';
          } else if (state.activePage === 'arcana' && state.arcanaSelectedModule) {
            key = 'arcana';
          } else if (state.activePage === 'system' && state.systemSelectedAction) {
            key = 'system';
          } else if (state.activePage === 'mud' && state.mudSelectedAction) {
            key = 'mud';
          }
        }
        if (!key) {
          return false;
        }
        if (key === 'cast') {
          setCastSelectedCategory('', 'back');
          return true;
        }
        if (key === 'arcana') {
          setArcanaSelectedModule('', 'back');
          return true;
        }
        if (key === 'system') {
          setSystemSelectedAction('', 'back');
          return true;
        }
        if (key === 'mud') {
          setMudSelectedAction('', 'back');
          return true;
        }
        return false;
      }

      function arcanaStatusTone(statusText) {
        var normalized = String(statusText || '').toLowerCase();
        if (!normalized) {
          return 'neutral';
        }
        if (normalized.indexOf('not installed') >= 0 || normalized.indexOf('missing') >= 0 || normalized.indexOf('coming soon') >= 0) {
          return 'bad';
        }
        if (normalized.indexOf('partial') >= 0) {
          return 'warn';
        }
        if (normalized.indexOf('installed') >= 0 || normalized.indexOf('ready') >= 0 || normalized.indexOf('running') >= 0 || normalized.indexOf('enabled') >= 0 || normalized.indexOf('ok') >= 0) {
          return 'good';
        }
        return 'neutral';
      }

      function arcanaItemKindLabel(kind) {
        switch (String(kind || '')) {
          case 'menu':
            return 'menu';
          case 'install':
            return 'install';
          case 'uninstall':
            return 'uninstall';
          case 'toggle':
            return 'toggle';
          case 'check':
            return 'check';
          case 'status':
            return 'status';
          case 'status-detail':
            return 'status detail';
          default:
            return 'action';
        }
      }
