<!DOCTYPE html>
<html lang="en" class="artificer-booting">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artificer</title>
  <style>
    :root {
      --boot-bg: #eceaf4;
      --boot-fg: #2a2e47;
      --boot-muted: #5d6486;
      --boot-line: #d4d0e6;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--boot-bg);
      overflow: hidden;
      font-family: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--boot-bg);
    }

    body.artificer-booting #app {
      visibility: hidden;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--boot-bg);
      z-index: 10;
      pointer-events: none;
    }

    #boot-splash.hidden {
      opacity: 0;
      visibility: hidden;
      transition: opacity 140ms ease;
    }

    .boot-card {
      display: grid;
      justify-items: center;
      gap: 12px;
      padding: 16px 20px;
      border: 1px solid color-mix(in srgb, var(--boot-line) 80%, transparent);
      border-radius: 14px;
      background: color-mix(in srgb, #ffffff 72%, var(--boot-bg));
      box-shadow: 0 12px 34px rgba(27, 22, 56, 0.1);
    }

    .boot-icon {
      width: 112px;
      height: 112px;
      object-fit: contain;
      border-radius: 12px;
    }

    #status {
      color: var(--boot-muted);
      font-size: 0.92rem;
      line-height: 1.35;
      text-align: center;
      max-width: 24rem;
    }

    #status.error {
      color: #a14d5b;
      white-space: pre-wrap;
      padding: 0.15rem 0.35rem;
      background: color-mix(in srgb, #ffffff 64%, transparent);
      border: 1px solid color-mix(in srgb, #a14d5b 26%, transparent);
      border-radius: 8px;
    }

    .boot-title {
      margin: 0;
      color: var(--boot-fg);
      font-size: 0.96rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .boot-subtitle {
      margin: 0;
      color: var(--boot-muted);
      font-size: 0.82rem;
    }
  </style>
</head>
<body class="artificer-booting">
  <div id="boot-splash" aria-live="polite" aria-busy="true">
    <div class="boot-card">
      <img class="boot-icon" src="assets/forge-icon.png" alt="Artificer">
      <p class="boot-title">Artificer</p>
      <p class="boot-subtitle">Preparing local runtime</p>
      <div id="status">Starting Artificer…</div>
    </div>
  </div>
  <iframe id="app" src="about:blank" title="Artificer"></iframe>

  <script>
    (function loadBridge() {
      var candidates = [
        './.host/shared/wizardry-bridge.js',
        '../.host/shared/wizardry-bridge.js',
        '../../.host/shared/wizardry-bridge.js'
      ];
      var i = 0;
      function tryNext() {
        if (i >= candidates.length) {
          return;
        }
        var s = document.createElement('script');
        s.src = candidates[i++];
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    })();
  </script>

  <script>
    var siteName = 'artificer';
    var entryPath = '/pages/index.html';
    var launchCacheKey = Date.now().toString(36);
    var wizardryShellInit =
      'base_path="/opt/homebrew/bin:/opt/homebrew/sbin:/opt/pkg/bin:/opt/pkg/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"; ' +
      'PATH="$base_path${PATH:+:$PATH}"; export PATH; ' +
      'wiz="${WIZARDRY_DIR:-$HOME/.wizardry}"; ' +
      'iw="$wiz/spells/.imps/sys/invoke-wizardry"; ' +
      'if [ ! -f "$iw" ]; then wiz="$HOME/.wizardry"; iw="$wiz/spells/.imps/sys/invoke-wizardry"; fi; ' +
      '[ -f "$iw" ] || { printf "wizardry runtime missing (%s)\\n" "$iw" >&2; exit 127; }; ' +
      'WIZARDRY_DIR="$wiz"; export WIZARDRY_DIR; ' +
      '. "$iw" >/dev/null 2>&1 || { printf "wizardry runtime initialization failed\\n" >&2; exit 127; }; ';

    function wizardryShellCommand(commandText) {
      return ['sh', '-c', wizardryShellInit + commandText];
    }

    var commands = {
      ensureDataRoot: [
        'sh',
        '-c',
        'sites="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; data="$sites/.sitedata"; target="$data/artificer/artificer"; target_ws="$target/workspaces"; [ -d "$target" ] || mkdir -p "$target"; needs_migrate=1; if [ -d "$target_ws" ] && find "$target_ws" -mindepth 1 -maxdepth 1 -type d | read x; then needs_migrate=0; fi; if [ "$needs_migrate" -ne 1 ]; then exit 0; fi; src_best=""; src_count=0; for sid in default daimon; do src="$data/$sid/artificer"; ws="$src/workspaces"; [ -d "$ws" ] || continue; count=$(find "$ws" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d " "); case "$count" in ""|*[!0-9]*) count=0;; esac; if [ "$count" -gt "$src_count" ]; then src_count="$count"; src_best="$src"; fi; done; if [ -n "$src_best" ] && [ "$src_count" -gt 0 ]; then cp -R "$src_best/." "$target/"; fi'
      ],
      repairLegacyTemplateLinks: wizardryShellCommand('root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; site="$root/artificer"; for rel in README.md cgi site/pages site/static site/includes; do path="$site/$rel"; [ -L "$path" ] || continue; target=$(readlink "$path" 2>/dev/null || true); case "$target" in */.web/*) repl=$(printf "%s" "$target" | sed "s#/.web/#/web/#g"); [ "$repl" != "$target" ] || continue; [ -e "$repl" ] || continue; ln -snf "$repl" "$path" ;; esac; done'),
      ensureSite: wizardryShellCommand('apps_root="${WIZARDRY_APPS_ROOT:-$wiz}"; create_cmd="$apps_root/spells/web/create-from-template"; web_cmd="$apps_root/spells/web/web-wizardry"; [ -x "$create_cmd" ] || create_cmd="create-from-template"; [ -x "$web_cmd" ] || web_cmd="web-wizardry"; root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; site="$root/artificer"; cfg="$site/site.conf"; if [ ! -f "$cfg" ]; then "$create_cmd" artificer artificer; fi; "$web_cmd" build artificer'),
      startServe: wizardryShellCommand('apps_root="${WIZARDRY_APPS_ROOT:-$wiz}"; web_cmd="$apps_root/spells/web/web-wizardry"; [ -x "$web_cmd" ] || web_cmd="web-wizardry"; exec "$web_cmd" serve artificer'),
      ensureUsablePort: wizardryShellCommand('root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/artificer/site.conf"; pidf="$root/artificer/nginx/nginx.pid"; nginx_cfg="$root/artificer/nginx/nginx.conf"; port=$(sed -n "s/^port=//p" "$cfg" 2>/dev/null | head -n 1); [ -n "$port" ] || port=8080; if command -v lsof >/dev/null 2>&1; then if ! lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then printf "$port"; exit 0; fi; p=8081; while [ "$p" -le 8120 ]; do if ! lsof -nP -iTCP:"$p" -sTCP:LISTEN >/dev/null 2>&1; then change-site-port artificer "$p" >/dev/null 2>&1 && printf "$p" && exit 0; fi; p=$((p+1)); done; exit 1; fi; if [ -f "$pidf" ] && pid=$(cat "$pidf" 2>/dev/null) && [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null && ps -p "$pid" -o command= 2>/dev/null | grep -F "$nginx_cfg" >/dev/null 2>&1; then printf "$port"; exit 0; fi; printf "$port"; exit 0'),
      isRunning: [
        'sh',
        '-c',
        'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/artificer/site.conf"; pidf="$root/artificer/nginx/nginx.pid"; nginx_cfg="$root/artificer/nginx/nginx.conf"; port=$(sed -n "s/^port=//p" "$cfg" 2>/dev/null | head -n 1); [ -n "$port" ] || port=8080; if command -v lsof >/dev/null 2>&1; then if lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then printf "yes"; else printf "no"; fi; exit 0; fi; if [ -f "$pidf" ] && pid=$(cat "$pidf" 2>/dev/null) && [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null && ps -p "$pid" -o command= 2>/dev/null | grep -F "$nginx_cfg" >/dev/null 2>&1; then printf "yes"; else printf "no"; fi'
      ],
      getPort: ['sh', '-c', 'root="${WEB_WIZARDRY_ROOT:-$HOME/sites}"; cfg="$root/artificer/site.conf"; if [ -f "$cfg" ]; then sed -n "s/^port=//p" "$cfg" | head -n 1; fi']
    };
    var hostBootReadySent = false;
    var bootFailed = false;
    var bootRevealTimer = null;

    function statusEl() {
      return document.getElementById('status');
    }

    function setStatus(text, isError) {
      var el = statusEl();
      el.textContent = text;
      el.className = isError ? 'error' : '';
    }

    function revealBootUi() {
      if (bootFailed) {
        return;
      }
      var splash = document.getElementById('boot-splash');
      if (splash) {
        splash.classList.add('hidden');
      }
      document.documentElement.classList.remove('artificer-booting');
      document.body.classList.remove('artificer-booting');
      if (hostBootReadySent) {
        return;
      }
      hostBootReadySent = true;
      if (!hasBridge()) {
        return;
      }
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          bridgeExec(['__wizardry_host_boot_ready']).catch(function () {
            return;
          });
        });
      });
    }

    function onAppFrameReady() {
      bootFailed = false;
      if (bootRevealTimer) {
        clearTimeout(bootRevealTimer);
        bootRevealTimer = null;
      }
      revealBootUi();
    }

    function hasBridge() {
      return !!(window.wizardry && typeof window.wizardry.rpc === 'function');
    }

    async function waitForBridge(timeoutMs) {
      var start = Date.now();
      while (!hasBridge()) {
        if (Date.now() - start > (timeoutMs || 4000)) {
          throw new Error('wizardry bridge unavailable; run this app in the native host');
        }
        await new Promise(function (resolve) { setTimeout(resolve, 50); });
      }
    }

    async function bridgeExec(argv) {
      await waitForBridge(4000);
      var res = await window.wizardry.rpc('bridge.exec', { argv: argv });
      var code = Number(res && res.exit_code);
      if (!Number.isFinite(code) || code === 0) {
        return res || {};
      }
      var stderr = String((res && res.stderr) || '').trim();
      var stdout = String((res && res.stdout) || '').trim();
      var detail = stderr || stdout || ('exit ' + code);
      throw new Error(detail);
    }

    async function resolvePort() {
      var res = await bridgeExec(commands.getPort);
      var raw = String((res && res.stdout) || '').trim();
      if (!/^[0-9]+$/.test(raw)) {
        throw new Error('unable to resolve Artificer port from site.conf');
      }
      return raw;
    }

    async function isRunning() {
      var res = await bridgeExec(commands.isRunning);
      return String((res && res.stdout) || '').trim() === 'yes';
    }

    async function waitUntilRunning(timeoutMs) {
      var start = Date.now();
      while (Date.now() - start < timeoutMs) {
        try {
          if (await isRunning()) {
            return true;
          }
        } catch (_) {
          // Keep polling.
        }
        await new Promise(function (resolve) { setTimeout(resolve, 125); });
      }
      return false;
    }

    async function ensureSiteIfNeeded() {
      await bridgeExec(commands.ensureSite);
    }

    async function startWithFallbackPort() {
      await bridgeExec(commands.startServe);
      if (await waitUntilRunning(15000)) {
        return;
      }

      // One emergency retry after re-checking port usability.
      await bridgeExec(commands.ensureUsablePort);
      await bridgeExec(commands.startServe);
      if (await waitUntilRunning(15000)) {
        return;
      }

      throw new Error('daemon start timed out');
    }

    async function boot() {
      var iframe = document.getElementById('app');
      try {
        await waitForBridge(4000);
        try {
          await bridgeExec(commands.ensureDataRoot);
        } catch (_) {
          // Non-fatal: continue startup even if migration probe fails.
        }
        try {
          await bridgeExec(commands.repairLegacyTemplateLinks);
        } catch (_) {
          // Non-fatal: continue startup even if legacy link repair fails.
        }

        setStatus('Preparing Artificer…', false);
        await ensureSiteIfNeeded();

        if (await isRunning()) {
          var hotPort = await resolvePort();
          iframe.onload = onAppFrameReady;
          iframe.src = 'http://localhost:' + hotPort + entryPath + '?launch=' + encodeURIComponent(launchCacheKey);
          return;
        }

        setStatus('Starting Artificer…', false);
        try {
          await bridgeExec(commands.ensureUsablePort);
        } catch (_) {
          // Non-fatal: we'll still try start/fallback.
        }
        await startWithFallbackPort();

        var port = await resolvePort();
        var url = 'http://localhost:' + port + entryPath + '?launch=' + encodeURIComponent(launchCacheKey);
        iframe.onload = onAppFrameReady;
        iframe.src = url;
      } catch (error) {
        bootFailed = true;
        if (bootRevealTimer) {
          clearTimeout(bootRevealTimer);
          bootRevealTimer = null;
        }
        iframe.src = 'about:blank';
        setStatus('Error: ' + String(error && error.message ? error.message : error), true);
        document.documentElement.classList.remove('artificer-booting');
        document.body.classList.remove('artificer-booting');
        if (!hostBootReadySent && hasBridge()) {
          hostBootReadySent = true;
          bridgeExec(['__wizardry_host_boot_ready']).catch(function () {
            return;
          });
        }
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      bootRevealTimer = setTimeout(revealBootUi, 12000);
      setTimeout(boot, 20);
    });
  </script>
</body>
</html>
