<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizardry Chatroom</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .app-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      color: white;
    }
    
    .app-header h1 {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
    }
    
    .app-nav {
      display: flex;
      gap: 1rem;
    }
    
    .app-nav a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      transition: background 0.2s;
      cursor: pointer;
    }
    
    .app-nav a:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .app-nav a.active {
      background: rgba(255,255,255,0.2);
      font-weight: bold;
    }
    
    iframe {
      border: none;
      width: 100%;
      height: calc(100vh - 90px);
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>🧙 Wizardry Chatroom</h1>
    <nav class="app-nav">
      <a onclick="showChat()" id="chat-tab" class="active">Chat</a>
      <a onclick="showSettings()" id="settings-tab">Settings</a>
    </nav>
  </div>
  
  <iframe id="chat-frame" src="about:blank" title="Chatroom"></iframe>
  
  <div id="error-message" style="display: none; padding: 3rem 2rem; text-align: center; color: #666;">
    <h2 style="color: #dc3545; margin-bottom: 1rem;">⚠️ Server Not Running</h2>
    <p style="margin-bottom: 1.5rem; line-height: 1.6;">
      The chatroom requires the wizardry web server to be running.<br>
      Please start the server from the Settings tab.
    </p>
    <button onclick="showSettings()" style="padding: 0.75rem 1.5rem; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem;">
      Go to Settings →
    </button>
  </div>
  
  <div id="settings-frame" style="display: none;">
    <!-- Settings will be loaded via iframe from settings.html -->
  </div>

  <script src="../.host/shared/wizardry-bridge.js"></script>

  <script>
    const CHAT_URL_KEY = 'chat_url';
    let iframeCheckInterval;
    let chatUrlCache = '';

    let backendScriptCache = '';

    function detectBackendScriptCandidates() {
      const out = [];
      try {
        const pagePath = decodeURIComponent(String(window.location.pathname || ''));
        const appMarker = '/chatroom/index.html';
        const appIdx = pagePath.lastIndexOf(appMarker);
        if (appIdx > 0) {
          out.push(pagePath.slice(0, appIdx) + '/chatroom/scripts/chatroom-backend.sh');
        }
        const bundleMarker = '/index.html';
        const bundleIdx = pagePath.lastIndexOf(bundleMarker);
        if (bundleIdx > 0) {
          out.push(pagePath.slice(0, bundleIdx) + '/scripts/chatroom-backend.sh');
        }
        const repoMarker = '/apps/chatroom/';
        const repoIdx = pagePath.lastIndexOf(repoMarker);
        if (repoIdx > 0) {
          out.push(pagePath.slice(0, repoIdx) + '/apps/chatroom/scripts/chatroom-backend.sh');
        }
      } catch (_err) {
        // Ignore path detection failures.
      }
      return out.filter((value, index, arr) => value && arr.indexOf(value) === index);
    }

    function isMissingBackendScriptError(error) {
      const msg = String(error && error.message ? error.message : error).toLowerCase();
      return msg.indexOf('chatroom-backend.sh') >= 0
        && (msg.indexOf('no such file') >= 0 || msg.indexOf('cannot open') >= 0 || msg.indexOf('not found') >= 0);
    }

    function parseKeyValue(text) {
      const out = {};
      String(text || '').split('\n').forEach((line) => {
        if (!line) return;
        const idx = line.indexOf('=');
        if (idx <= 0) return;
        out[line.slice(0, idx)] = line.slice(idx + 1);
      });
      return out;
    }

    function hasBridge() {
      return !!(window.wizardry && window.wizardry.exec);
    }

    async function backendExec(action, args = []) {
      if (!hasBridge()) return '';
      const candidates = [];
      if (backendScriptCache) {
        candidates.push(backendScriptCache);
      }
      detectBackendScriptCandidates().forEach((candidate) => {
        if (candidates.indexOf(candidate) < 0) {
          candidates.push(candidate);
        }
      });
      for (const scriptPath of candidates) {
        try {
          const byPathResult = await window.wizardry.exec(['sh', scriptPath, action].concat(args));
          if (typeof byPathResult.exit_code !== 'undefined' && byPathResult.exit_code !== 0) {
            throw new Error((byPathResult.stderr || byPathResult.stdout || 'backend error').trim());
          }
          backendScriptCache = scriptPath;
          return String((byPathResult && byPathResult.stdout) || '');
        } catch (error) {
          if (!isMissingBackendScriptError(error)) {
            throw error;
          }
        }
      }
      const fallbackResult = await window.wizardry.exec([
        'sh',
        '-c',
        'root="${WIZARDRY_APPS_ROOT:-}"; if [ -z "$root" ]; then if [ -n "${WIZARDRY_DIR:-}" ] && [ -x "$WIZARDRY_DIR/apps/chatroom/scripts/chatroom-backend.sh" ]; then root="$WIZARDRY_DIR"; elif [ -x "$HOME/git/wizardry-apps/apps/chatroom/scripts/chatroom-backend.sh" ]; then root="$HOME/git/wizardry-apps"; fi; fi; [ -n "$root" ] || { printf "chatroom backend root could not be resolved\\n" >&2; exit 1; }; exec sh "$root/apps/chatroom/scripts/chatroom-backend.sh" "$@"',
        'chatroom-backend',
        action
      ].concat(args));
      if (typeof fallbackResult.exit_code !== 'undefined' && fallbackResult.exit_code !== 0) {
        throw new Error((fallbackResult.stderr || fallbackResult.stdout || 'backend error').trim());
      }
      return String((fallbackResult && fallbackResult.stdout) || '');
    }

    async function refreshChatUrlPref() {
      try {
        const text = await backendExec('get-ui-prefs');
        const prefs = parseKeyValue(text);
        const value = String(prefs[CHAT_URL_KEY] || '').trim();
        chatUrlCache = /^https?:\/\/[^ ]+\/pages\/chat\.html$/.test(value) ? value : '';
      } catch (_err) {
        chatUrlCache = '';
      }
    }

    function configuredChatUrl() {
      return chatUrlCache;
    }
    
    async function detectDefaultChatUrl() {
      try {
        const text = await backendExec('get-chat-endpoint');
        const out = parseKeyValue(text);
        const value = String(out.chat_url || '').trim();
        return /^https?:\/\/[^ ]+\/pages\/chat\.html$/.test(value) ? value : '';
      } catch (_err) {
        return '';
      }
    }

    async function probeChat(url) {
      try {
        const text = await backendExec('check-chat', [url || '']);
        return parseKeyValue(text);
      } catch (_err) {
        return { status: 'stopped', chat_url: '' };
      }
    }

    async function checkIframeLoaded() {
      const iframe = document.getElementById('chat-frame');
      const errorMsg = document.getElementById('error-message');

      await refreshChatUrlPref();
      let url = configuredChatUrl();
      if (!url && hasBridge()) {
        url = await detectDefaultChatUrl();
      }

      if (!url) {
        iframe.style.display = 'none';
        errorMsg.style.display = 'block';
        return;
      }

      if (hasBridge()) {
        const status = await probeChat(url);
        const liveUrl = String(status.chat_url || url || '').trim();
        if (String(status.status || '').trim() === 'running' && liveUrl) {
          if (iframe.src !== liveUrl) {
            iframe.src = liveUrl;
          }
          iframe.style.display = 'block';
          errorMsg.style.display = 'none';
          return;
        }
        iframe.style.display = 'none';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        await fetch(url, { method: 'HEAD', mode: 'no-cors' });
        if (iframe.src !== url) {
          iframe.src = url;
        }
        iframe.style.display = 'block';
        errorMsg.style.display = 'none';
      } catch (_err) {
        iframe.style.display = 'none';
        errorMsg.style.display = 'block';
      }
    }
    
    function showChat() {
      document.getElementById('chat-frame').style.display = 'block';
      document.getElementById('error-message').style.display = 'none';
      document.getElementById('settings-frame').style.display = 'none';
      document.getElementById('chat-tab').classList.add('active');
      document.getElementById('settings-tab').classList.remove('active');
      
      checkIframeLoaded();
    }
    
    function showSettings() {
      document.getElementById('chat-frame').style.display = 'none';
      document.getElementById('error-message').style.display = 'none';
      document.getElementById('settings-frame').style.display = 'block';
      document.getElementById('chat-tab').classList.remove('active');
      document.getElementById('settings-tab').classList.add('active');
      
      // Load settings.html in an iframe
      let settingsFrame = document.getElementById('settings-iframe');
      if (!settingsFrame) {
        settingsFrame = document.createElement('iframe');
        settingsFrame.id = 'settings-iframe';
        settingsFrame.src = 'settings.html';
        settingsFrame.style.border = 'none';
        settingsFrame.style.width = '100%';
        settingsFrame.style.height = 'calc(100vh - 90px)';
        document.getElementById('settings-frame').innerHTML = '';
        document.getElementById('settings-frame').appendChild(settingsFrame);
      }
    }
    
    // Check on page load
    window.addEventListener('DOMContentLoaded', async () => {
      await checkIframeLoaded();
      // Recheck every 5 seconds in case server starts
      iframeCheckInterval = setInterval(() => { checkIframeLoaded(); }, 5000);
    });
  </script>
</body>
</html>
